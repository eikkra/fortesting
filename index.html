<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Statistics</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: #fff;
}

/* HEADER */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px;
    flex-wrap: wrap;
}

.header img {
    width: 40px;
    height: 40px;
}

.title {
    font-size: 22px;
    font-weight: bold;
    color: #22c55e;
}

.description {
    width: 100%;
    text-align: center;
    font-size: 13px;
    color: #94a3b8;
}

/* SEARCH */
.search-box {
    text-align: center;
    margin: 15px;
}

.search-box input {
    width: 90%;
    max-width: 400px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD - GLASS EFFECT */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 20px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 15px rgba(34,197,94,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.04);
}

/* CLUB ID SPECIAL */
.player-id {
    font-size: 20px;
    font-weight: bold;
    color: #22c55e;
    text-shadow: 0 0 10px #22c55e;
}

/* STATS */
.stats span {
    display: block;
    font-size: 14px;
    margin: 3px 0;
}

/* RESPONSIVE */
@media(max-width:600px){
    .title { font-size: 18px; }
}
</style>
</head>

<body>

<div class="header">
    <img src="https://i.imgur.com/LY3Bb9m.png">
    <div class="title">GOAT FC Statistics</div>
    <div class="description">
        Track player performance including wins, goals, win rate, and match analytics from official approved matches only.
    </div>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Search Club ID...">
</div>

<div class="container" id="cards"></div>

<script>

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";

let players = {};

// FETCH CSV
fetch(csvURL)
.then(res => res.text())
.then(data => {
    const rows = data.split("\n").slice(1);

    rows.forEach(row => {
        const cols = row.split(",");

        const P1 = cols[0];
        const P2 = cols[1];
        const type = cols[2];
        const P1S = Number(cols[3]);
        const P2S = Number(cols[4]);
        const approved = cols[9];

        // ✅ ONLY APPROVED MATCH
        if (approved !== "yes") return;

        update(P1, P1S, P2S, type);
        update(P2, P2S, P1S, type);
    });

    render();
});

// UPDATE PLAYER
function update(id, scored, conceded, type){
    if(!players[id]){
        players[id] = {
            win:0, loss:0, draw:0,
            goals:0, conceded:0,
            matches:0,
            friendly:0, other:0,
            bigWin:0
        };
    }

    let p = players[id];

    p.matches++;
    p.goals += scored;
    p.conceded += conceded;

    if(type === "Friendly") p.friendly++;
    else p.other++;

    if(scored > conceded) p.win++;
    else if(scored < conceded) p.loss++;
    else p.draw++;

    if(scored >= 7) p.bigWin++;
}

// RENDER
function render(filter=""){
    const container = document.getElementById("cards");
    container.innerHTML = "";

    let sorted = Object.entries(players)
        .sort((a,b)=>b[1].win - a[1].win);

    sorted.forEach(([id,p])=>{

        if(!id.toLowerCase().includes(filter.toLowerCase())) return;

        let winRate = ((p.win/p.matches)*100).toFixed(1);
        let goalRate = (p.goals/p.matches).toFixed(2);
        let gd = p.goals - p.conceded;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
        <div class="player-id">${id}</div>
        <div class="stats">
            <span>🏆 Win: ${p.win}</span>
            <span>❌ Loss: ${p.loss}</span>
            <span>🤝 Draw: ${p.draw}</span>
            <span>📊 Win%: ${winRate}%</span>
            <span>⚽ Goal Rate: ${goalRate}</span>
            <span>🎯 Goals: ${p.goals}</span>
            <span>🥅 Conceded: ${p.conceded}</span>
            <span>➕ GD: ${gd}</span>
            <span>🔥 7+ Goals: ${p.bigWin}</span>
            <span>📅 Matches: ${p.matches}</span>
            <span>🎮 Friendly: ${p.friendly}</span>
            <span>⚔️ Others: ${p.other}</span>
        </div>
        `;

        container.appendChild(card);
    });
}

// SEARCH
document.getElementById("search").addEventListener("input", e=>{
    render(e.target.value);
});

</script>

</body>
</html>

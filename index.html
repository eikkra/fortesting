<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC STATISTICS</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#020617;
    color:white;
}

/* HEADER */
.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    padding:10px;
}
.header img{width:40px;}
.header h1{
    font-size:18px;
    color:#00f5ff;
    text-shadow:0 0 10px #00f5ff,0 0 20px #00f5ff;
}

/* SEARCH */
.search{
    text-align:center;
    margin:10px;
}
.search input{
    padding:8px;
    width:85%;
    max-width:320px;
    border-radius:8px;
    border:1px solid #00f5ff;
    background:black;
    color:#00f5ff;
    outline:none;
    box-shadow:0 0 10px #00f5ff;
}

/* CARD */
.card{
    margin:12px;
    padding:12px;
    border-radius:14px;
    background:linear-gradient(145deg,#020617,#001f2f);
    border:1px solid #00f5ff;
    box-shadow:0 0 20px #00f5ff;
    text-align:center;
}

/* CLUB */
.club{
    font-size:15px;
    font-weight:bold;
    margin-bottom:10px;
    color:#00f5ff;
    text-shadow:0 0 10px #00f5ff,0 0 25px #00f5ff;
}

/* GRID BOX */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
}

.box{
    padding:6px;
    border-radius:8px;
    font-size:11px;
    background:#001f2f;
    border:1px solid #00f5ff;
    box-shadow:0 0 8px #00f5ff inset;
}

/* BUTTONS */
.btns{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:10px;
}
.btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#00f5ff;
    color:black;
    font-size:11px;
    cursor:pointer;
    box-shadow:0 0 10px #00f5ff;
}

/* MOBILE */
@media(max-width:768px){
    .grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/LY3Bb9m.png">
<h1>GOAT FC STATISTICS</h1>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search Club ID (e.g. GFC001)" oninput="render()">
</div>

<div id="data"></div>

<script>

const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv"; // 🔥 change this

let data=[];

// SMART NORMALIZE
function normalize(id){
    return id.toLowerCase().replace(/[^a-z0-9]/g,'');
}

// LOAD
async function load(){
    let t=await fetch(URL+"?t="+Date.now()).then(r=>r.text());
    let rows=t.split("\n").slice(1);

    data=rows.map(r=>{
        let c=r.split(",");
        return{
            id:c[0],
            match:+c[1],
            win:+c[2],
            loss:+c[3],
            draw:+c[4],
            winp:+c[5],
            gs:+c[7],
            gc:+c[8],
            diff:+c[9],
            rate:+c[10],
            seven:+c[11],
            friendly:+c[12],
            other:+c[13]
        }
    });
    render();
}

// RENDER
function render(){
    let q=normalize(document.getElementById("search").value);

    let sorted=data.sort((a,b)=>b.win-a.win);

    let html="";
    sorted.forEach(p=>{
        if(q && !normalize(p.id).includes(q)) return;

        html+=`
        <div class="card">
            <div class="club">Player ID: ${p.id}</div>

            <div class="grid">
                <div class="box">🟢 Win<br>${p.win}</div>
                <div class="box">🔴 Loss<br>${p.loss}</div>
                <div class="box">🟡 Draw<br>${p.draw}</div>

                <div class="box">🎮 Match<br>${p.match}</div>
                <div class="box">📊 Win%<br>${p.winp.toFixed(1)}</div>
                <div class="box">⚽ Rate<br>${p.rate.toFixed(2)}</div>

                <div class="box">⚽ Scored<br>${p.gs}</div>
                <div class="box">🥅 Conceded<br>${p.gc}</div>
                <div class="box">📈 Difference<br>${p.diff}</div>

                <div class="box">👑 7+ Goals<br>${p.seven}</div>
                <div class="box">🤝 Friendly<br>${p.friendly}</div>
                <div class="box">🏆 Tournaments<br>${p.other}</div>
            </div>

            <div class="btns">
                <button class="btn" onclick="share('${p.id}')">Share</button>
                <button class="btn" onclick="download(this)">Download</button>
            </div>
        </div>`;
    });

    document.getElementById("data").innerHTML=html;
}

// SHARE
function share(id){
    let text="Check my GOAT FC stats: "+id;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

// DOWNLOAD
function download(btn){
    let card=btn.closest(".card");
    html2canvas(card).then(canvas=>{
        let link=document.createElement("a");
        link.download="stats.png";
        link.href=canvas.toDataURL();
        link.click();
    });
}

load();

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>

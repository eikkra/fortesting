<!DOCTYPE html>
<html>
<head>
  <title>Goat FC Leaderboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Oswald', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    body.light {
      background: linear-gradient(135deg, #001a0f, #003d26);
    }

    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding-top: 15px;
    }

    .logo {
      width: 55px;
      animation: float 3s infinite;
      filter: drop-shadow(0 0 12px #00ffcc);
    }

    h1 {
      margin: 0;
      color: #00ffcc;
    }

    .slogan {
      font-size: 12px;
      margin-bottom: 10px;
    }

    .tabs { margin: 10px; }

    button {
      padding: 6px 12px;
      border-radius: 15px;
      border: none;
      background: #1f2937;
      color: white;
      margin: 3px;
      cursor: pointer;
    }

    button.active {
      background: linear-gradient(to right,#00ffcc,#00c3ff);
      color: black;
    }

    .card {
      width: 98%;
      margin: auto;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 6px;
      font-size: 11px;
      white-space: nowrap;
    }

    th { color: #00ffcc; }

    .rank1-row { background: rgba(255,215,0,0.15); }
    .rank2-row { background: rgba(192,192,192,0.15); }
    .rank3-row { background: rgba(205,127,50,0.15); }

    .top10 {
      background: rgba(0,255,150,0.08);
      border-left: 3px solid #00ffcc;
    }

    .toggle {
      margin: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    /* 📱 MOBILE PERFECT */
    @media(max-width:600px){
      th,td { font-size: 10px; padding: 5px; }
      .logo { width: 45px; }
      h1 { font-size: 16px; }
    }

  </style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/LY3Bb9m.png" class="logo">
  <h1>GOAT FC LEADERBOARD</h1>
</div>

<div class="slogan">⚡ BE THE GAME CHANGER! ⚡</div>

<div class="toggle" onclick="document.body.classList.toggle('light')">🌗 Theme</div>

<div class="tabs">
  <button onclick="loadData('overall')" class="active" id="overallBtn">Overall</button>
  <button onclick="loadData('monthly')" id="monthlyBtn">Monthly</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>ID</th>
<th>Pts</th>
<th>M</th>
<th>Win%</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>

const LEADERBOARD = "https://opensheet.elk.sh/1DSPKPaU1ZQYbFM4iYbE1VXgDAXU-FCT7--QhYJsNf1M/Leaderboard%20Goat%20FC";
const MEMBERS = "https://opensheet.elk.sh/1DSPKPaU1ZQYbFM4iYbE1VXgDAXU-FCT7--QhYJsNf1M/CLUB%20MEMBERS";

let currentType="overall";

async function loadData(type){

currentType=type;

document.getElementById("overallBtn").classList.remove("active");
document.getElementById("monthlyBtn").classList.remove("active");
document.getElementById(type+"Btn").classList.add("active");

let [leaderData, memberData] = await Promise.all([
fetch(LEADERBOARD).then(r=>r.json()),
fetch(MEMBERS).then(r=>r.json())
]);

// 🔥 create ID → NAME map
let memberMap = {};
memberData.forEach(m=>{
memberMap[m["Club ID Number"]?.trim()] = m["Full Name"];
});

let tbody=document.getElementById("table");
tbody.innerHTML="";

// SORT
leaderData.sort((a,b)=>
type==="overall"
? (a["Overall Rank"]||999)-(b["Overall Rank"]||999)
: (a["Monthly Rank"]||999)-(b["Monthly Rank"]||999)
);

leaderData.forEach((row,index)=>{

let clubID = row["Club_ID"]?.trim();

// 🔥 MATCH NAME
let playerName = memberMap[clubID] || "Reserve ID";

let cls = index==0?"rank1-row":index==1?"rank2-row":index==2?"rank3-row":index<10?"top10":"";

let match = type==="overall"?row["Overall_PL"]:row["Monthly_PL"];
let gf = type==="overall"?row["Total GF"]:row["Montly GF"];
let point = type==="overall"?row["Overall_Point"]:row["Monthly_Point"];
let win = ((type==="overall"?row["Overall_Win%"]:row["Monthly_Win%"])||0)*100;
let ga = type==="overall"?row["Total GA"]:row["Montly GA"];
let gd = type==="overall"?row["Total GD"]:row["Montly GD"];

tbody.innerHTML+=`
<tr class="${cls}">
<td>${index+1}</td>
<td>${playerName}</td>
<td>${clubID}</td>
<td>${point||0}</td>
<td>${match||0}</td>
<td>${win.toFixed(1)}%</td>
<td>${gf||0}</td>
<td>${ga||0}</td>
<td>${gd||0}</td>
</tr>
`;

});

}

loadData("overall");
setInterval(()=>loadData(currentType),30000);

</script>

</body>
</html>

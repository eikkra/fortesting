<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GOAT FC League System</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:'Rajdhani',sans-serif;
background:radial-gradient(circle at top,#050816,#020617);
color:#fff;
}

header{
text-align:center;
padding:18px;
font-size:28px;
font-weight:700;
letter-spacing:2px;
background:linear-gradient(90deg,#ff00cc,#00ffff,#ffcc00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
flex-wrap:wrap;
}

.tab-btn{
padding:10px 18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#111827;
color:#fff;
transition:0.3s;
}
.tab-btn.active{
background:linear-gradient(90deg,#ff00cc,#00ffff);
color:#000;
font-weight:700;
}

.container{padding:15px;}

.card{
background:rgba(17,24,39,0.9);
border:1px solid #1f2937;
border-radius:14px;
padding:15px;
margin-bottom:15px;
box-shadow:0 0 18px rgba(0,255,255,0.15);
}

.center{text-align:center;}

select,button{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

button{
cursor:pointer;
background:linear-gradient(90deg,#ff00cc,#00ffff);
color:#000;
font-weight:700;
}

/* FIXTURE */
.round-title{
text-align:center;
margin:15px 0;
font-size:20px;
color:#00ffff;
font-weight:700;
}

.fixture-table{
width:100%;
border-collapse:collapse;
margin-bottom:20px;
}

.fixture-table th,.fixture-table td{
border:1px solid #1f2937;
padding:8px;
text-align:center;
font-size:14px;
}

.team-logo{width:28px;height:28px;border-radius:50%;object-fit:cover;}
.badge{padding:4px 8px;border-radius:8px;background:#1f2937;font-size:12px;}

/* LINEUP */
.vs-header{
text-align:center;
font-size:24px;
margin-bottom:10px;
color:#00ffff;
font-weight:700;
}

.lineup-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.team-box{
background:#0b1220;
padding:10px;
border-radius:12px;
}

.player{
display:flex;
align-items:center;
gap:10px;
padding:6px;
border:1px solid #1f2937;
border-radius:8px;
margin-bottom:6px;
cursor:grab;
}

.player img{width:35px;height:35px;border-radius:50%;}

.check{
margin-right:6px;
}

@media(max-width:768px){
.lineup-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>⚡ GOAT FC LEAGUE SYSTEM ⚡</header>

<div class="tabs">
<button class="tab-btn active" onclick="showTab('fixture')">Fixture Center</button>
<button class="tab-btn" onclick="showTab('lineup')">Lineup Planner</button>
</div>

<div class="container">

<!-- FIXTURE -->
<div id="fixture">
<div class="card center">
<h3>League Fixtures (Round Robin)</h3>
<button onclick="generateRounds()">Generate Fixtures</button>
<button onclick="downloadFixture()">Download</button>
</div>

<div id="fixtureArea"></div>
</div>

<!-- LINEUP -->
<div id="lineup" style="display:none;">
<div class="card center">
<h3>Match Lineup Planner</h3>
<select id="teamA"></select>
<select id="teamB"></select>
<button onclick="loadPlayers()">Load Players</button>
<button onclick="downloadLineup()">Download</button>
</div>

<div class="card">
<div class="vs-header" id="vsHeader">TEAM A vs TEAM B</div>
<div class="lineup-grid" id="lineupBox"></div>
</div>
</div>

</div>

<script>

const managersURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";
const membersURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

let teams=[],players=[],rounds=[];

async function loadData(){
let m=await fetch(managersURL).then(r=>r.text());
let mm=Papa.parse(m,{header:true}).data;

teams=mm.map(t=>({
name:t["Team Name"],
logo:t["Team Logo"],
players:(t["Player IDs"]||"").split(",").map(x=>x.trim()),
link:t["Match Group Link"]
}));

let p=await fetch(membersURL).then(r=>r.text());
players=Papa.parse(p,{header:true}).data;

populateTeams();
}

function populateTeams(){
let a=document.getElementById("teamA");
let b=document.getElementById("teamB");
a.innerHTML=b.innerHTML="";
teams.forEach(t=>{
a.innerHTML+=`<option>${t.name}</option>`;
b.innerHTML+=`<option>${t.name}</option>`;
});
}

/* ---------------- ROUND ROBIN ---------------- */
function generateRounds(){
let arr=[...teams];
if(arr.length%2) arr.push({name:"BYE"});
let n=arr.length;
rounds=[];

for(let r=0;r<n-1;r++){
let round=[];
for(let i=0;i<n/2;i++){
let home=arr[i];
let away=arr[n-1-i];
if(home.name!=="BYE" && away.name!=="BYE"){
round.push({home,away});
}
}
arr.splice(1,0,arr.pop());
rounds.push(round);
}
renderRounds();
}

function renderRounds(){
let box=document.getElementById("fixtureArea");
box.innerHTML="";

rounds.forEach((r,i)=>{
let html=`<div class='round-title'>ROUND ${i+1}</div>`;
html+=`<table class='fixture-table'>
<tr><th>Home</th><th>Away</th><th>Group</th></tr>`;

r.forEach(f=>{
html+=`<tr>
<td><img class='team-logo' src='${f.home.logo}'> ${f.home.name}</td>
<td><img class='team-logo' src='${f.away.logo}'> ${f.away.name}</td>
<td><a class='badge' href='${f.home.link}' target='_blank'>Join</a></td>
</tr>`;
});
html+=`</table>`;
box.innerHTML+=html;
});
}

/* ---------------- LINEUP DRAG ---------------- */
function loadPlayers(){
let A=document.getElementById("teamA").value;
let B=document.getElementById("teamB").value;

let tA=teams.find(t=>t.name===A);
let tB=teams.find(t=>t.name===B);

let box=document.getElementById("lineupBox");
let vs=document.getElementById("vsHeader");
vs.innerText=`${A} VS ${B}`;
box.innerHTML="";

[tA,tB].forEach(team=>{
let div=document.createElement("div");
div.className="team-box";

team.players.forEach(pid=>{
let pl=players.find(p=>p["Club ID Number"]===pid);
if(pl){
div.innerHTML+=`
<div class='player' draggable='true' ondragstart='drag(event)'>
<input type='checkbox' class='check'>
<img src='${pl["Profile Picture"]}'>
<div>${pl["Full Name"]}<br><small>${pid}</small></div>
</div>`;
}
});

box.appendChild(div);
});
}

function drag(ev){ev.dataTransfer.setData("text",ev.target.outerHTML);}

function showTab(t){
document.getElementById("fixture").style.display=t==='fixture'?'block':'none';
document.getElementById("lineup").style.display=t==='lineup'?'block':'none';
}

function downloadFixture(){
html2canvas(document.getElementById("fixtureArea")).then(c=>{let a=document.createElement("a");a.href=c.toDataURL();a.download="fixture.png";a.click();});
}

function downloadLineup(){
html2canvas(document.getElementById("lineupBox")).then(c=>{let a=document.createElement("a");a.href=c.toDataURL();a.download="lineup.png";a.click();});
}

loadData();

</script>

</body>
</html>

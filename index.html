<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Player Database</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<!-- CSV Parser -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: #0a0a0a;
  color: #fff;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  color: #00f7ff;
  text-shadow: 0 0 15px #00f7ff;
}

.search-box {
  text-align: center;
  margin-bottom: 20px;
}

.search-box input {
  padding: 12px;
  width: 300px;
  max-width: 90%;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #111;
  color: #00f7ff;
  box-shadow: 0 0 10px #00f7ff;
}

.container {
  padding: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #111;
  color: #00f7ff;
  padding: 12px;
}

td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

tr:hover {
  background: rgba(0,247,255,0.1);
}

a {
  color: #00f7ff;
  text-decoration: none;
}

/* Mobile */
@media(max-width: 768px) {
  table, thead, tbody, th, td, tr {
    display: block;
  }

  tr {
    margin-bottom: 15px;
    background: #111;
    border-radius: 10px;
    padding: 10px;
  }

  td {
    text-align: left;
  }

  td::before {
    content: attr(data-label);
    color: #00f7ff;
    font-weight: bold;
    display: block;
  }

  th { display: none; }
}
</style>
</head>

<body>

<div class="header">⚡ GOAT FC PLAYER DATABASE ⚡</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search by Club ID...">
</div>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Club ID</th>
        <th>KONAMI ID</th>
        <th>Device</th>
        <th>Facebook</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRxNxMgcwsp3k8B9jqnfObnnRfhSX3vUcEOuaPTsyEMaEVOZKE9OIcLiMQRJHHkAQiJWn-msKE6Cs80/pub?output=csv";

let players = [];

/* LOAD CSV */
Papa.parse(csvURL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    players = results.data;
    render(players);
  }
});

/* RENDER TABLE */
function render(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.forEach(p => {
    const row = `
      <tr>
        <td data-label="Name">${p["Player Name"] || ""}</td>
        <td data-label="Club ID">${p["Your Club ID"] || ""}</td>
        <td data-label="KONAMI ID">${p["KONAMI ID"] || ""}</td>
        <td data-label="Device">${p["DEVICE NAME"] || ""}</td>
        <td data-label="Facebook">
          <a href="${p["Facebook URL"]}" target="_blank">View</a>
        </td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
}

/* SEARCH FILTER */
document.getElementById("searchInput").addEventListener("keyup", function() {
  const val = this.value.toLowerCase();

  const filtered = players.filter(p =>
    (p["Your Club ID"] || "").toLowerCase().includes(val)
  );

  render(filtered);
});
</script>

</body>
</html>

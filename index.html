<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC STATISTICS</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#020617;
    color:white;
}

/* HEADER ROW (LOGO + TITLE SAME LINE FIXED) */
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:10px;
}
.logo{
    width:40px;
    filter:drop-shadow(0 0 10px #00f5ff);
    animation:glow 2s infinite alternate;
}
@keyframes glow{
    from{filter:drop-shadow(0 0 5px #00f5ff);}
    to{filter:drop-shadow(0 0 20px #00f5ff);}
}

.title{
    font-size:18px;
    color:#00f5ff;
    text-shadow:0 0 10px #00f5ff,0 0 25px #00f5ff;
}

/* DESCRIPTION (RESTORED) */
.desc{
    text-align:center;
    font-size:11px;
    color:#94a3b8;
    margin-top:-5px;
}

/* SEARCH */
.search{
    text-align:center;
    margin:10px;
}
.search input{
    padding:8px;
    width:85%;
    max-width:320px;
    border-radius:8px;
    border:1px solid #00f5ff;
    background:black;
    color:#00f5ff;
    box-shadow:0 0 10px #00f5ff;
}

/* CARD */
.card{
    margin:12px;
    padding:12px;
    border-radius:14px;
    background:linear-gradient(145deg,#020617,#001f2f);
    border:1px solid #00f5ff;
    box-shadow:0 0 20px #00f5ff;
    text-align:center;
}

/* CLUB ID */
.club{
    font-size:15px;
    font-weight:bold;
    color:#00f5ff;
    text-shadow:0 0 15px #00f5ff;
    margin-bottom:8px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
}

.box{
    padding:6px;
    border-radius:8px;
    font-size:11px;
    background:#001f2f;
    border:1px solid #00f5ff;
    box-shadow:0 0 10px #00f5ff inset;
}

/* BUTTONS */
.btns{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:10px;
}
.btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#00f5ff;
    color:black;
    font-size:11px;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
    .grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="header">
    <img class="logo" src="https://i.imgur.com/LY3Bb9m.png">
    <div class="title">GOAT FC STATISTICS</div>
</div>

<div class="desc">
Live approved match analytics • Player ranking • Performance tracker
</div>

<div class="search">
<input type="text" id="search" placeholder="Search Club ID (GFC-001 / gfc001)" oninput="render()">
</div>

<div id="data"></div>

<script>

const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";

let data=[];

// NORMALIZE SEARCH
function norm(s){
    return (s||"").toLowerCase().replace(/[^a-z0-9]/g,"");
}

// SAFE CSV PARSER (FIX DATA MISSING ISSUE)
async function load(){
    try{
        let res=await fetch(URL+"?t="+Date.now());
        let text=await res.text();

        let rows=text.split("\n");

        data=rows.slice(1).map(r=>{
            let c=r.split(",");

            if(c.length<12) return null;
            if((c[9]||"").trim().toLowerCase()!=="yes") return null;

            return {
                id:c[0]?.trim(),
                match:+c[10]||0,
                win:+c[2]||0,
                loss:+c[3]||0,
                draw:+c[4]||0,
                winp:+c[5]||0,
                gs:+c[7]||0,
                gc:+c[8]||0,
                diff:(+c[7]||0)-(+c[8]||0),
                rate:+c[10]||0,
                seven:+c[11]||0,
                friendly:+c[12]||0,
                other:+c[13]||0
            };
        }).filter(Boolean);

        render();
    }catch(e){
        console.log("Load error",e);
    }
}

// RENDER UI
function render(){
    let q=norm(document.getElementById("search").value);

    let sorted=[...data].sort((a,b)=>b.win-a.win);

    let html="";

    sorted.forEach(p=>{
        if(q && !norm(p.id).includes(q)) return;

        html+=`
        <div class="card">

            <div class="club">Player ID: ${p.id}</div>

            <div class="grid">
                <div class="box">🟢 Win<br>${p.win}</div>
                <div class="box">🔴 Loss<br>${p.loss}</div>
                <div class="box">🟡 Draw<br>${p.draw}</div>

                <div class="box">🎮 Match<br>${p.match}</div>
                <div class="box">📊 Win%<br>${p.winp}</div>
                <div class="box">⚽ Rate<br>${p.rate}</div>

                <div class="box">⚽ Scored<br>${p.gs}</div>
                <div class="box">🥅 Conceded<br>${p.gc}</div>
                <div class="box">📉 Difference<br>${p.diff}</div>

                <div class="box">👑 7+ Goals<br>${p.seven}</div>
                <div class="box">🤝 Friendly<br>${p.friendly}</div>
                <div class="box">🏆 Tournaments<br>${p.other}</div>
            </div>

            <div class="btns">
                <button class="btn" onclick="share('${p.id}')">Share</button>
                <button class="btn" onclick="download(this)">Download</button>
            </div>

        </div>`;
    });

    document.getElementById("data").innerHTML=html;
}

// SHARE
function share(id){
    navigator.clipboard.writeText("GOAT FC Player: "+id);
    alert("Copied!");
}

// DOWNLOAD
function download(btn){
    html2canvas(btn.closest(".card")).then(canvas=>{
        let a=document.createElement("a");
        a.download="goatfc.png";
        a.href=canvas.toDataURL();
        a.click();
    });
}

load();

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GOAT FC League System</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
--bg1:#050816;
--bg2:#020617;
--neon:#00ffcc;
--pink:#ff00cc;
--lime:#a3ff12;
--glass:rgba(255,255,255,0.05);
}

body{
margin:0;
font-family:'Rajdhani',sans-serif;
background:radial-gradient(circle at top,var(--bg1),var(--bg2));
color:#fff;
overflow-x:hidden;
}

header{
text-align:center;
padding:18px;
font-size:28px;
font-weight:700;
background:linear-gradient(90deg,var(--pink),var(--neon),var(--lime));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
flex-wrap:wrap;
}

.tab-btn{
padding:10px 16px;
border:none;
border-radius:10px;
cursor:pointer;
background:#111827;
color:#fff;
transition:0.3s;
}
.tab-btn.active{
background:linear-gradient(90deg,var(--pink),var(--neon));
color:#000;
font-weight:700;
}

.container{padding:10px;}
.card{
background:var(--glass);
border:1px solid #1f2937;
border-radius:14px;
padding:12px;
margin-bottom:12px;
box-shadow:0 0 20px rgba(0,255,200,0.08);
backdrop-filter:blur(8px);
}

select,button{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

button{
cursor:pointer;
background:linear-gradient(90deg,var(--pink),var(--neon));
color:#000;
font-weight:700;
}

/* FIXTURE */
.round-title{
text-align:center;
margin:18px 0;
font-size:18px;
color:var(--neon);
font-weight:700;
}

.fixture-table{
width:100%;
border-collapse:collapse;
margin-bottom:20px;
}

.fixture-table th,.fixture-table td{
border:1px solid #1f2937;
padding:8px;
text-align:center;
font-size:13px;
}

.team-box{
display:flex;
flex-direction:column;
align-items:center;
}

.team-logo{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

.team-name{
font-size:12px;
margin-top:4px;
text-align:center;
}

.badge{
padding:4px 8px;
border-radius:8px;
background:#1f2937;
font-size:12px;
}

/* LINEUP */
.vs-title{
text-align:center;
font-size:22px;
margin-bottom:10px;
color:var(--neon);
font-weight:700;
}

.lineup-wrapper{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.team-panel{
background:#0b1220;
padding:10px;
border-radius:12px;
}

.slot{
display:flex;
align-items:center;
gap:6px;
margin-bottom:6px;
}

.slot select{
flex:1;
}

.player-pool{
background:#111827;
padding:6px;
border-radius:10px;
margin-top:6px;
}

.player-item{
display:flex;
align-items:center;
justify-content:space-between;
padding:5px;
border-bottom:1px solid #1f2937;
}

.player-item input{
transform:scale(1.2);
}

@media(max-width:768px){
.lineup-wrapper{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>⚡ GOAT FC LEAGUE SYSTEM ⚡</header>

<div class="tabs">
<button class="tab-btn active" onclick="showTab('fixture')">Fixture</button>
<button class="tab-btn" onclick="showTab('lineup')">Lineup</button>
</div>

<div class="container">

<!-- FIXTURE -->
<div id="fixture">
<div class="card">
<button onclick="generateRoundRobin()">Generate Fixture</button>
<button onclick="downloadFixture()">Download</button>
</div>
<div id="fixtureArea"></div>
</div>

<!-- LINEUP -->
<div id="lineup" style="display:none;">
<div class="card">
<select id="teamA"></select>
<select id="teamB"></select>
<button onclick="loadLineup()">Load Match</button>
</div>

<div class="card">
<div class="vs-title" id="vs">TEAM A VS TEAM B</div>
<div class="lineup-wrapper" id="lineupBox"></div>
</div>
</div>

</div>

<script>

const managersURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";
const membersURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

let teams=[],players=[],rounds=[];

async function loadData(){
let m=await fetch(managersURL).then(r=>r.text());
let mm=Papa.parse(m,{header:true}).data;

teams=mm.map(t=>({
name:t["Team Name"],
logo:t["Team Logo"],
players:(t["Player IDs"]||"").split(",").map(x=>x.trim()),
link:t["Match Group Link"]
}));

let p=await fetch(membersURL).then(r=>r.text());
players=Papa.parse(p,{header:true}).data;

populateTeams();
}

function populateTeams(){
let a=document.getElementById("teamA");
let b=document.getElementById("teamB");
a.innerHTML=b.innerHTML="";
teams.forEach(t=>{
a.innerHTML+=`<option>${t.name}</option>`;
b.innerHTML+=`<option>${t.name}</option>`;
});
}

/* ---------------- FAIR ROUND ROBIN ---------------- */
function generateRoundRobin(){
let arr=[...teams];
if(arr.length%2!==0) arr.push({name:"BYE"});
let n=arr.length;
rounds=[];

for(let r=0;r<n-1;r++){
let round=[];
for(let i=0;i<n/2;i++){
let home=arr[i];
let away=arr[n-1-i];
if(home.name!=="BYE" && away.name!=="BYE"){
if(r%2===0) round.push({home,away});
else round.push({home:away,away:home});
}
}
arr.splice(1,0,arr.pop());
rounds.push(round);
}
renderRounds();
}

function renderRounds(){
let box=document.getElementById("fixtureArea");
box.innerHTML="";

rounds.forEach((r,i)=>{
let html=`<div class='round-title'>ROUND ${i+1}</div>`;
html+=`<table class='fixture-table'><tr><th>HOME</th><th>AWAY</th><th>GROUP</th></tr>`;

r.forEach(f=>{
html+=`<tr>
<td class='team-box'><img class='team-logo' src='${f.home.logo}'><div class='team-name'>${f.home.name}</div></td>
<td class='team-box'><img class='team-logo' src='${f.away.logo}'><div class='team-name'>${f.away.name}</div></td>
<td><a class='badge' href='${f.home.link}' target='_blank'>JOIN</a></td>
</tr>`;
});
html+=`</table>`;
box.innerHTML+=html;
});
}

/* ---------------- LINEUP SYSTEM ---------------- */
function loadLineup(){
let A=document.getElementById("teamA").value;
let B=document.getElementById("teamB").value;

let tA=teams.find(t=>t.name===A);
let tB=teams.find(t=>t.name===B);

document.getElementById("vs").innerText=`${A} VS ${B}`;

let box=document.getElementById("lineupBox");
box.innerHTML="";

[tA,tB].forEach(team=>{
let panel=document.createElement("div");
panel.className="team-panel";
panel.innerHTML=`<h4>${team.name}</h4>`;

// 6 slots
for(let i=0;i<6;i++){
panel.innerHTML+=`
<div class='slot'>
<select>
<option>Select Player</option>
${team.players.map(pid=>{
let p=players.find(x=>x["Club ID Number"]===pid);
return p?`<option>${p["Full Name"]} (${pid})</option>`:"";
}).join("")}
</select>
</div>`;
}

// pool
panel.innerHTML+=`<div class='player-pool'>${team.players.map(pid=>{
let p=players.find(x=>x["Club ID Number"]===pid);
if(!p)return "";
return `<div class='player-item'>${p["Full Name"]}<input type='checkbox'></div>`;
}).join("")}</div>`;

box.appendChild(panel);
});
}

function showTab(t){
document.getElementById("fixture").style.display=t==='fixture'?'block':'none';
document.getElementById("lineup").style.display=t==='lineup'?'block':'none';
}

function downloadFixture(){html2canvas(document.getElementById("fixtureArea")).then(c=>{let a=document.createElement("a");a.href=c.toDataURL();a.download="fixture.png";a.click();});}
function downloadLineup(){html2canvas(document.getElementById("lineupBox")).then(c=>{let a=document.createElement("a");a.href=c.toDataURL();a.download="lineup.png";a.click();});}

loadData();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Managers</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
    --bg:#050816;
    --card:#0d1329;
    --card2:#101935;
    --accent:#00f0ff;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
    --green:#00ff88;
    --muted:#9aaad1;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    background:
    radial-gradient(circle at top left,#10244f 0%,#050816 45%),
    radial-gradient(circle at bottom right,#2b0034 0%,#050816 55%);
    font-family:'Rajdhani',sans-serif;
    color:#fff;
    padding:14px;
}

.container{max-width:1600px;margin:auto;}

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}

.header img{width:36px;height:36px;}

.header h1{
    font-family:'Orbitron';
    font-size:1.25rem;
    background:linear-gradient(90deg,#00f0ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* DESC */
.desc{
    text-align:center;
    color:var(--muted);
    font-size:.85rem;
    margin-bottom:18px;
}

/* GRID */
.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

/* CARD + GAMING GLOW */
.manager-card{
    background:linear-gradient(145deg,var(--card),var(--card2));
    border-radius:18px;
    padding:14px;
    position:relative;
    overflow:hidden;
    border:1px solid rgba(0,240,255,.25);
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

/* moving glow effect */
.manager-card::before{
    content:"";
    position:absolute;
    top:-50%;
    left:-50%;
    width:200%;
    height:200%;
    background:radial-gradient(circle,rgba(0,240,255,.08),transparent 60%);
    animation:moveGlow 6s linear infinite;
    pointer-events:none;
}

@keyframes moveGlow{
    0%{transform:translate(0,0)}
    50%{transform:translate(20px,20px)}
    100%{transform:translate(0,0)}
}

/* TOP RANK BADGE (NEW PREMIUM STYLE) */
.rank-badge{
    position:absolute;
    top:10px;
    right:10px;
    padding:5px 12px;
    border-radius:999px;
    font-size:.72rem;
    font-family:'Orbitron';
    font-weight:800;
    letter-spacing:.5px;
    backdrop-filter:blur(8px);
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
}

.top1 .rank-badge{
    color:#000;
    background:linear-gradient(90deg,#FFD700,#ffef9f);
    box-shadow:0 0 12px rgba(255,215,0,.35);
}
.top2 .rank-badge{
    color:#000;
    background:linear-gradient(90deg,#c0c0c0,#e6e6e6);
    box-shadow:0 0 12px rgba(192,192,192,.25);
}
.top3 .rank-badge{
    color:#000;
    background:linear-gradient(90deg,#cd7f32,#e2a46a);
    box-shadow:0 0 12px rgba(205,127,50,.25);
}

/* DOWNLOAD ICON (NEW SVG STYLE) */
.download-icon{
    position:absolute;
    top:42px;
    right:12px;
    cursor:pointer;
    width:22px;
    height:22px;
    opacity:.75;
    transition:.25s;
}

.download-icon:hover{
    opacity:1;
    transform:scale(1.15);
    filter:drop-shadow(0 0 6px var(--accent));
}

/* TEAM HEADER */
.team-top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.team-logo{
    width:54px;
    height:54px;
    border-radius:14px;
    object-fit:cover;
    border:2px solid var(--accent);
}

.team-info h3{font-size:1rem;font-weight:700;}

.team-info p{
    color:var(--accent);
    font-size:.82rem;
}

/* PLAYERS */
.players-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:12px;
}

.player-box{
    background:rgba(255,255,255,.04);
    border-radius:12px;
    padding:8px;
    font-size:.7rem;
    border:1px solid rgba(0,255,136,.25);
}

/* BEST PLAYER */
.player-box.best-player{
    border:1px solid var(--gold);
    box-shadow:0 0 10px rgba(255,215,0,.15);
}

/* PLAYER TEXT */
.player-id{color:var(--accent);font-weight:700;font-size:.78rem;}
.player-name{color:#ff8ae2;font-size:.62rem;margin-bottom:5px;}

/* STATS */
.stat-row{
    display:flex;
    gap:4px;
    margin-bottom:4px;
}

.stat-pill{
    flex:1;
    background:rgba(0,240,255,.08);
    border:1px solid rgba(0,240,255,.12);
    border-radius:6px;
    text-align:center;
    padding:3px 2px;
    font-size:.58rem;
}

/* LINE STATS */
.line-stat{
    background:rgba(255,255,255,.03);
    padding:4px 5px;
    border-radius:6px;
    margin-bottom:4px;
    text-align:center;
    font-size:.62rem;
}

/* SUMMARY (UPDATED DESIGN) */
.summary{
    border:1px solid rgba(255,255,255,.1);
    border-radius:12px;
    overflow:hidden;
}

.summary-title{
    background:rgba(0,240,255,.12);
    padding:7px;
    text-align:center;
    font-weight:800;
    color:var(--accent);
    font-size:.8rem;
}

/* INLINE STYLISH SUMMARY */
.summary-line{
    display:flex;
    justify-content:space-around;
    padding:8px;
    font-size:.72rem;
    font-weight:700;
    background:rgba(255,255,255,.02);
}

.summary-line span:nth-child(1){color:#00f0ff;}
.summary-line span:nth-child(2){color:#ff8ae2;}
.summary-line span:nth-child(3){color:#00ff88;}
.summary-line span:nth-child(4){color:#ffd166;}

/* MOBILE */
@media(max-width:768px){
    .manager-grid{grid-template-columns:1fr;}
    .players-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="https://i.imgur.com/LY3Bb9m.png" crossorigin="anonymous">
        <h1>GOAT FC MANAGERS</h1>
    </div>

    <div class="desc">Official Manager Ranking Based On League Performance</div>

    <div id="managerGrid" class="manager-grid">Loading...</div>

</div>

<script>
const POINTS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MANAGERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";
const MEMBERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

function parseCSV(t){
    return t.trim().split("\n").map(r=>r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v=>v.replace(/^"|"$/g,"").trim()));
}

async function load(){
    const [p,m,c]=await Promise.all([fetch(POINTS_URL),fetch(MANAGERS_URL),fetch(MEMBERS_URL)]);

    const pm=parseCSV(await p.text());
    const mm=parseCSV(await m.text());
    const cm=parseCSV(await c.text());

    const ph=pm.shift(), mh=mm.shift(), ch=cm.shift();

    const nameMap={};
    cm.forEach(r=>{
        const o=Object.fromEntries(ch.map((h,i)=>[h,r[i]]));
        nameMap[o["Club ID Number"]]=o["Full Name"];
    });

    const matches=pm.map(r=>Object.fromEntries(ph.map((h,i)=>[h,r[i]])));

    const out=[];

    for(const r of mm){
        const m=Object.fromEntries(mh.map((h,i)=>[h,r[i]]));
        const ids=m["Player IDs"].split(",").map(x=>x.trim()).slice(0,6);

        const stats={};
        ids.forEach(id=>stats[id]={m:0,pts:0,w:0,d:0,l:0,gf:0,ga:0});

        for(const x of matches){
            if(x.Approved.toLowerCase()!=="yes") continue;

            if(stats[x.P1_ID]){
                let s=stats[x.P1_ID];
                s.m++;s.pts+=+x.P1_Point;s.gf+=+x.P1_Goal;s.ga+=+x.P2_Goal;
                if(+x.P1_Point===3)s.w++;else if(+x.P1_Point===1)s.d++;else s.l++;
            }

            if(stats[x.P2_ID]){
                let s=stats[x.P2_ID];
                s.m++;s.pts+=+x.P2_Point;s.gf+=+x.P2_Goal;s.ga+=+x.P1_Goal;
                if(+x.P2_Point===3)s.w++;else if(+x.P2_Point===1)s.d++;else s.l++;
            }
        }

        let total={m:0,pts:0,w:0,gd:0};

        const players=ids.map(id=>{
            const s=stats[id];
            s.gd=s.gf-s.ga;
            s.wp=s.m?Math.round((s.w/s.m)*100):0;

            total.m+=s.m;
            total.pts+=s.pts;
            total.w+=s.w;
            total.gd+=s.gd;

            return {id,name:nameMap[id]||"Unknown",...s};
        });

        total.wp=total.m?Math.round((total.w/total.m)*100):0;

        out.push({...m,players,total});
    }

    out.sort((a,b)=>b.total.pts-a.total.pts || b.total.gd-a.total.gd);

    render(out);
}

function render(d){
    document.getElementById("managerGrid").innerHTML=d.map((m,i)=>`
    <div class="manager-card ${i<3?`top${i+1}`:''}">

        <div class="rank-badge">#${i+1}</div>

        <div class="download-icon" onclick="downloadCard(this.parentNode,'${m["Team Name"]}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="cyan" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        </div>

        <div class="team-top">
            <img class="team-logo" src="${m["Team Logo"]}" crossorigin="anonymous">
            <div class="team-info">
                <h3>${m["Team Name"]}</h3>
                <p>${m["Manager Name"]}</p>
            </div>
        </div>

        <div class="players-grid">
        ${m.players.map((p,i)=>`
            <div class="player-box ${i===0?'best-player':''}">
                <div class="player-id">${p.id}</div>
                <div class="player-name">${p.name}</div>

                <div class="stat-row">
                    <div class="stat-pill">${p.m}M</div>
                    <div class="stat-pill">${p.pts}PTS</div>
                    <div class="stat-pill">${p.wp}%</div>
                </div>

                <div class="line-stat">W-D-L: ${p.w}-${p.d}-${p.l}</div>
                <div class="line-stat">GF-GA-GD: ${p.gf}-${p.ga}-${p.gd}</div>
            </div>
        `).join("")}
        </div>

        <div class="summary">
            <div class="summary-title">Team Summary</div>
            <div class="summary-line">
                <span>${m.total.m} Match</span>
                <span>${m.total.pts} PTS</span>
                <span>${m.total.gd} GD</span>
                <span>${m.total.wp}% WIN</span>
            </div>
        </div>

    </div>
    `).join("");
}

function downloadCard(el,name){
    html2canvas(el,{useCORS:true,scale:2}).then(c=>{
        let a=document.createElement("a");
        a.download=name.replace(/\s+/g,"_")+".jpg";
        a.href=c.toDataURL("image/jpeg",1.0);
        a.click();
    });
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goat FC Match Log</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}
h1{
    text-align:center;
    color:#38bdf8;
}

.filter-box{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

select,input,button{
    padding:8px;
    border-radius:5px;
    border:none;
}

button{
    background:#22c55e;
    color:white;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
}

th,td{
    padding:10px;
    border-bottom:1px solid #334155;
    text-align:center;
}

th{
    background:#334155;
}

</style>
</head>

<body>

<h1>🐐 Goat FC Match Log Viewer</h1>

<div class="filter-box">

<select id="matchType">
<option value="">All Match Type</option>
<option>Friendly</option>
<option>Solo Tournament</option>
<option>Bid Tournament</option>
<option>League</option>
<option>Co-op</option>
</select>

<input type="date" id="startDate">
<input type="date" id="endDate">

<button onclick="loadData()">Apply Filter</button>

</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Match Type</th>
<th>P1</th>
<th>P2</th>
<th>Score</th>
<th>Points</th>
<th>Goals</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<script>

const API_URL = "https://opensheet.elk.sh/1DSPKPaU1ZQYbFM4iYbE1VXgDAXU-FCT7--QhYJsNf1M/Points_Calc";

async function loadData(){
    const res = await fetch(API_URL);
    const data = await res.json();

    const type = document.getElementById("matchType").value;
    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    data.forEach(row => {

        // Approved filter
        if(row.Approved.toLowerCase() !== "yes") return;

        // Match type filter
        if(type && row.Match_Type !== type) return;

        // Date filter
        const matchDate = new Date(row.Match_Date);
        if(start && matchDate < new Date(start)) return;
        if(end && matchDate > new Date(end)) return;

        const tr = `
        <tr>
            <td>${row.Match_Date}</td>
            <td>${row.Match_Type}</td>
            <td>${row.P1_ID}</td>
            <td>${row.P2_ID}</td>
            <td>${row.P1_Score} - ${row.P2_Score}</td>
            <td>${row.P1_Point} - ${row.P2_Point}</td>
            <td>${row.P1_Goal} - ${row.P2_Goal}</td>
        </tr>
        `;

        tbody.innerHTML += tr;
    });
}

// Initial load
loadData();

</script>

</body>
</html>

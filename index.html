<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC STATISTICS</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/LY3Bb9m.png">

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani',sans-serif;
    background:#020617;
    color:white;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:12px;
    flex-wrap:wrap;
}
.header img{
    width:42px;
    filter: drop-shadow(0 0 8px #00f5ff);
}
.header h1{
    font-size:22px;
    margin:0;
    color:#00f5ff;
    letter-spacing:0.5px; /* 🔥 fixed spacing */
    text-shadow:
        0 0 6px #00f5ff,
        0 0 12px #00f5ff,
        0 0 18px #00f5ff;
}
.desc{
    width:100%;
    text-align:center;
    font-size:13px;
    color:#94a3b8;
}

/* SEARCH */
.search{
    text-align:center;
    margin:10px;
}
.search input{
    padding:10px;
    width:90%;
    max-width:380px;
    border-radius:10px;
    border:1px solid #00f5ff;
    background:black;
    color:#00f5ff;
    outline:none;
    font-family:'Rajdhani';
}

/* GRID */
#data{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:10px;
    padding:10px;
}

/* CARD */
.card{
    padding:14px;
    border-radius:16px;
    background:linear-gradient(145deg,#020617,#001f2f);
    border:1px solid rgba(0,245,255,0.3);
    box-shadow:0 0 10px rgba(0,245,255,0.12);
    text-align:center;
}

/* RANK COLORS */
.rank1{border:1px solid gold;box-shadow:0 0 12px gold;}
.rank2{border:1px solid silver;box-shadow:0 0 12px silver;}
.rank3{border:1px solid #cd7f32;box-shadow:0 0 12px #cd7f32;}
.top10{border:1px solid #a855f7;box-shadow:0 0 10px #a855f7;}

/* PLAYER TEXT */
.club{
    font-size:16px;
    font-weight:700;
    margin-bottom:12px;
}

.player-label{color:#94a3b8;}
.player-name{color:#22c55e;}
.player-id{color:#00f5ff;}

/* GRID BOX */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}

.box{
    padding:8px;
    border-radius:10px;
    font-size:13px;
    font-weight:600; /* 🔥 bold stats */
    background:rgba(0,245,255,0.06);
    border:1px solid rgba(0,245,255,0.3);
    box-shadow:0 0 4px rgba(0,245,255,0.4);
}

/* DOWNLOAD */
.download{
    margin-top:10px;
}
.download button{
    padding:6px 12px;
    border:none;
    border-radius:8px;
    background:#00f5ff;
    color:black;
    font-size:13px;
    cursor:pointer;
    font-family:'Rajdhani';
}

/* MOBILE */
@media(max-width:768px){
    #data{display:block;padding:6px;}
    .grid{grid-template-columns:repeat(2,1fr);}
    .card{margin-bottom:12px;}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/LY3Bb9m.png">
<h1>GOAT FC STATISTICS</h1>
<div class="desc">
Official performance dashboard showing wins, goals, win rate and match stats (Approved matches only)
</div>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search Name or Club ID..." oninput="render()">
</div>

<div id="data"></div>

<script>

const MATCH_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MEMBER_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

let players={}, members={}, cache={};

function parseCSV(text){
    const rows=[]; let current=[], value="", inside=false;
    for(let i=0;i<text.length;i++){
        let c=text[i];
        if(c=='"'){ if(inside && text[i+1]=='"'){value+='"';i++;} else inside=!inside;}
        else if(c==',' && !inside){current.push(value); value="";}
        else if((c=='\n'||c=='\r')&&!inside){if(value||current.length){current.push(value);rows.push(current);current=[];value="";}}
        else value+=c;
    }
    return rows;
}

function normalize(id){
    return (id||"").toLowerCase().replace(/[^a-z0-9]/g,'');
}

async function getData(url){
    if(cache[url]) return cache[url];
    let t=await fetch(url+"&t="+Date.now()).then(r=>r.text());
    cache[url]=t;
    return t;
}

async function loadMembers(){
    let rows=parseCSV(await getData(MEMBER_URL)).slice(1);
    rows.forEach(c=>{
        if(c[1]) members[normalize(c[1])] = c[0];
    });
}

async function loadMatches(){
    let rows=parseCSV(await getData(MATCH_URL)).slice(1);
    rows.forEach(c=>{
        if((c[9]||"").toLowerCase()!=="yes") return;
        update(c[0],+c[3],+c[4],c[2]);
        update(c[1],+c[4],+c[3],c[2]);
    });
}

function update(id,s,c,t){
    if(!players[id]) players[id]={match:0,win:0,loss:0,draw:0,gs:0,gc:0,diff:0,rate:0,seven:0,friendly:0,other:0};
    let p=players[id];
    p.match++; p.gs+=s; p.gc+=c; p.diff=p.gs-p.gc;
    if(t==="Friendly") p.friendly++; else p.other++;
    if(s>c) p.win++; else if(s<c) p.loss++; else p.draw++;
    if(s>=7) p.seven++;
    p.winp=(p.win/p.match)*100;
    p.rate=(p.gs/p.match);
}

function render(){
    let q=normalize(document.getElementById("search").value);
    let sorted=Object.entries(players).sort((a,b)=>b[1].win-a[1].win);

    let html="";
    sorted.forEach(([id,p],i)=>{
        let name=members[normalize(id)]||"Unknown Player";
        if(q && !(normalize(id).includes(q)||normalize(name).includes(q))) return;

        let cls="card";
        if(i===0) cls+=" rank1";
        else if(i===1) cls+=" rank2";
        else if(i===2) cls+=" rank3";
        else if(i<10) cls+=" top10";

        html+=`
        <div class="${cls}">
            <div class="club">
                <span class="player-label">Player :</span>
                <span class="player-name">${name}</span>
                <span class="player-id">(${id})</span>
            </div>

            <div class="grid">
                <div class="box">🟢 Win : ${p.win}</div>
                <div class="box">🔴 Loss : ${p.loss}</div>
                <div class="box">🟡 Draw : ${p.draw}</div>
                <div class="box">🎮 Match : ${p.match}</div>
                <div class="box">📊 Win% : ${p.winp.toFixed(1)}</div>
                <div class="box">⚽ Rate : ${p.rate.toFixed(2)}</div>
                <div class="box">⚽ Goals : ${p.gs}</div>
                <div class="box">🥅 Conceded : ${p.gc}</div>
                <div class="box">📈 Diff : ${p.diff}</div>
                <div class="box">👑 7+ Goals : ${p.seven}</div>
                <div class="box">🤝 Friendly : ${p.friendly}</div>
                <div class="box">🏆 Tour : ${p.other}</div>
            </div>

            <div class="download">
                <button onclick="downloadCard(this)">Download</button>
            </div>
        </div>`;
    });

    document.getElementById("data").innerHTML=html;
}

function downloadCard(btn){
    html2canvas(btn.closest(".card")).then(c=>{
        let a=document.createElement("a");
        a.download="GOAT_FC_STATS.jpg";
        a.href=c.toDataURL("image/jpeg");
        a.click();
    });
}

async function init(){
    await Promise.all([loadMembers(),loadMatches()]);
    render();
}
init();

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>

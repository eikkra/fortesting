<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC MATCH LOG</title>

<style>
body{margin:0;font-family:sans-serif;background:#020617;color:#e2e8f0}

/* HEADER */
.header{display:flex;justify-content:center;align-items:center;gap:8px;padding:10px}
.header img{width:35px}
.header h1{font-size:15px;color:#00f5ff;text-shadow:0 0 10px #00f5ff}

.desc{text-align:center;font-size:11px;color:#94a3b8}

/* TAB */
.tabs{display:flex;justify-content:center;gap:6px}
.tab{padding:5px 10px;border:1px solid #00f5ff;border-radius:5px;color:#00f5ff;font-size:11px;cursor:pointer}
.active{background:#00f5ff;color:black}

/* FILTER */
.filter{display:flex;gap:5px;padding:8px;justify-content:center;overflow:auto}
select,input,button{padding:5px;font-size:11px;border:1px solid #00f5ff;background:black;color:#00f5ff;border-radius:5px}
button{background:#00f5ff;color:black}

/* TABLE */
.container{max-height:65vh;overflow:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead{position:sticky;top:0;background:#020617}
th,td{padding:6px;text-align:center;font-size:11px;white-space:nowrap}
th{color:#00f5ff;border-bottom:2px solid #00f5ff}

.win{color:#22c55e}
.loss{color:#ef4444}
.draw{color:#facc15}
.gold{color:gold;text-shadow:0 0 8px gold}

/* STATS */
.stats{display:none;padding:10px}
.card{
    border:1px solid #00f5ff;
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;
    text-align:center;
    background:linear-gradient(135deg,#020617,#020617,#001f2f);
    box-shadow:0 0 15px #00f5ff;
    animation:fade 0.4s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1}}

.club{
    font-weight:bold;
    color:#00f5ff;
    text-shadow:0 0 10px #00f5ff;
    margin-bottom:5px;
}

/* MOBILE */
@media(max-width:768px){
    th,td{font-size:10px}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/LY3Bb9m.png">
<h1>GOAT FC MATCH LOG</h1>
</div>

<div class="desc">Live approved match logs & player statistics</div>

<div class="tabs">
<div class="tab active" onclick="tab('log',this)">Log</div>
<div class="tab" onclick="tab('stats',this)">Stats</div>
</div>

<!-- FILTER -->
<div class="filter" id="filterBox">
<select id="type">
<option value="">All</option>
<option value="Friendly">Friendly</option>
<option value="Solo Tournament">Solo</option>
<option value="Bid Tournament">Bid</option>
<option value="League">League</option>
<option value="Co-op">Co-op</option>
</select>
<input type="date" id="start">
<input type="date" id="end">
<button onclick="filter()">Filter</button>
</div>

<!-- LOG -->
<div class="container" id="log">
<table>
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Player 1</th>
<th>Player 2</th>
<th>Score</th>
<th>Points</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>

<!-- STATS -->
<div class="stats" id="stats"></div>

<script>

const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";

let data=[];

// DATE
function parseDate(s){
    try{
        let p=s.split(" ")[0].split("/");
        return new Date(p[2],p[0]-1,p[1]);
    }catch{return null;}
}

// LOAD (FIXED FAST)
async function load(){
    let t=await fetch(URL+"?t="+Date.now()).then(r=>r.text());
    let lines=t.split("\n");

    data=lines.slice(1).map(l=>{
        let r=l.split(",");
        if(r.length<12) return null;
        let d=parseDate(r[11]);
        if(!d) return null;

        return {
            date:d,type:r[2],
            p1:r[0],p2:r[1],
            s1:+r[3],s2:+r[4],
            pt1:+r[5],pt2:+r[6],
            ok:(r[9]||"").toLowerCase()
        };
    }).filter(x=>x && x.ok==="yes");

    render(data);
}

// RENDER LOG
function render(arr){
    let h="";
    arr.slice(0,500).forEach(r=>{
        let c1="draw",c2="draw";
        if(r.s1>r.s2){c1="win";c2="loss";}
        else if(r.s1<r.s2){c1="loss";c2="win";}
        let g=(r.s1>=7||r.s2>=7)?"gold":"";

        h+=`<tr>
        <td>${r.date.toISOString().slice(0,10)}</td>
        <td>${r.type.replace(" Tournament","")}</td>
        <td class="${c1}">${r.p1}</td>
        <td class="${c2}">${r.p2}</td>
        <td class="${g}">${r.s1}-${r.s2}</td>
        <td>${r.pt1}-${r.pt2}</td>
        </tr>`;
    });
    document.getElementById("body").innerHTML=h;
}

// FILTER
function filter(){
    let t=document.getElementById("type").value;
    let s=document.getElementById("start").value;
    let e=document.getElementById("end").value;

    let res=data.filter(r=>
        (!t||r.type===t)&&
        (!s||r.date>=new Date(s))&&
        (!e||r.date<=new Date(e))
    );

    render(res);
}

// TAB
function tab(t,el){
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    el.classList.add("active");

    document.getElementById("log").style.display=t==="log"?"block":"none";
    document.getElementById("filterBox").style.display=t==="log"?"flex":"none";
    document.getElementById("stats").style.display=t==="stats"?"block":"none";

    if(t==="stats") stats();
}

// STATS (SORT BY WIN)
function stats(){
    let map={};

    data.forEach(r=>{
        [r.p1,r.p2].forEach((p,i)=>{
            if(!map[p]) map[p]={w:0,l:0,d:0,gs:0,gc:0,s7:0};

            let me=i? r.s2:r.s1;
            let op=i? r.s1:r.s2;

            map[p].gs+=me;
            map[p].gc+=op;

            if(me>=7) map[p].s7++;

            if(me>op) map[p].w++;
            else if(me<op) map[p].l++;
            else map[p].d++;
        });
    });

    let sorted=Object.entries(map).sort((a,b)=>b[1].w-a[1].w);

    let h="";
    sorted.forEach(([p,s])=>{
        h+=`
        <div class="card">
        <div class="club">Club ID: ${p}</div>
        🟢 Win: ${s.w} | 🔴 Loss: ${s.l} | 🟡 Draw: ${s.d}<br>
        ⚽ Scored: ${s.gs} | 🥅 Conceded: ${s.gc}<br>
        👑 7+ Goals: ${s.s7}
        </div>`;
    });

    document.getElementById("stats").innerHTML=h;
}

load();
</script>

</body>
</html>

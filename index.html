<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Managers</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
    --bg:#050816;
    --card:#0d1329;
    --card2:#101935;
    --accent:#00f0ff;
    --accent2:#ff00c8;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
    --green:#00ff88;
    --muted:#94a7d0;
    --text:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    background:
    radial-gradient(circle at top left,#10244f 0%,#050816 45%),
    radial-gradient(circle at bottom right,#2b0034 0%,#050816 55%);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    padding:14px;
}

.container{max-width:1600px;margin:auto;}

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
}
.header img{width:36px;height:36px;}
.header h1{
    font-family:'Orbitron';
    font-size:1.25rem;
    font-weight:900;
    letter-spacing:1px;
    background:linear-gradient(90deg,#00f0ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
.desc{
    text-align:center;
    color:var(--muted);
    font-size:.85rem;
    margin-bottom:18px;
}

.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

.manager-card{
    background:
      radial-gradient(circle at top right,rgba(0,240,255,.08),transparent 35%),
      radial-gradient(circle at bottom left,rgba(255,0,200,.08),transparent 35%),
      linear-gradient(145deg,var(--card),var(--card2));
    border:1px solid rgba(0,240,255,.25);
    border-radius:18px;
    padding:14px;
    position:relative;
    box-shadow:
      0 8px 24px rgba(0,0,0,.35),
      inset 0 0 18px rgba(255,255,255,.015);
    overflow:hidden;
}

.top1{border:1px solid var(--gold);box-shadow:0 0 18px rgba(255,215,0,.18);}
.top2{border:1px solid var(--silver);box-shadow:0 0 18px rgba(192,192,192,.14);}
.top3{border:1px solid var(--bronze);box-shadow:0 0 18px rgba(205,127,50,.14);}

/* Rank Badge */
.rank-badge{
    position:absolute;
    top:10px;
    right:10px;
    padding:6px 12px;
    border-radius:999px;
    font-size:.68rem;
    font-family:'Orbitron';
    font-weight:800;
    letter-spacing:.5px;
    background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(255,255,255,.06));
    border:1px solid rgba(255,255,255,.14);
    backdrop-filter:blur(8px);
    box-shadow:0 4px 14px rgba(0,0,0,.25);
}

/* Download Icon */
.download-icon{
    position:absolute;
    top:48px;
    right:14px;
    width:28px;
    height:28px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    background:rgba(0,240,255,.08);
    border:1px solid rgba(0,240,255,.2);
    transition:.25s;
}
.download-icon:hover{
    transform:scale(1.08);
    background:rgba(0,240,255,.16);
}
.download-icon svg{
    width:14px;
    height:14px;
    fill:#00f0ff;
}

.team-top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}
.team-logo{
    width:54px;
    height:54px;
    border-radius:14px;
    object-fit:cover;
    border:2px solid var(--accent);
}
.team-info h3{
    font-size:1rem;
    font-weight:700;
    letter-spacing:.3px;
}
.team-info p{
    color:var(--accent);
    font-size:.82rem;
}
.team-strength{
    font-size:.72rem;
    color:#ffcf66;
    margin-top:2px;
    font-weight:600;
}

.players-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:12px;
}

.player-box{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(0,255,136,.28);
    border-radius:12px;
    padding:8px;
    font-size:.72rem;
}
.player-box.best-player{
    border:1px solid var(--gold);
    box-shadow:0 0 10px rgba(255,215,0,.12);
}

.player-id{
    font-weight:700;
    color:var(--accent);
    font-size:.78rem;
}
.player-name{
    font-size:.62rem;
    color:#ff8ae2;
    margin-bottom:5px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.stat-row{
    display:flex;
    gap:4px;
    margin-bottom:4px;
}
.stat-pill{
    flex:1;
    background:rgba(0,240,255,.08);
    border:1px solid rgba(0,240,255,.12);
    border-radius:6px;
    text-align:center;
    padding:3px 2px;
    font-size:.58rem;
    white-space:nowrap;
}

.line-stat{
    background:rgba(255,255,255,.03);
    padding:4px 5px;
    border-radius:6px;
    margin-bottom:4px;
    text-align:center;
    font-size:.63rem;
}

.summary{
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    overflow:hidden;
}
.summary-title{
    background:rgba(0,240,255,.12);
    padding:7px;
    text-align:center;
    font-weight:700;
    color:var(--accent);
    font-size:.82rem;
    border-bottom:1px solid rgba(255,255,255,.08);
}
.summary-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}
.summary-grid div{
    text-align:center;
    padding:9px 4px;
    border-right:1px solid rgba(255,255,255,.08);
}
.summary-grid div:last-child{border-right:none;}

.summary-grid b{
    display:block;
    font-size:.92rem;
    color:#fff;
    margin-bottom:2px;
}
.summary-grid span{
    display:block;
    font-size:.62rem;
    color:#7fdfff;
    letter-spacing:.4px;
}

/* Mobile */
@media(max-width:768px){
    .manager-grid{grid-template-columns:1fr;}
    .players-grid{grid-template-columns:repeat(2,1fr);}
    .summary-grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.imgur.com/LY3Bb9m.png" crossorigin="anonymous">
        <h1>GOAT FC MANAGERS</h1>
    </div>

    <div class="desc">
        Official Manager Ranking Based On Registered Squad League Performance
    </div>

    <div id="managerGrid" class="manager-grid">Loading...</div>
</div>

</body>
</html>

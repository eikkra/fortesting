<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Managers</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/LY3Bb9m.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
    --bg:#050816;
    --card:#0d1329;
    --card2:#101935;
    --accent:#00f0ff;
    --accent2:#ff00c8;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
    --green:#00ff88;
    --muted:#94a7d0;
    --text:#fff;
}

/* GLOBAL */
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:
    radial-gradient(circle at top left,#10244f 0%,#050816 45%),
    radial-gradient(circle at bottom right,#2b0034 0%,#050816 55%);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    padding:14px;
}

/* HEADER */
.container{max-width:1600px;margin:auto;}

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
}

.header img{width:36px;height:36px;}

.header h1{
    font-family:'Orbitron';
    font-size:1.25rem;
    background:linear-gradient(90deg,#00f0ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* DESC */
.desc{
    text-align:center;
    color:var(--muted);
    font-size:.85rem;
    margin-bottom:18px;
}

/* GRID */
.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

/* CARD */
.manager-card{
    position:relative;
    background:linear-gradient(145deg,var(--card),var(--card2));
    border:1px solid rgba(0,240,255,.25);
    border-radius:18px;
    padding:14px;
    overflow:hidden;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
}

/* subtle glow animation */
.manager-card::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:radial-gradient(circle at 30% 20%,rgba(0,240,255,.12),transparent 50%),
               radial-gradient(circle at 80% 70%,rgba(255,0,200,.10),transparent 60%);
    z-index:0;
    pointer-events:none;
}

/* RANK BADGE (NEW PREMIUM) */
.rank-badge{
    position:absolute;
    top:10px;
    right:10px;
    padding:5px 12px;
    border-radius:999px;
    font-size:.72rem;
    font-family:'Orbitron';
    font-weight:800;
    letter-spacing:.5px;
    backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.15);
    z-index:2;
}

.top1 .rank-badge{
    background:linear-gradient(135deg,#FFD700,#ffae00);
    color:#000;
    box-shadow:0 0 14px rgba(255,215,0,.35);
}

.top2 .rank-badge{
    background:linear-gradient(135deg,#d9d9d9,#9e9e9e);
    color:#000;
    box-shadow:0 0 14px rgba(200,200,200,.25);
}

.top3 .rank-badge{
    background:linear-gradient(135deg,#cd7f32,#a85a1f);
    color:#000;
    box-shadow:0 0 14px rgba(205,127,50,.25);
}

/* DOWNLOAD ICON (NEW) */
.download-icon{
    position:absolute;
    top:42px;
    right:12px;
    cursor:pointer;
    z-index:2;
    width:22px;
    height:22px;
    opacity:.85;
    transition:.2s;
}

.download-icon:hover{
    opacity:1;
    transform:scale(1.15);
    filter:drop-shadow(0 0 6px var(--accent));
}

/* TEAM */
.team-top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    position:relative;
    z-index:1;
}

.team-logo{
    width:54px;
    height:54px;
    border-radius:14px;
    object-fit:cover;
    border:2px solid var(--accent);
}

.team-info h3{
    font-size:1rem;
}

.team-info p{
    color:var(--accent);
    font-size:.82rem;
}

.team-strength{
    font-size:.72rem;
    color:#ffcf66;
    margin-top:2px;
}

/* PLAYERS */
.players-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:12px;
    position:relative;
    z-index:1;
}

/* PLAYER BOX */
.player-box{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(0,255,136,.35);
    border-radius:12px;
    padding:8px;
    font-size:.72rem;
}

/* BEST PLAYER */
.player-box.best-player{
    border:1px solid var(--gold);
    box-shadow:0 0 10px rgba(255,215,0,.18);
}

/* PLAYER TEXT */
.player-id{color:var(--accent);font-weight:700;}
.player-name{
    font-size:.62rem;
    color:#ff8ae2;
    margin-bottom:5px;
}

/* STATS */
.stat-row{
    display:flex;
    gap:4px;
    margin-bottom:4px;
}

.stat-pill{
    flex:1;
    background:rgba(0,240,255,.08);
    border:1px solid rgba(0,240,255,.12);
    border-radius:6px;
    text-align:center;
    padding:3px 2px;
    font-size:.58rem;
}

/* LINE STATS */
.line-stat{
    background:rgba(255,255,255,.03);
    padding:4px 5px;
    border-radius:6px;
    margin-bottom:4px;
    text-align:center;
    font-size:.63rem;
}

/* SUMMARY */
.summary{
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    overflow:hidden;
    position:relative;
    z-index:1;
}

.summary-title{
    background:rgba(0,240,255,.12);
    padding:7px;
    text-align:center;
    font-weight:700;
    color:var(--accent);
    font-size:.82rem;
}

/* NEW VISUAL SUMMARY */
.summary-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

.summary-grid div{
    text-align:center;
    padding:8px 4px;
    border-right:1px solid rgba(255,255,255,.08);
    font-size:.7rem;
}

/* color separation */
.s1{color:#00f0ff;}
.s2{color:#ff00c8;}
.s3{color:#FFD700;}
.s4{color:#00ff88;}

.summary-grid div:last-child{border-right:none;}

/* MOBILE */
@media(max-width:768px){
    .manager-grid{grid-template-columns:1fr;}
    .players-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="https://i.imgur.com/LY3Bb9m.png" crossorigin="anonymous">
    <h1>GOAT FC MANAGERS</h1>
</div>

<div class="desc">Official Manager Ranking Based On League Performance</div>

<div id="managerGrid" class="manager-grid">Loading...</div>

</div>

<script>
const POINTS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MANAGERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";
const MEMBERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

function parseCSV(t){
return t.trim().split("\n").map(r=>r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v=>v.replace(/^"|"$/g,"").trim()));
}

async function load(){
const [p,m,c]=await Promise.all([fetch(POINTS_URL),fetch(MANAGERS_URL),fetch(MEMBERS_URL)]);
const matches=parseCSV(await p.text());
const managers=parseCSV(await m.text());
const members=parseCSV(await c.text());

const pH=matches.shift(), mH=managers.shift(), cH=members.shift();

const nameMap={};
members.forEach(r=>{
const o=Object.fromEntries(cH.map((h,i)=>[h,r[i]]));
nameMap[o["Club ID Number"]]=o["Full Name"];
});

const mObj=matches.map(r=>Object.fromEntries(pH.map((h,i)=>[h,r[i]])));

const res=[];

for(const r of managers){
const man=Object.fromEntries(mH.map((h,i)=>[h,r[i]]));
const ids=man["Player IDs"].split(",").map(x=>x.trim()).slice(0,6);

const stats={};
ids.forEach(id=>stats[id]={m:0,pts:0,w:0,d:0,l:0,gf:0,ga:0});

for(const m of mObj){
if(m.Approved.toLowerCase()!=="yes") continue;

if(stats[m.P1_ID]){
let s=stats[m.P1_ID];
s.m++;s.pts+=+m.P1_Point;s.gf+=+m.P1_Goal;s.ga+=+m.P2_Goal;
if(+m.P1_Point===3)s.w++;else if(+m.P1_Point===1)s.d++;else s.l++;
}

if(stats[m.P2_ID]){
let s=stats[m.P2_ID];
s.m++;s.pts+=+m.P2_Point;s.gf+=+m.P2_Goal;s.ga+=+m.P1_Goal;
if(+m.P2_Point===3)s.w++;else if(+m.P2_Point===1)s.d++;else s.l++;
}
}

let total={m:0,pts:0,w:0,gd:0};

const players=ids.map(id=>{
const s=stats[id];
s.gd=s.gf-s.ga;
s.wc=s.m?Math.round((s.w/s.m)*100):0;

total.m+=s.m;total.pts+=s.pts;total.w+=s.w;total.gd+=s.gd;

return {id,name:nameMap[id]||"Unknown",...s};
});

total.wc=total.m?Math.round((total.w/total.m)*100):0;

res.push({...man,players,total});
}

res.sort((a,b)=>b.total.pts-a.total.pts||b.total.gd-a.total.gd);

render(res);
}

function downloadCard(id,name){
html2canvas(document.getElementById(id),{
useCORS:true,
scale:2,
backgroundColor:null
}).then(c=>{
const a=document.createElement("a");
a.download=name+".jpg";
a.href=c.toDataURL("image/jpeg",1);
a.click();
});
}

function render(data){
document.getElementById("managerGrid").innerHTML=data.map((m,i)=>`
<div class="manager-card ${i===0?'top1':i===1?'top2':i===2?'top3':''}" id="c${i}">

<div class="rank-badge">#${i+1}</div>

<svg class="download-icon" onclick="downloadCard('c${i}','${m["Team Name"]}')"
viewBox="0 0 24 24" fill="none" stroke="cyan" stroke-width="2">
<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
<polyline points="7 10 12 15 17 10"/>
<line x1="12" y1="15" x2="12" y2="3"/>
</svg>

<div class="team-top">
<img class="team-logo" src="${m["Team Logo"]}" crossorigin="anonymous">
<div class="team-info">
<h3>${m["Team Name"]}</h3>
<p>${m["Manager Name"]}</p>
<div class="team-strength">Strength: ${m.total.pts}</div>
</div>
</div>

<div class="players-grid">
${m.players.map((p,idx)=>`
<div class="player-box ${idx===0?'best-player':''}">
<div class="player-id">${p.id}</div>
<div class="player-name">${p.name}</div>

<div class="stat-row">
<div class="stat-pill">M ${p.m}</div>
<div class="stat-pill">PTS ${p.pts}</div>
<div class="stat-pill">W% ${p.wc}</div>
</div>

<div class="line-stat">W-D-L: ${p.w}-${p.d}-${p.l}</div>
<div class="line-stat">GF-GA-GD: ${p.gf}-${p.ga}-${p.gd}</div>
</div>
`).join("")}
</div>

<div class="summary">
<div class="summary-title">Team Summary</div>
<div class="summary-grid">
<div class="s1"><b>${m.total.m}</b>Match</div>
<div class="s2"><b>${m.total.pts}</b>PTS</div>
<div class="s3"><b>${m.total.gd}</b>GD</div>
<div class="s4"><b>${m.total.wc}%</b>Win%</div>
</div>
</div>

</div>
`).join("");
}

load();
</script>

</body>
</html>

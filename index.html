<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC STATISTICS</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#020617;
    color:white;
}

/* HEADER */
.header{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px;
}

.logo{
    width:55px;
    margin-bottom:5px;
    filter:drop-shadow(0 0 10px #00f5ff) drop-shadow(0 0 20px #00f5ff);
}

.title{
    color:#00f5ff;
    font-size:18px;
    text-shadow:0 0 10px #00f5ff,0 0 25px #00f5ff;
}

/* DESCRIPTION */
.desc{
    text-align:center;
    font-size:11px;
    color:#94a3b8;
    margin-bottom:5px;
}

/* SEARCH */
.search{
    text-align:center;
    margin:10px;
}
.search input{
    padding:8px;
    width:85%;
    max-width:320px;
    border-radius:8px;
    border:1px solid #00f5ff;
    background:black;
    color:#00f5ff;
    box-shadow:0 0 10px #00f5ff;
}

/* CARD */
.card{
    margin:12px;
    padding:12px;
    border-radius:14px;
    background:linear-gradient(145deg,#020617,#001f2f);
    border:1px solid #00f5ff;
    box-shadow:0 0 20px #00f5ff;
    text-align:center;
}

/* CLUB */
.club{
    font-size:14px;
    font-weight:bold;
    margin-bottom:10px;
    color:#00f5ff;
    text-shadow:0 0 10px #00f5ff;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
}
.box{
    padding:6px;
    border-radius:8px;
    font-size:11px;
    background:#001f2f;
    border:1px solid #00f5ff;
    box-shadow:0 0 8px #00f5ff inset;
}

/* BUTTON */
.btns{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:10px;
}
.btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#00f5ff;
    color:black;
    cursor:pointer;
    font-size:11px;
}

/* MOBILE */
@media(max-width:768px){
    .grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/LY3Bb9m.png" class="logo">
<div class="title">GOAT FC STATISTICS</div>
</div>

<div class="desc">
Live approved match statistics • Auto updated • Powered by Goat FC System
</div>

<div class="search">
<input type="text" id="search" placeholder="Search Club ID (GFC001 / GFC-001)" oninput="render()">
</div>

<div id="data"></div>

<script>

const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";

let data=[];

// normalize search
function normalize(s){
    return s.toLowerCase().replace(/[^a-z0-9]/g,"");
}

// safe parse
function parseCSV(text){
    return text.trim().split("\n").slice(1).map(row=>{
        let c=row.split(",");
        return {
            p1:c[0],
            p2:c[1],
            type:c[2],
            s1:+c[3],
            s2:+c[4],
            approved:(c[9]||"").toLowerCase()
        };
    }).filter(x=>x.approved==="yes");
}

// LOAD DATA
async function load(){
    let txt=await fetch(URL+"?t="+Date.now()).then(r=>r.text());
    let rows=parseCSV(txt);

    let map={};

    rows.forEach(r=>{
        [[r.p1,r.s1,r.s2],[r.p2,r.s2,r.s1]].forEach(([id,me,op])=>{
            if(!map[id]) map[id]={w:0,l:0,d:0,m:0,gs:0,gc:0,s7:0,f:0,o:0};

            map[id].m++;
            map[id].gs+=me;
            map[id].gc+=op;

            if(me>=7) map[id].s7++;

            if(r.type==="Friendly") map[id].f++;
            else map[id].o++;

            if(me>op) map[id].w++;
            else if(me<op) map[id].l++;
            else map[id].d++;
        });
    });

    data=Object.entries(map).map(([id,v])=>{
        return{
            id,
            ...v,
            winp:v.m? (v.w/v.m*100):0,
            rate:v.m? (v.gs/v.m):0,
            diff:v.gs-v.gc
        }
    });

    render();
}

// RENDER
function render(){
    let q=normalize(document.getElementById("search").value);

    let sorted=data.sort((a,b)=>b.w-a.w);

    let html="";
    sorted.forEach(p=>{
        if(q && !normalize(p.id).includes(q)) return;

        html+=`
        <div class="card">
        <div class="club">Player ID: ${p.id}</div>

        <div class="grid">
            <div class="box">🟢 Win<br>${p.w}</div>
            <div class="box">🔴 Loss<br>${p.l}</div>
            <div class="box">🟡 Draw<br>${p.d}</div>

            <div class="box">🎮 Match<br>${p.m}</div>
            <div class="box">📊 Win%<br>${p.winp.toFixed(1)}</div>
            <div class="box">⚽ Rate<br>${p.rate.toFixed(2)}</div>

            <div class="box">⚽ Scored<br>${p.gs}</div>
            <div class="box">🥅 Conceded<br>${p.gc}</div>
            <div class="box">📈 Difference<br>${p.diff}</div>

            <div class="box">👑 7+ Goals<br>${p.s7}</div>
            <div class="box">🤝 Friendly<br>${p.f}</div>
            <div class="box">🏆 Tournaments<br>${p.o}</div>
        </div>

        <div class="btns">
            <button class="btn" onclick="share('${p.id}')">Share</button>
        </div>
        </div>`;
    });

    document.getElementById("data").innerHTML=html;
}

// SHARE
function share(id){
    let text="My Goat FC Stats: "+id;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

load();

</script>

</body>
</html>

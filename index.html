<!DOCTYPE html>
<html>
<head>
<title>Goat FC Leaderboard</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Oswald',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
}

/* HEADER */
.header{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
padding:10px;
}

.logo{
width:45px;
}

h1{
margin:0;
font-size:20px;
color:#00ffcc;
}

/* DESCRIPTION */
.desc{
font-size:11px;
opacity:.8;
margin-bottom:8px;
}

/* BUTTON */
.tabs{margin:6px;}

button{
padding:5px 10px;
border:none;
border-radius:12px;
background:#1f2937;
color:white;
font-size:11px;
}

button.active{
background:#00ffcc;
color:black;
}

/* STATS */
.stats{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:6px;
margin-bottom:8px;
}

.stat{
padding:5px 10px;
border-radius:8px;
background:rgba(0,255,200,0.08);
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 4px #00ffcc;}
to{box-shadow:0 0 10px #00ffcc;}
}

/* TABLE */
.card{
width:95%;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:5px;
font-size:11px;
}

th{color:#00ffcc;}

.player{
text-align:left;
line-height:1.2;
}

.id{
font-size:9px;
opacity:.6;
}

/* RANK */
.rank1{background:rgba(255,215,0,0.2);}
.rank2{background:rgba(192,192,192,0.2);}
.rank3{background:rgba(205,127,50,0.2);}
.top10{background:rgba(0,255,150,0.08);}

/* 📱 MOBILE */
@media(max-width:600px){

h1{font-size:16px;}
.logo{width:35px;}

th,td{
font-size:10px;
padding:4px;
}

.stat{
font-size:10px;
padding:4px 6px;
}

}

</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/LY3Bb9m.png" class="logo">
<h1>GOAT FC LEADERBOARD</h1>
</div>

<div class="desc">Competitive ranking system for Goat FC players based on performance, goals, and match activity.</div>

<div class="tabs">
<button onclick="loadData('overall')" id="overallBtn" class="active">Overall</button>
<button onclick="loadData('monthly')" id="monthlyBtn">Monthly</button>
</div>

<!-- STATS -->
<div class="stats">
<div class="stat">Match: <span id="m">0</span></div>
<div class="stat">Goal: <span id="g">0</span></div>
<div class="stat">Points: <span id="p">0</span></div>
<div class="stat">Per Match: <span id="pm">0</span></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>Pts</th>
<th>M</th>
<th>Win%</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>

const L="https://opensheet.elk.sh/1DSPKPaU1ZQYbFM4iYbE1VXgDAXU-FCT7--QhYJsNf1M/Leaderboard%20Goat%20FC";
const M="https://opensheet.elk.sh/1DSPKPaU1ZQYbFM4iYbE1VXgDAXU-FCT7--QhYJsNf1M/CLUB%20MEMBERS";

let type="overall";

async function loadData(t){

type=t;

document.getElementById("overallBtn").classList.remove("active");
document.getElementById("monthlyBtn").classList.remove("active");
document.getElementById(t+"Btn").classList.add("active");

let [ld,md]=await Promise.all([
fetch(L).then(r=>r.json()),
fetch(M).then(r=>r.json())
]);

// MAP
let map={};
md.forEach(x=>{
if(x["Club ID Number"])
map[x["Club ID Number"].trim()]=x["Full Name"];
});

// FILTER ONLY VALID
ld=ld.filter(r=>map[r["Club_ID"]?.trim()]);

// 🔥 SMART SORT
ld.sort((a,b)=>{

let A_pt=+(t==="overall"?a["Overall_Point"]:a["Monthly_Point"])||0;
let B_pt=+(t==="overall"?b["Overall_Point"]:b["Monthly_Point"])||0;

let A_m=+(t==="overall"?a["Overall_PL"]:a["Monthly_PL"])||0;
let B_m=+(t==="overall"?b["Overall_PL"]:b["Monthly_PL"])||0;

// 0 match last
if(A_m===0 && B_m>0) return 1;
if(B_m===0 && A_m>0) return -1;

// POINT
if(B_pt!==A_pt) return B_pt-A_pt;

// GD
let A_gd=+(t==="overall"?a["Total GD"]:a["Montly GD"])||0;
let B_gd=+(t==="overall"?b["Total GD"]:b["Montly GD"])||0;
if(B_gd!==A_gd) return B_gd-A_gd;

// GF
let A_gf=+(t==="overall"?a["Total GF"]:a["Montly GF"])||0;
let B_gf=+(t==="overall"?b["Total GF"]:b["Montly GF"])||0;
if(B_gf!==A_gf) return B_gf-A_gf;

// MATCH
return B_m-A_m;

});

let tbody=document.getElementById("table");
tbody.innerHTML="";

let totalM=0,totalG=0,totalP=0;

ld.forEach((r,i)=>{

let cls=i==0?"rank1":i==1?"rank2":i==2?"rank3":i<10?"top10":"";

let m=+(t==="overall"?r["Overall_PL"]:r["Monthly_PL"])||0;
let gf=+(t==="overall"?r["Total GF"]:r["Montly GF"])||0;
let pt=+(t==="overall"?r["Overall_Point"]:r["Monthly_Point"])||0;

totalM+=m;
totalG+=gf;
totalP+=pt;

let win=(+((t==="overall"?r["Overall_Win%"]:r["Monthly_Win%"]))||0)*100;
if(!isFinite(win)) win=0;

let ga=t==="overall"?r["Total GA"]:r["Montly GA"];
let gd=t==="overall"?r["Total GD"]:r["Montly GD"];

tbody.innerHTML+=`
<tr class="${cls}">
<td>${i+1}</td>
<td class="player">
${map[r["Club_ID"]]}
<div class="id">${r["Club_ID"]}</div>
</td>
<td>${pt}</td>
<td>${m}</td>
<td>${win.toFixed(1)}%</td>
<td>${gf}</td>
<td>${ga}</td>
<td>${gd}</td>
</tr>`;
});

// STATS
let match=Math.round(totalM/2);
let per=match?(totalG/match).toFixed(2):0;

document.getElementById("m").innerText=match;
document.getElementById("g").innerText=totalG;
document.getElementById("p").innerText=totalP;
document.getElementById("pm").innerText=per;

}

loadData("overall");
setInterval(()=>loadData(type),30000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Goat FC Competition Center</title>

<!-- Gaming Font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Orbitron', sans-serif;
  background: #0a0a0a;
  color:white;
}

/* RGB Glow */
.glow {
  text-shadow: 0 0 5px red, 0 0 10px blue, 0 0 20px lime;
}

/* Tabs */
.tabs {
  display:flex;
  background:#111;
}
.tab {
  padding:15px;
  cursor:pointer;
}
.tab.active {
  background:#222;
}

/* Fixture Card */
.match {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  margin:10px;
  border:1px solid #333;
  border-radius:10px;
  background:#111;
}

.team {
  display:flex;
  align-items:center;
  gap:10px;
}

.team img {
  width:40px;
}

.score {
  font-size:20px;
  padding:10px;
  border:1px solid #444;
  border-radius:10px;
}

/* Responsive */
@media(max-width:600px){
  .match{
    flex-direction:column;
  }
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('fixture')">Fixtures</div>
  <div class="tab" onclick="showTab('team')">Team VS</div>
</div>

<div id="fixture"></div>
<div id="team" style="display:none;"></div>

<script>

// ====== CSV LINKS ======
const clubURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";

const pointsURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";

const membersURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";


// ===== CSV PARSER =====
function parseCSV(text){
  return text.split("\n").slice(1).map(r=>r.split(","));
}

// ===== FETCH DATA =====
async function loadData(){
  const club = await fetch(clubURL).then(r=>r.text());
  const teams = parseCSV(club);

  const points = await fetch(pointsURL).then(r=>r.text());
  const matches = parseCSV(points);

  generateFixtures(teams, matches);
  generateTeamVS(teams);
}

// ===== FIXTURE GENERATOR =====
function generateFixtures(teams, matches){

  let container = document.getElementById("fixture");
  container.innerHTML = "";

  for(let i=0;i<teams.length;i++){
    for(let j=i+1;j<teams.length;j++){

      let home = teams[i];
      let away = teams[j];

      let scoreA = calcScore(home[3], matches);
      let scoreB = calcScore(away[3], matches);

      container.innerHTML += `
      <div class="match">
        <div class="team">
          <img src="${home[1]}">
          ${home[0]}
        </div>

        <div class="score glow">${scoreA} - ${scoreB}</div>

        <div class="team">
          ${away[0]}
          <img src="${away[1]}">
        </div>
      </div>`;
    }
  }
}

// ===== SCORE CALC =====
function calcScore(playerIds, matches){
  let ids = playerIds.split("-");
  let total = 0;

  matches.forEach(m=>{
    ids.forEach(id=>{
      if(m[0] === id){
        total += Number(m[5]); // point column
      }
    });
  });

  return total;
}

// ===== TEAM VS TAB =====
function generateTeamVS(teams){
  let container = document.getElementById("team");

  let options = teams.map(t=>`<option>${t[0]}</option>`).join("");

  container.innerHTML = `
    <select id="t1">${options}</select>
    VS
    <select id="t2">${options}</select>

    <button onclick="showPlayers()">Show Players</button>

    <div id="players"></div>
  `;
}

// ===== SHOW PLAYERS =====
function showPlayers(){
  let t1 = document.getElementById("t1").value;
  let t2 = document.getElementById("t2").value;

  document.getElementById("players").innerHTML =
  `<h3>${t1} vs ${t2}</h3>
   <p>Select players (coming next step)</p>`;
}

// ===== TAB SWITCH =====
function showTab(tab){
  document.getElementById("fixture").style.display = tab==="fixture"?"block":"none";
  document.getElementById("team").style.display = tab==="team"?"block":"none";
}

// INIT
loadData();

</script>

</body>
</html>

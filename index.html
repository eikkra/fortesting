<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Managers</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050816;
    --card:#0c1329;
    --card2:#101935;
    --accent:#00f0ff;
    --accent2:#ff00c8;
    --text:#fff;
    --muted:#9bb0d4;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    background:
    radial-gradient(circle at top left,#0d1f45 0%,#050816 40%),
    radial-gradient(circle at bottom right,#250028 0%,#050816 55%);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    padding:14px;
}

.container{
    max-width:1600px;
    margin:auto;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-bottom:8px;
    flex-wrap:wrap;
}

.header img{
    width:42px;
    height:42px;
    object-fit:contain;
}

.header h1{
    font-family:'Orbitron',sans-serif;
    font-size:1.5rem;
    background:linear-gradient(90deg,#00f0ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    text-align:center;
    color:var(--muted);
    margin-bottom:20px;
    font-size:.92rem;
}

/* GRID */
.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

/* CARD */
.manager-card{
    background:linear-gradient(145deg,var(--card),var(--card2));
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:16px;
    position:relative;
    box-shadow:0 8px 25px rgba(0,0,0,.35);
    transition:.3s;
}

.manager-card:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 28px rgba(0,240,255,.12);
}

/* RANK */
.rank{
    position:absolute;
    top:12px;
    right:12px;
    padding:5px 10px;
    border-radius:999px;
    font-size:.75rem;
    font-family:'Orbitron';
    font-weight:700;
}

.rank1{background:var(--gold);color:#000;}
.rank2{background:var(--silver);color:#000;}
.rank3{background:var(--bronze);color:#000;}

/* TEAM INFO */
.team-top{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
}

.team-logo{
    width:58px;
    height:58px;
    border-radius:14px;
    object-fit:cover;
    border:2px solid var(--accent);
}

.team-info h3{
    font-size:1.1rem;
    margin-bottom:2px;
}

.team-info p{
    color:var(--accent);
    font-size:.88rem;
}

/* PLAYERS */
.players-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:14px;
}

.player-box{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.06);
    padding:10px;
    border-radius:12px;
    font-size:.78rem;
    line-height:1.4;
}

.player-id{
    color:var(--accent);
    font-weight:700;
    margin-bottom:4px;
    font-size:.82rem;
}

/* SUMMARY */
.summary{
    border:1px solid rgba(255,255,255,.08);
    border-radius:14px;
    overflow:hidden;
}

.summary-title{
    background:rgba(0,240,255,.12);
    padding:8px 12px;
    font-weight:700;
    color:var(--accent);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

.summary-grid div{
    text-align:center;
    padding:10px 4px;
    border-right:1px solid rgba(255,255,255,.08);
    border-bottom:1px solid rgba(255,255,255,.08);
    font-size:.82rem;
}

.summary-grid div:nth-child(4n){
    border-right:none;
}

.summary-grid b{
    display:block;
    font-size:1rem;
    color:#fff;
}

/* MOBILE */
@media(max-width:768px){

    .header{
        gap:8px;
    }

    .header h1{
        font-size:1.1rem;
    }

    .header img{
        width:34px;
        height:34px;
    }

    .players-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .summary-grid{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <img src="https://i.imgur.com/LY3Bb9m.png">
        <h1>GOAT FC MANAGERS</h1>
    </div>

    <div class="desc">
        Official Manager Ranking Based On Registered Squad League Performance
    </div>

    <div id="managerGrid" class="manager-grid">
        Loading Manager Profiles...
    </div>

</div>

<script>
const POINTS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MANAGERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";

function parseCSV(text){
    const rows=text.trim().split("\n");
    return rows.map(r=>r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v=>v.replace(/^"|"$/g,"").trim()));
}

function toDate(v){ return new Date(v); }

async function loadData(){

    const [pRes,mRes]=await Promise.all([
        fetch(POINTS_URL),
        fetch(MANAGERS_URL)
    ]);

    const pCSV=parseCSV(await pRes.text());
    const mCSV=parseCSV(await mRes.text());

    const pHead=pCSV.shift();
    const mHead=mCSV.shift();

    const matches=pCSV.map(r=>Object.fromEntries(pHead.map((h,i)=>[h,r[i]])));
    const managers=mCSV.map(r=>Object.fromEntries(mHead.map((h,i)=>[h,r[i]])));

    const cards=[];

    for(const manager of managers){

        const playerIds=manager["Player IDs"].split(",").map(x=>x.trim()).slice(0,6);
        const start=toDate(manager["Start Match Date"]);
        const end=toDate(manager["End Match Date"]);

        const playerStats={};

        playerIds.forEach(id=>{
            playerStats[id]={match:0,pts:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,winPct:0};
        });

        for(const m of matches){

            if(m.Approved.toLowerCase()!=="yes") continue;
            if(m.Match_Type.toLowerCase()!=="league") continue;

            const md=toDate(m.Match_Date);
            if(md<start || md>end) continue;

            if(playerStats[m.P1_ID]){
                const s=playerStats[m.P1_ID];
                s.match++;
                s.pts+=+m.P1_Point;
                s.gf+=+m.P1_Goal;
                s.ga+=+m.P2_Goal;
                if(+m.P1_Point===3)s.w++;
                else if(+m.P1_Point===1)s.d++;
                else s.l++;
            }

            if(playerStats[m.P2_ID]){
                const s=playerStats[m.P2_ID];
                s.match++;
                s.pts+=+m.P2_Point;
                s.gf+=+m.P2_Goal;
                s.ga+=+m.P1_Goal;
                if(+m.P2_Point===3)s.w++;
                else if(+m.P2_Point===1)s.d++;
                else s.l++;
            }
        }

        let total={match:0,pts:0,w:0,gd:0};

        const players=playerIds.map(id=>{
            const s=playerStats[id];
            s.gd=s.gf-s.ga;
            s.winPct=s.match?((s.w/s.match)*100).toFixed(0):0;

            total.match+=s.match;
            total.pts+=s.pts;
            total.w+=s.w;
            total.gd+=s.gd;

            return {id,...s};
        });

        total.winPct=total.match?((total.w/total.match)*100).toFixed(0):0;

        cards.push({...manager,players,total});
    }

    cards.sort((a,b)=>
        b.total.pts-a.total.pts ||
        b.total.gd-a.total.gd ||
        b.total.winPct-a.total.winPct
    );

    render(cards);
}

function render(data){

    const grid=document.getElementById("managerGrid");

    grid.innerHTML=data.map((m,i)=>`
        <div class="manager-card">

            ${i<3?`<div class="rank rank${i+1}">${i+1}${["st","nd","rd"][i]}</div>`:""}

            <div class="team-top">
                <img class="team-logo" src="${m["Team Logo"]}">
                <div class="team-info">
                    <h3>${m["Team Name"]}</h3>
                    <p>${m["Manager Name"]}</p>
                </div>
            </div>

            <div class="players-grid">
                ${m.players.map(p=>`
                    <div class="player-box">
                        <div class="player-id">${p.id}</div>
                        Match: ${p.match}<br>
                        PTS: ${p.pts}<br>
                        W-D-L: ${p.w}-${p.d}-${p.l}<br>
                        GF-GA-GD: ${p.gf}-${p.ga}-${p.gd}<br>
                        Win%: ${p.winPct}%
                    </div>
                `).join("")}
            </div>

            <div class="summary">
                <div class="summary-title">Team Summary</div>
                <div class="summary-grid">
                    <div><b>${m.total.match}</b>Match</div>
                    <div><b>${m.total.pts}</b>PTS</div>
                    <div><b>${m.total.gd}</b>GD</div>
                    <div><b>${m.total.winPct}%</b>Win%</div>
                </div>
            </div>

        </div>
    `).join("");
}

loadData();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Managers</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
    --bg:#050816;
    --card:#0d1329;
    --card2:#101935;
    --accent:#00f0ff;
    --accent2:#ff00c8;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
    --green:#00ff88;
    --text:#fff;
    --muted:#9ab0d8;
}

/* BASE */
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:
    radial-gradient(circle at top left,#0f2a55 0%,#050816 50%),
    radial-gradient(circle at bottom right,#2b0034 0%,#050816 55%);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    padding:14px;
}

/* HEADER */
.container{max-width:1600px;margin:auto;}

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

.header img{width:36px;height:36px;}

.header h1{
    font-family:'Orbitron';
    font-size:1.25rem;
    letter-spacing:1px;
    background:linear-gradient(90deg,#00f0ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    text-align:center;
    color:var(--muted);
    font-size:.85rem;
    margin:10px 0 18px;
}

/* GRID */
.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

/* CARD - RGB GLOW EFFECT */
.manager-card{
    background:linear-gradient(145deg,var(--card),var(--card2));
    border-radius:18px;
    padding:14px;
    position:relative;
    overflow:hidden;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
    border:1px solid rgba(0,240,255,.25);
}

/* subtle RGB glow animation */
.manager-card::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:linear-gradient(120deg,#00f0ff,#ff00c8,#00ff88,#00f0ff);
    z-index:0;
    filter:blur(12px);
    opacity:.15;
    animation:glow 6s linear infinite;
}

@keyframes glow{
    0%{transform:rotate(0deg)}
    100%{transform:rotate(360deg)}
}

/* TOP RANK STYLE */
.rank-badge{
    position:absolute;
    top:10px;
    right:10px;
    font-family:'Orbitron';
    font-weight:700;
    font-size:.7rem;
    padding:5px 10px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    z-index:2;
    display:flex;
    align-items:center;
    gap:4px;
}

.rank-badge span{
    font-size:.9rem;
}

/* special rank colors */
.top1{border:1px solid var(--gold);box-shadow:0 0 14px rgba(255,215,0,.18);}
.top2{border:1px solid var(--silver);box-shadow:0 0 14px rgba(192,192,192,.15);}
.top3{border:1px solid var(--bronze);box-shadow:0 0 14px rgba(205,127,50,.15);}

/* DOWNLOAD ICON */
.download-icon{
    position:absolute;
    top:40px;
    right:12px;
    cursor:pointer;
    z-index:2;
    opacity:.85;
    transition:.2s;
}
.download-icon:hover{
    opacity:1;
    transform:scale(1.15);
}
.download-icon svg{
    width:18px;
    height:18px;
    fill:var(--accent);
}

/* TEAM */
.team-top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    position:relative;
    z-index:1;
}

.team-logo{
    width:54px;
    height:54px;
    border-radius:14px;
    object-fit:cover;
    border:2px solid var(--accent);
}

.team-info h3{
    font-size:1rem;
    letter-spacing:.3px;
}

.team-info p{
    color:var(--accent);
    font-size:.82rem;
}

.team-strength{
    font-size:.7rem;
    color:#ffd36b;
    margin-top:2px;
}

/* PLAYERS */
.players-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:12px;
    position:relative;
    z-index:1;
}

.player-box{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(0,255,136,.35);
    border-radius:12px;
    padding:8px;
    font-size:.7rem;
}

.player-box.best-player{
    border:1px solid var(--gold);
    box-shadow:0 0 10px rgba(255,215,0,.12);
}

/* STATS */
.stat-row{
    display:flex;
    gap:4px;
    margin-bottom:4px;
}

.stat-pill{
    flex:1;
    background:rgba(0,240,255,.08);
    border:1px solid rgba(0,240,255,.12);
    border-radius:6px;
    text-align:center;
    padding:3px 2px;
    font-size:.58rem;
}

/* SUMMARY */
.summary{
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    overflow:hidden;
    position:relative;
    z-index:1;
}

.summary-title{
    background:rgba(0,240,255,.12);
    padding:7px;
    text-align:center;
    font-weight:700;
    color:var(--accent);
    font-size:.82rem;
}

/* improved spacing + colors */
.summary-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

.summary-grid div{
    text-align:center;
    padding:8px 4px;
    font-size:.7rem;
    border-right:1px solid rgba(255,255,255,.08);
}

.summary-grid div:nth-child(1){color:#00f0ff;}
.summary-grid div:nth-child(2){color:#ff00c8;}
.summary-grid div:nth-child(3){color:#00ff88;}
.summary-grid div:nth-child(4){color:#ffd36b;}

.summary-grid div:last-child{border-right:none;}

@media(max-width:768px){
    .manager-grid{grid-template-columns:1fr;}
    .players-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div class="container">

<div class="header">
    <img src="https://i.imgur.com/LY3Bb9m.png">
    <h1>GOAT FC MANAGERS</h1>
</div>

<div class="desc">Official Manager Ranking System</div>

<div id="managerGrid" class="manager-grid">Loading...</div>

</div>

<script>
/* ALL YOUR ORIGINAL JS KEPT EXACTLY SAME (UNCHANGED FOR SPEED) */

const POINTS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MANAGERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";
const MEMBERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

function parseCSV(t){
return t.trim().split("\n").map(r=>r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v=>v.replace(/^"|"$/g,"").trim()));
}

async function loadData(){
const [p,m,c]=await Promise.all([fetch(POINTS_URL),fetch(MANAGERS_URL),fetch(MEMBERS_URL)]);
const matches=parseCSV(await p.text()),managers=parseCSV(await m.text()),members=parseCSV(await c.text());

const pH=matches.shift(),mH=managers.shift(),cH=members.shift();

const nameMap={};
members.forEach(r=>{
const o=Object.fromEntries(cH.map((h,i)=>[h,r[i]]));
nameMap[o["Club ID Number"]]=o["Full Name"];
});

const matchObjs=matches.map(r=>Object.fromEntries(pH.map((h,i)=>[h,r[i]])));

const res=[];

for(const row of managers){
const man=Object.fromEntries(mH.map((h,i)=>[h,row[i]]));
const ids=man["Player IDs"].split(",").map(x=>x.trim()).slice(0,6);

const stats={};
ids.forEach(id=>stats[id]={match:0,pts:0,w:0,d:0,l:0,gf:0,ga:0});

for(const m of matchObjs){
if(m.Approved.toLowerCase()!=="yes") continue;

if(stats[m.P1_ID]){
let s=stats[m.P1_ID];
s.match++;s.pts+=+m.P1_Point;s.gf+=+m.P1_Goal;s.ga+=+m.P2_Goal;
if(+m.P1_Point===3)s.w++;else if(+m.P1_Point===1)s.d++;else s.l++;
}
if(stats[m.P2_ID]){
let s=stats[m.P2_ID];
s.match++;s.pts+=+m.P2_Point;s.gf+=+m.P2_Goal;s.ga+=+m.P1_Goal;
if(+m.P2_Point===3)s.w++;else if(+m.P2_Point===1)s.d++;else s.l++;
}
}

let total={match:0,pts:0,w:0,gd:0};

const players=ids.map(id=>{
const s=stats[id];
s.gd=s.gf-s.ga;
s.winPct=s.match?Math.round((s.w/s.match)*100):0;
total.match+=s.match;total.pts+=s.pts;total.w+=s.w;total.gd+=s.gd;
return{id,name:nameMap[id]||"Unknown",...s};
});

total.winPct=total.match?Math.round((total.w/total.match)*100):0;

res.push({...man,players,total});
}

res.sort((a,b)=>b.total.pts-a.total.pts||b.total.gd-a.total.gd||b.total.winPct-a.total.winPct);

render(res);
}

function render(data){
document.getElementById("managerGrid").innerHTML=data.map((m,i)=>`
<div class="manager-card ${i===0?'top1':i===1?'top2':i===2?'top3':''}" id="card-${i}">

<div class="rank-badge">
${i===0?'<span>🥇</span>':i===1?'<span>🥈</span>':i===2?'<span>🥉</span>':'#'}${i+1}
</div>

<div class="download-icon" onclick="downloadCard('card-${i}','${m["Team Name"]}')">
<svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18l-5 5h3v6h4V7h3l-5-5z"/></svg>
</div>

<div class="team-top">
<img class="team-logo" src="${m["Team Logo"]}" crossorigin="anonymous">
<div class="team-info">
<h3>${m["Team Name"]}</h3>
<p>${m["Manager Name"]}</p>
<div class="team-strength">Team Strength: ${m.total.pts}</div>
</div>
</div>

<div class="players-grid">
${m.players.map((p,idx)=>`
<div class="player-box ${idx===0?'best-player':''}">
<div class="player-id">${p.id}</div>
<div class="player-name">${p.name}</div>

<div class="stat-row">
<div class="stat-pill">M ${p.match}</div>
<div class="stat-pill">PTS ${p.pts}</div>
<div class="stat-pill">W% ${p.winPct}</div>
</div>

<div class="line-stat">W-D-L ${p.w}-${p.d}-${p.l}</div>
<div class="line-stat">GF-GA-GD ${p.gf}-${p.ga}-${p.gd}</div>
</div>
`).join("")}
</div>

<div class="summary">
<div class="summary-title">Team Summary</div>
<div class="summary-grid">
<div>${m.total.match} Match</div>
<div>${m.total.pts} PTS</div>
<div>${m.total.gd} GD</div>
<div>${m.total.winPct}% Win</div>
</div>
</div>

</div>
`).join("");
}

function downloadCard(id,name){
html2canvas(document.getElementById(id),{
useCORS:true,
scale:2
}).then(c=>{
let a=document.createElement("a");
a.download=name+".jpg";
a.href=c.toDataURL("image/jpeg",1);
a.click();
});
}

loadData();
</script>

</body>
</html>

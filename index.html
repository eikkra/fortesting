<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Managers</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050816;
    --card:#0d1329;
    --card2:#101935;
    --accent:#00f0ff;
    --accent2:#ff00c8;
    --text:#fff;
    --muted:#94a7d0;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    background:
    radial-gradient(circle at top left,#10244f 0%,#050816 45%),
    radial-gradient(circle at bottom right,#2b0034 0%,#050816 55%);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    padding:14px;
}

.container{
    max-width:1600px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:nowrap;
    margin-bottom:8px;
}

.header img{
    width:38px;
    height:38px;
}

.header h1{
    font-family:'Orbitron';
    font-size:1.35rem;
    background:linear-gradient(90deg,#00f0ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    white-space:nowrap;
}

.desc{
    text-align:center;
    color:var(--muted);
    font-size:.88rem;
    margin-bottom:18px;
}

.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

.manager-card{
    background:linear-gradient(145deg,var(--card),var(--card2));
    border:1px solid rgba(255,255,255,.07);
    border-radius:18px;
    padding:14px;
    position:relative;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
}

.rank{
    position:absolute;
    top:10px;
    right:10px;
    padding:4px 10px;
    border-radius:999px;
    font-size:.72rem;
    font-family:'Orbitron';
    font-weight:700;
}

.rank1{background:var(--gold);color:#000;}
.rank2{background:var(--silver);color:#000;}
.rank3{background:var(--bronze);color:#000;}

.team-top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.team-logo{
    width:54px;
    height:54px;
    border-radius:14px;
    border:2px solid var(--accent);
    object-fit:cover;
}

.team-info h3{
    font-size:1rem;
    margin-bottom:2px;
}

.team-info p{
    color:var(--accent);
    font-size:.85rem;
}

.players-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:12px;
}

.player-box{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.06);
    border-radius:12px;
    padding:8px;
    font-size:.72rem;
}

.player-id{
    font-weight:700;
    color:var(--accent);
    font-size:.78rem;
    margin-bottom:2px;
}

.player-name{
    font-size:.65rem;
    color:#ff8ae2;
    margin-bottom:6px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.stat-row{
    display:flex;
    gap:4px;
    margin-bottom:4px;
}

.stat-pill{
    flex:1;
    background:rgba(0,240,255,.08);
    border:1px solid rgba(0,240,255,.12);
    border-radius:6px;
    text-align:center;
    padding:3px 2px;
    font-size:.62rem;
}

.line-stat{
    background:rgba(255,255,255,.03);
    padding:4px 6px;
    border-radius:6px;
    margin-bottom:4px;
    text-align:center;
    font-size:.65rem;
}

.summary{
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    overflow:hidden;
}

.summary-title{
    background:rgba(0,240,255,.12);
    padding:7px;
    text-align:center;
    font-weight:700;
    color:var(--accent);
    font-size:.85rem;
    border-bottom:1px solid rgba(255,255,255,.08);
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

.summary-grid div{
    text-align:center;
    padding:8px 4px;
    border-right:1px solid rgba(255,255,255,.08);
    font-size:.72rem;
}

.summary-grid div:last-child{
    border-right:none;
}

.summary-grid b{
    display:block;
    font-size:.9rem;
}

@media(max-width:768px){

    .manager-grid{
        grid-template-columns:1fr;
    }

    .header h1{
        font-size:1.05rem;
    }

    .header img{
        width:32px;
        height:32px;
    }

    .players-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .summary-grid{
        grid-template-columns:repeat(4,1fr)!important;
    }

    .summary-grid div{
        font-size:.65rem;
        padding:7px 2px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <img src="https://i.imgur.com/LY3Bb9m.png">
        <h1>GOAT FC MANAGERS</h1>
    </div>

    <div class="desc">
        Official Manager Ranking Based On Registered Squad League Performance
    </div>

    <div id="managerGrid" class="manager-grid">
        Loading Manager Profiles...
    </div>

</div>

<script>
const POINTS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MANAGERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";
const MEMBERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

function parseCSV(text){
    return text.trim().split("\n").map(r =>
        r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
         .map(v=>v.replace(/^"|"$/g,"").trim())
    );
}

function toDate(v){ return new Date(v); }

async function loadAll(){

    const [pRes,mRes,cRes]=await Promise.all([
        fetch(POINTS_URL),
        fetch(MANAGERS_URL),
        fetch(MEMBERS_URL)
    ]);

    const pCSV=parseCSV(await pRes.text());
    const mCSV=parseCSV(await mRes.text());
    const cCSV=parseCSV(await cRes.text());

    const pHead=pCSV.shift();
    const mHead=mCSV.shift();
    const cHead=cCSV.shift();

    const matches=pCSV.map(r=>Object.fromEntries(pHead.map((h,i)=>[h,r[i]])));
    const managers=mCSV.map(r=>Object.fromEntries(mHead.map((h,i)=>[h,r[i]])));
    const members=cCSV.map(r=>Object.fromEntries(cHead.map((h,i)=>[h,r[i]])));

    const nameMap={};
    members.forEach(m=>{
        nameMap[m["Club ID Number"]]=m["Full Name"];
    });

    const output=[];

    for(const manager of managers){

        const ids=manager["Player IDs"].split(",").map(x=>x.trim()).slice(0,6);
        const start=toDate(manager["Start Match Date"]);
        const end=toDate(manager["End Match Date"]);

        const stats={};

        ids.forEach(id=>{
            stats[id]={match:0,pts:0,w:0,d:0,l:0,gf:0,ga:0};
        });

        for(const m of matches){

            if(m.Approved.toLowerCase()!=="yes") continue;
            if(m.Match_Type.toLowerCase()!=="league") continue;

            const md=toDate(m.Match_Date);
            if(md<start||md>end) continue;

            if(stats[m.P1_ID]){
                let s=stats[m.P1_ID];
                s.match++;
                s.pts+=+m.P1_Point;
                s.gf+=+m.P1_Goal;
                s.ga+=+m.P2_Goal;
                if(+m.P1_Point===3)s.w++;
                else if(+m.P1_Point===1)s.d++;
                else s.l++;
            }

            if(stats[m.P2_ID]){
                let s=stats[m.P2_ID];
                s.match++;
                s.pts+=+m.P2_Point;
                s.gf+=+m.P2_Goal;
                s.ga+=+m.P1_Goal;
                if(+m.P2_Point===3)s.w++;
                else if(+m.P2_Point===1)s.d++;
                else s.l++;
            }
        }

        let total={match:0,pts:0,w:0,gd:0};

        const players=ids.map(id=>{
            const s=stats[id];
            s.gd=s.gf-s.ga;
            s.winPct=s.match?((s.w/s.match)*100).toFixed(0):0;

            total.match+=s.match;
            total.pts+=s.pts;
            total.w+=s.w;
            total.gd+=s.gd;

            return{
                id,
                name:nameMap[id]||"Unknown",
                ...s
            };
        });

        total.winPct=total.match?((total.w/total.match)*100).toFixed(0):0;

        output.push({...manager,players,total});
    }

    output.sort((a,b)=>
        b.total.pts-a.total.pts ||
        b.total.gd-a.total.gd ||
        b.total.winPct-a.total.winPct
    );

    render(output);
}

function render(data){

    document.getElementById("managerGrid").innerHTML=data.map((m,i)=>`
        <div class="manager-card">

            ${i<3?`<div class="rank rank${i+1}">${i+1}${["st","nd","rd"][i]}</div>`:""}

            <div class="team-top">
                <img class="team-logo" src="${m["Team Logo"]}">
                <div class="team-info">
                    <h3>${m["Team Name"]}</h3>
                    <p>${m["Manager Name"]}</p>
                </div>
            </div>

            <div class="players-grid">
                ${m.players.map(p=>`
                    <div class="player-box">
                        <div class="player-id">${p.id}</div>
                        <div class="player-name">${p.name}</div>

                        <div class="stat-row">
                            <div class="stat-pill">M ${p.match}</div>
                            <div class="stat-pill">PTS ${p.pts}</div>
                            <div class="stat-pill">W% ${p.winPct}</div>
                        </div>

                        <div class="line-stat">W-D-L: ${p.w}-${p.d}-${p.l}</div>
                        <div class="line-stat">GF-GA-GD: ${p.gf}-${p.ga}-${p.gd}</div>
                    </div>
                `).join("")}
            </div>

            <div class="summary">
                <div class="summary-title">Team Summary</div>
                <div class="summary-grid">
                    <div><b>${m.total.match}</b>Match</div>
                    <div><b>${m.total.pts}</b>PTS</div>
                    <div><b>${m.total.gd}</b>GD</div>
                    <div><b>${m.total.winPct}%</b>Win%</div>
                </div>
            </div>

        </div>
    `).join("");
}

loadAll();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC STATISTICS</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#020617;
    color:white;
}

/* HEADER */
.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    padding:10px;
}
.header img{width:40px;}
.header h1{
    font-size:18px;
    color:#00f5ff;
    text-shadow:0 0 10px #00f5ff,0 0 20px #00f5ff;
}

/* SEARCH */
.search{
    text-align:center;
    margin:10px;
}
.search input{
    padding:8px;
    width:85%;
    max-width:320px;
    border-radius:8px;
    border:1px solid #00f5ff;
    background:black;
    color:#00f5ff;
    outline:none;
    box-shadow:0 0 10px #00f5ff;
}

/* CARD */
.card{
    margin:12px;
    padding:12px;
    border-radius:14px;
    background:linear-gradient(145deg,#020617,#001f2f);
    border:1px solid #00f5ff;
    box-shadow:0 0 20px #00f5ff;
    text-align:center;
}

/* CLUB */
.club{
    font-size:15px;
    font-weight:bold;
    margin-bottom:10px;
    color:#00f5ff;
    text-shadow:0 0 10px #00f5ff,0 0 25px #00f5ff;
}

/* GRID BOX */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
}

.box{
    padding:6px;
    border-radius:8px;
    font-size:11px;
    background:#001f2f;
    border:1px solid #00f5ff;
    box-shadow:0 0 8px #00f5ff inset;
}

/* BUTTONS */
.btns{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:10px;
}
.btn{
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#00f5ff;
    color:black;
    font-size:11px;
    cursor:pointer;
    box-shadow:0 0 10px #00f5ff;
}

/* MOBILE */
@media(max-width:768px){
    .grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/LY3Bb9m.png">
<h1>GOAT FC STATISTICS</h1>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search Club ID (e.g. GFC-001)" oninput="render()">
</div>

<div id="data"></div>

<script>

const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";

let players={};

// NORMALIZE
function normalize(id){
    return (id||"").toLowerCase().replace(/[^a-z0-9]/g,'');
}

// LOAD DATA
async function load(){
    let text = await fetch(URL + "&t=" + Date.now()).then(r=>r.text());
    let rows = text.split("\n").slice(1);

    rows.forEach(r=>{
        let c = r.split(",");

        let P1 = c[0];
        let P2 = c[1];
        let type = c[2];
        let P1S = Number(c[3]);
        let P2S = Number(c[4]);
        let approved = (c[9]||"").toLowerCase();

        // ✅ ONLY APPROVED
        if(approved !== "yes") return;

        update(P1,P1S,P2S,type);
        update(P2,P2S,P1S,type);
    });

    render();
}

// UPDATE
function update(id,scored,conceded,type){

    if(!players[id]){
        players[id]={
            match:0,win:0,loss:0,draw:0,
            gs:0,gc:0,diff:0,
            rate:0,seven:0,
            friendly:0,other:0
        };
    }

    let p=players[id];

    p.match++;
    p.gs+=scored;
    p.gc+=conceded;
    p.diff=p.gs-p.gc;

    if(type==="Friendly") p.friendly++;
    else p.other++;

    if(scored>conceded) p.win++;
    else if(scored<conceded) p.loss++;
    else p.draw++;

    if(scored>=7) p.seven++;

    p.winp=(p.win/p.match)*100;
    p.rate=(p.gs/p.match);
}

// RENDER
function render(){

    let q=normalize(document.getElementById("search").value);

    let sorted=Object.entries(players)
        .sort((a,b)=>b[1].win-a[1].win);

    let html="";

    sorted.forEach(([id,p])=>{

        if(q && !normalize(id).includes(q)) return;

        html+=`
        <div class="card">
            <div class="club">Player ID: ${id}</div>

            <div class="grid">
                <div class="box">🟢 Win<br>${p.win}</div>
                <div class="box">🔴 Loss<br>${p.loss}</div>
                <div class="box">🟡 Draw<br>${p.draw}</div>

                <div class="box">🎮 Match<br>${p.match}</div>
                <div class="box">📊 Win%<br>${p.winp.toFixed(1)}</div>
                <div class="box">⚽ Rate<br>${p.rate.toFixed(2)}</div>

                <div class="box">⚽ Scored<br>${p.gs}</div>
                <div class="box">🥅 Conceded<br>${p.gc}</div>
                <div class="box">📈 Difference<br>${p.diff}</div>

                <div class="box">👑 7+ Goals<br>${p.seven}</div>
                <div class="box">🤝 Friendly<br>${p.friendly}</div>
                <div class="box">🏆 Other<br>${p.other}</div>
            </div>

            <div class="btns">
                <button class="btn" onclick="share('${id}')">Share</button>
                <button class="btn" onclick="download(this)">Download</button>
            </div>
        </div>`;
    });

    document.getElementById("data").innerHTML=html;
}

// SHARE
function share(id){
    let text="Check my GOAT FC stats: "+id;
    navigator.clipboard.writeText(text);
    alert("Copied!");
}

// DOWNLOAD
function download(btn){
    let card=btn.closest(".card");
    html2canvas(card).then(canvas=>{
        let link=document.createElement("a");
        link.download="stats.png";
        link.href=canvas.toDataURL();
        link.click();
    });
}

load();

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Managers</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/LY3Bb9m.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
    --card:#0d1329;
    --card2:#101935;
    --accent:#00f0ff;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
    --green:#00ff88;
    --muted:#94a7d0;
    --text:#fff;
}
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:
    radial-gradient(circle at top left,#10244f 0%,#050816 45%),
    radial-gradient(circle at bottom right,#2b0034 0%,#050816 55%);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    padding:14px;
}

.container{max-width:1600px;margin:auto;}

.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
}
.header img{width:36px;height:36px;}

.header h1{
    font-family:'Orbitron';
    font-size:1.25rem;
    background:linear-gradient(90deg,#00f0ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    text-align:center;
    color:var(--muted);
    font-size:.85rem;
    margin-bottom:18px;
}

.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

.manager-card{
    background:linear-gradient(145deg,var(--card),var(--card2));
    border:1px solid rgba(0,240,255,.25);
    border-radius:18px;
    padding:14px;
    position:relative;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
}

.top1{border:1px solid var(--gold);box-shadow:0 0 18px rgba(255,215,0,.18);}
.top2{border:1px solid var(--silver);box-shadow:0 0 18px rgba(192,192,192,.14);}
.top3{border:1px solid var(--bronze);box-shadow:0 0 18px rgba(205,127,50,.14);}

.rank-badge{
    position:absolute;
    top:10px;
    right:10px;
    padding:4px 10px;
    border-radius:999px;
    font-size:.72rem;
    font-family:'Orbitron';
    font-weight:700;
    background:rgba(255,255,255,.08);
}

.download-icon{
    position:absolute;
    top:42px;
    right:14px;
    cursor:pointer;
    font-size:.9rem;
    transition:.2s;
}
.download-icon:hover{
    transform:scale(1.1);
    opacity:.9;
}

.team-top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.team-logo{
    width:54px;
    height:54px;
    border-radius:14px;
    object-fit:cover;
    border:2px solid var(--accent);
}

.team-info h3{font-size:1rem;}
.team-info p{color:var(--accent);font-size:.82rem;}

.team-strength{
    font-size:.72rem;
    color:#ffcf66;
    margin-top:2px;
}

.players-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:12px;
}

.player-box{
    background:linear-gradient(145deg,
        rgba(0,240,255,.08),
        rgba(255,0,200,.04),
        rgba(255,255,255,.03)
    );
    border:1px solid rgba(0,255,136,.35);
    border-radius:12px;
    padding:8px;
}

.player-box.best-player{
    border:1px solid var(--gold);
    box-shadow:0 0 10px rgba(255,215,0,.12);
}

.player-id{
    font-weight:700;
    color:var(--accent);
    font-size:.78rem;
}

.player-name{
    font-size:.62rem;
    color:#ff8ae2;
    margin-bottom:5px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.stat-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:4px;
    margin-bottom:4px;
}

.stat-pill{
    background:rgba(0,240,255,.08);
    border:1px solid rgba(0,240,255,.12);
    border-radius:6px;
    text-align:center;
    padding:3px 1px;
    font-size:.56rem;
    white-space:nowrap;
}

.line-stat{
    background:rgba(255,255,255,.03);
    padding:4px 5px;
    border-radius:6px;
    margin-bottom:4px;
    text-align:center;
    font-size:.63rem;
}

.summary{
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    overflow:hidden;
}

.summary-title{
    background:rgba(0,240,255,.12);
    padding:8px;
    text-align:center;
    font-weight:700;
    color:var(--accent);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

.summary-grid div{
    text-align:center;
    padding:10px 4px;
    border-right:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.02);
    font-size:.68rem;
}

.summary-grid div:last-child{border-right:none;}

.summary-grid b{
    display:block;
    font-size:.95rem;
    margin-bottom:3px;
}

.summary-grid div:nth-child(1) b{color:#00f0ff;}
.summary-grid div:nth-child(2) b{color:#00ff88;}
.summary-grid div:nth-child(3) b{color:#ffae00;}
.summary-grid div:nth-child(4) b{color:#ff6ad5;}

@media(max-width:768px){
    .manager-grid{grid-template-columns:1fr;}
    .players-grid{grid-template-columns:repeat(2,1fr);}
    .summary-grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.imgur.com/LY3Bb9m.png" crossorigin="anonymous">
        <h1>GOAT FC MANAGERS</h1>
    </div>

    <div class="desc">Official Manager Ranking Based On Registered Squad Performance</div>

    <div id="managerGrid" class="manager-grid">Loading...</div>
</div>

<script>
const POINTS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MANAGERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";
const MEMBERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

const normalize = v => String(v || '').trim().toUpperCase();

function parseCSV(text){
    return text.trim().split("\n").map(r =>
        r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
         .map(v => v.replace(/^"|"$/g,"").trim())
    );
}

async function loadData(){
    const [p,m,c] = await Promise.all([
        fetch(POINTS_URL).then(r=>r.text()),
        fetch(MANAGERS_URL).then(r=>r.text()),
        fetch(MEMBERS_URL).then(r=>r.text())
    ]);

    const matches=parseCSV(p), managers=parseCSV(m), members=parseCSV(c);
    const pHead=matches.shift(), mHead=managers.shift(), cHead=members.shift();

    const nameMap={};
    members.forEach(r=>{
        const obj=Object.fromEntries(cHead.map((h,i)=>[h,r[i]]));
        nameMap[normalize(obj["Club ID Number"])] = obj["Full Name"];
    });

    const matchObjs = matches.map(r=>{
        const obj = Object.fromEntries(pHead.map((h,i)=>[h,r[i]]));
        obj.P1_ID = normalize(obj.P1_ID);
        obj.P2_ID = normalize(obj.P2_ID);
        obj.Match_Type = normalize(obj.Match_Type);
        obj.Approved = normalize(obj.Approved);
        return obj;
    });

    const result=[];

    for(const row of managers){
        const manager = Object.fromEntries(mHead.map((h,i)=>[h,row[i]]));

        const ids = manager["Player IDs"]
            .split(",")
            .map(id=>normalize(id))
            .slice(0,6);

        const allowedTypes = (manager["Match Type"] || "League")
            .split(",")
            .map(t=>normalize(t));

        const start = new Date(manager["Start Match Date"]);
        const end = new Date(manager["End Match Date"]);

        const stats={}, strength={pts:0,goals:0};

        ids.forEach(id=>{
            stats[id]={match:0,pts:0,w:0,d:0,l:0,gf:0,ga:0};
        });

        for(const m of matchObjs){

            if(m.Approved !== "YES") continue;

            const md = new Date(m.Match_Date);
            if(md < start || md > end) continue;

            if(!allowedTypes.includes(m.Match_Type)) continue;

            if(stats[m.P1_ID]){
                strength.pts += +m.P1_Point;
                strength.goals += +m.P1_Goal;

                let s = stats[m.P1_ID];
                s.match++;
                s.pts += +m.P1_Point;
                s.gf += +m.P1_Goal;
                s.ga += +m.P2_Goal;

                if(+m.P1_Point===3) s.w++;
                else if(+m.P1_Point===1) s.d++;
                else s.l++;
            }

            if(stats[m.P2_ID]){
                strength.pts += +m.P2_Point;
                strength.goals += +m.P2_Goal;

                let s = stats[m.P2_ID];
                s.match++;
                s.pts += +m.P2_Point;
                s.gf += +m.P2_Goal;
                s.ga += +m.P1_Goal;

                if(+m.P2_Point===3) s.w++;
                else if(+m.P2_Point===1) s.d++;
                else s.l++;
            }
        }

        let total={match:0,pts:0,w:0,gd:0};

        const players=ids.map(id=>{
            const s=stats[id];
            s.gd=s.gf-s.ga;
            s.winPct=s.match?Math.round((s.w/s.match)*100):0;

            total.match+=s.match;
            total.pts+=s.pts;
            total.w+=s.w;
            total.gd+=s.gd;

            return {
                id,
                name:nameMap[id]||"Unknown",
                ...s
            };
        });

        total.winPct=total.match?Math.round((total.w/total.match)*100):0;

        result.push({
            ...manager,
            players,
            total,
            teamStrength:strength.pts+strength.goals
        });
    }

    result.sort((a,b)=>
        b.total.pts-a.total.pts ||
        b.total.gd-a.total.gd ||
        b.total.winPct-a.total.winPct
    );

    render(result);
}

function render(data){
    document.getElementById("managerGrid").innerHTML = data.map((m,i)=>{

        const bestIndex = m.players.reduce((best,p,idx,arr)=>
            p.pts>arr[best].pts ||
            (p.pts===arr[best].pts && p.winPct>arr[best].winPct)
            ? idx : best
        ,0);

        return `
        <div class="manager-card ${i===0?'top1':i===1?'top2':i===2?'top3':''}" id="card-${i}">
            <div class="rank-badge">#${i+1}</div>
            <div class="download-icon" onclick="downloadCard('card-${i}','${m["Team Name"]}')">🖨</div>

            <div class="team-top">
                <img class="team-logo" src="${m["Team Logo"]}" crossorigin="anonymous">
                <div class="team-info">
                    <h3>${m["Team Name"]}</h3>
                    <p>${m["Manager Name"]}</p>
                    <div class="team-strength">Team Strength: ${m.teamStrength}</div>
                </div>
            </div>

            <div class="players-grid">
                ${m.players.map((p,idx)=>`
                <div class="player-box ${idx===bestIndex?'best-player':''}">
                    <div class="player-id">${p.id}</div>
                    <div class="player-name">${p.name}</div>

                    <div class="stat-row">
                        <div class="stat-pill">M ${p.match}</div>
                        <div class="stat-pill">PTS ${p.pts}</div>
                        <div class="stat-pill">W% ${p.winPct}</div>
                    </div>

                    <div class="line-stat">W-D-L: ${p.w}-${p.d}-${p.l}</div>
                    <div class="line-stat">GF-GA-GD: ${p.gf}-${p.ga}-${p.gd}</div>
                </div>`).join("")}
            </div>

            <div class="summary">
                <div class="summary-title">Team Summary</div>
                <div class="summary-grid">
                    <div><b>${m.total.match}</b>Match</div>
                    <div><b>${m.total.pts}</b>PTS</div>
                    <div><b>${m.total.gd}</b>GD</div>
                    <div><b>${m.total.winPct}%</b>Win%</div>
                </div>
            </div>
        </div>`;
    }).join("");
}

function downloadCard(cardId,fileName){
    html2canvas(document.getElementById(cardId),{
        useCORS:true,
        allowTaint:false,
        backgroundColor:null,
        scale:2
    }).then(canvas=>{
        const link=document.createElement("a");
        link.download=fileName.replace(/\s+/g,'_')+"_manager.jpg";
        link.href=canvas.toDataURL("image/jpeg",1.0);
        link.click();
    });
}

loadData();
</script>

</body>
</html>

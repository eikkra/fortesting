<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Managers</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
    --bg:#050816;
    --card:#0d1329;
    --card2:#101935;
    --accent:#00f0ff;
    --accent2:#ff00c8;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
    --green:#00ff88;
    --text:#fff;
}

/* GLOBAL */
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:
    radial-gradient(circle at top left,#10244f 0%,#050816 45%),
    radial-gradient(circle at bottom right,#2b0034 0%,#050816 55%);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    padding:14px;
}

.container{max-width:1600px;margin:auto;}

/* HEADER */
.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:6px;
}

.header img{width:36px;height:36px;}

.header h1{
    font-family:'Orbitron';
    font-size:1.25rem;
    letter-spacing:1px;
    background:linear-gradient(90deg,#00f0ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* DESCRIPTION */
.desc{
    text-align:center;
    color:#93a6d6;
    font-size:.85rem;
    margin-bottom:18px;
}

/* GRID */
.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

/* CARD */
.manager-card{
    background:linear-gradient(145deg,var(--card),var(--card2));
    border-radius:18px;
    padding:14px;
    position:relative;
    overflow:hidden;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
}

/* RGB BORDER ANIMATION */
.manager-card::before{
    content:"";
    position:absolute;
    inset:0;
    padding:1px;
    border-radius:18px;
    background:linear-gradient(90deg,#00f0ff,#ff00c8,#00ff88,#00f0ff);
    background-size:300% 300%;
    animation:rgb 6s linear infinite;
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    pointer-events:none;
    opacity:.35;
}

@keyframes rgb{
    0%{background-position:0% 50%}
    100%{background-position:300% 50%}
}

/* TOP RANK BADGES */
.rank{
    position:absolute;
    top:10px;
    right:10px;
    font-size:.7rem;
    font-family:'Orbitron';
    padding:4px 8px;
    border-radius:999px;
    display:flex;
    align-items:center;
    gap:4px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(6px);
}

.rank1{border:1px solid var(--gold);}
.rank2{border:1px solid var(--silver);}
.rank3{border:1px solid var(--bronze);}

/* DOWNLOAD ICON */
.download-icon{
    position:absolute;
    top:42px;
    right:12px;
    cursor:pointer;
    width:18px;
    height:18px;
    opacity:.85;
    transition:.2s;
}

.download-icon:hover{
    transform:scale(1.15);
    filter:drop-shadow(0 0 6px #00f0ff);
}

/* TEAM HEADER */
.team-top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.team-logo{
    width:54px;
    height:54px;
    border-radius:14px;
    object-fit:cover;
    border:2px solid var(--accent);
}

.team-info h3{font-size:1rem;}
.team-info p{color:var(--accent);font-size:.82rem;}

/* TEAM STRENGTH */
.team-strength{
    font-size:.7rem;
    margin-top:2px;
    color:#ffd36b;
}

/* PLAYERS */
.players-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:12px;
}

.player-box{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(0,255,136,.25);
    border-radius:12px;
    padding:8px;
    font-size:.72rem;
}

.player-box.best-player{
    border:1px solid var(--gold);
    box-shadow:0 0 10px rgba(255,215,0,.12);
}

.player-id{color:var(--accent);font-weight:700;font-size:.78rem;}
.player-name{color:#ff8ae2;font-size:.62rem;margin-bottom:5px;}

/* STATS */
.stat-row{
    display:flex;
    gap:4px;
    margin-bottom:4px;
}

.stat-pill{
    flex:1;
    text-align:center;
    font-size:.58rem;
    padding:3px 2px;
    border-radius:6px;
    background:rgba(0,240,255,.08);
    border:1px solid rgba(0,240,255,.12);
}

/* SUMMARY */
.summary{
    border-radius:12px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
}

.summary-title{
    text-align:center;
    padding:7px;
    font-size:.82rem;
    color:var(--accent);
    background:rgba(0,240,255,.12);
}

/* NEW STYLE SUMMARY */
.summary-grid{
    display:flex;
    justify-content:space-around;
    padding:8px 4px;
    font-size:.7rem;
}

.sum-item{
    text-align:center;
    padding:4px 8px;
    border-radius:8px;
}

.sum-m{color:#00f0ff;}
.sum-p{color:#ff00c8;}
.sum-g{color:#00ff88;}
.sum-w{color:#ffd36b;}

/* RESPONSIVE */
@media(max-width:768px){
    .manager-grid{grid-template-columns:1fr;}
    .players-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div class="container">

<div class="header">
    <img src="https://i.imgur.com/LY3Bb9m.png">
    <h1>GOAT FC MANAGERS</h1>
</div>

<div class="desc">Official Manager Ranking Based On League Performance</div>

<div id="managerGrid" class="manager-grid">Loading...</div>

</div>

<script>
const POINTS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MANAGERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";
const MEMBERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

function parseCSV(t){
    return t.trim().split("\n").map(r=>r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v=>v.replace(/"/g,"").trim()));
}

async function load(){
const [p,m,c]=await Promise.all([
fetch(POINTS_URL).then(r=>r.text()),
fetch(MANAGERS_URL).then(r=>r.text()),
fetch(MEMBERS_URL).then(r=>r.text())
]);

const matches=parseCSV(p), managers=parseCSV(m), members=parseCSV(c);

const ph=matches.shift(), mh=managers.shift(), ch=members.shift();

const nameMap={};
members.forEach(r=>{
const o=Object.fromEntries(ch.map((h,i)=>[h,r[i]]));
nameMap[o["Club ID Number"]]=o["Full Name"];
});

const matchObjs=matches.map(r=>Object.fromEntries(ph.map((h,i)=>[h,r[i]])));

const out=[];

for(const row of managers){
const m=Object.fromEntries(mh.map((h,i)=>[h,row[i]]));
const ids=m["Player IDs"].split(",").slice(0,6);

const stats={}, total={match:0,pts:0,w:0,gd:0};

ids.forEach(id=>stats[id]={match:0,pts:0,w:0,d:0,l:0,gf:0,ga:0});

for(const x of matchObjs){
if(x.Approved!=="yes") continue;

if(stats[x.P1_ID]){
let s=stats[x.P1_ID];
s.match++;s.pts+=+x.P1_Point;s.gf+=+x.P1_Goal;s.ga+=+x.P2_Goal;
x.P1_Point==3?s.w++:x.P1_Point==1?s.d++:s.l++;
}

if(stats[x.P2_ID]){
let s=stats[x.P2_ID];
s.match++;s.pts+=+x.P2_Point;s.gf+=+x.P2_Goal;s.ga+=+x.P1_Goal;
x.P2_Point==3?s.w++:x.P2_Point==1?s.d++:s.l++;
}
}

const players=ids.map(id=>{
const s=stats[id];
s.gd=s.gf-s.ga;
total.match+=s.match;total.pts+=s.pts;total.w+=s.w;total.gd+=s.gd;
return{id,name:nameMap[id]||"Unknown",...s};
});

total.winPct=total.match?Math.round((total.w/total.match)*100):0;

out.push({...m,players,total});
}

out.sort((a,b)=>b.total.pts-a.total.pts||b.total.gd-a.total.gd||b.total.winPct-a.total.winPct);

render(out);
}

function render(data){
document.getElementById("managerGrid").innerHTML=data.map((m,i)=>`
<div class="manager-card" id="card-${i}">

<div class="rank rank${i<3?i+1:0}">
${i==0?"🥇":i==1?"🥈":i==2?"🥉":"#"+(i+1)}
</div>

<svg class="download-icon" onclick="download('card-${i}','${m["Team Name"]}')"
viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="2">
<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
<polyline points="7 10 12 15 17 10"/>
<line x1="12" y1="15" x2="12" y2="3"/>
</svg>

<div class="team-top">
<img class="team-logo" src="${m["Team Logo"]}" crossorigin="anonymous">
<div>
<div class="team-info h3">${m["Team Name"]}</div>
<div class="team-info p">${m["Manager Name"]}</div>
<div class="team-strength">Strength: ${m.total.pts+m.total.gd}</div>
</div>
</div>

<div class="players-grid">
${m.players.map((p,i)=>`
<div class="player-box ${i==0?'best-player':''}">
<div class="player-id">${p.id}</div>
<div class="player-name">${p.name}</div>
<div class="stat-row">
<div class="stat-pill">M ${p.match}</div>
<div class="stat-pill">PTS ${p.pts}</div>
<div class="stat-pill">W% ${p.match?Math.round(p.w/p.match*100):0}</div>
</div>
</div>
`).join("")}
</div>

<div class="summary">
<div class="summary-title">Team Summary</div>
<div class="summary-grid">
<div class="sum-item sum-m">M ${m.total.match}</div>
<div class="sum-item sum-p">PTS ${m.total.pts}</div>
<div class="sum-item sum-g">GD ${m.total.gd}</div>
<div class="sum-item sum-w">W% ${m.total.winPct}</div>
</div>
</div>

</div>
`).join("");
}

function download(id,name){
html2canvas(document.getElementById(id),{
useCORS:true,
scale:2
}).then(c=>{
let a=document.createElement("a");
a.download=name+".jpg";
a.href=c.toDataURL("image/jpeg");
a.click();
});
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GOAT FC Competition Center</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:#050505;
  color:white;
}

.tabs{
  display:flex;
  background:#111;
}
.tab{
  padding:12px 20px;
  cursor:pointer;
}
.tab.active{
  background:#222;
}

.container{
  padding:10px;
}

/* RGB effect */
.glow{
  text-shadow:0 0 5px red,0 0 10px blue,0 0 20px lime;
}

/* Match Card */
.match{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
  padding:15px;
  border-radius:12px;
  background:#111;
  border:1px solid #333;
}

.team{
  display:flex;
  align-items:center;
  gap:10px;
}

.team img{
  width:40px;
}

.score{
  padding:10px 15px;
  border-radius:10px;
  border:1px solid #444;
  font-size:18px;
}

.live{
  color:lime;
  font-size:12px;
}

/* Responsive */
@media(max-width:600px){
  .match{flex-direction:column;}
}

/* Player Box */
.players{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.player{
  margin:5px;
}

canvas{
  margin-top:20px;
  background:black;
}

button{
  margin-top:10px;
  padding:10px;
  background:#222;
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab('fixture')">Fixtures</div>
  <div class="tab" onclick="showTab('vs')">Team VS</div>
</div>

<div id="fixture" class="container"></div>
<div id="vs" class="container" style="display:none;"></div>

<script>

// ===== CSV LINKS =====
const clubURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&output=csv";
const pointsURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&output=csv";
const membersURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&output=csv";

// ===== CSV PARSER =====
function parseCSV(text){
  return text.trim().split("\n").slice(1).map(r=>r.split(","));
}

// ===== GLOBAL DATA =====
let teams=[], matches=[], members=[];

// ===== LOAD =====
async function load(){
  teams = parseCSV(await fetch(clubURL).then(r=>r.text()));
  matches = parseCSV(await fetch(pointsURL).then(r=>r.text()));
  members = parseCSV(await fetch(membersURL).then(r=>r.text()));

  createFixture();
  createVS();
}

//////////////////////////////////////////////////
// 🔥 FIXTURE SYSTEM (ROUND ROBIN)
//////////////////////////////////////////////////

function createFixture(){
  let box = document.getElementById("fixture");
  box.innerHTML="";

  for(let i=0;i<teams.length;i++){
    for(let j=i+1;j<teams.length;j++){

      let home = (i+j)%2===0 ? teams[i] : teams[j];
      let away = (i+j)%2===0 ? teams[j] : teams[i];

      let scoreA = getScore(home, away);
      let scoreB = getScore(away, home);

      let isLive = checkLive(home);

      box.innerHTML += `
      <div class="match">
        <div class="team">
          <img src="${home[1]}">
          ${home[0]}
        </div>

        <div class="score glow">
          ${scoreA} - ${scoreB}
          ${isLive ? "<div class='live'>LIVE</div>" : ""}
        </div>

        <div class="team">
          ${away[0]}
          <img src="${away[1]}">
        </div>
      </div>`;
    }
  }
}

//////////////////////////////////////////////////
// 🔥 SCORE CALCULATION (FILTERED)
//////////////////////////////////////////////////

function getScore(team, opponent){

  let ids = team[3].split("-");
  let type = team[6];
  let start = new Date(team[4]);
  let end = new Date(team[5]);

  let total = 0;

  matches.forEach(m=>{
    let player = m[0];
    let date = new Date(m[11]);
    let matchType = m[2];

    if(ids.includes(player) && matchType===type){
      if(date>=start && date<=end){
        total += Number(m[5]);
      }
    }
  });

  return total;
}

//////////////////////////////////////////////////
// 🔥 LIVE MATCH CHECK
//////////////////////////////////////////////////

function checkLive(team){
  let now = new Date();
  let start = new Date(team[4]);
  let end = new Date(team[5]);
  return now>=start && now<=end;
}

//////////////////////////////////////////////////
// 🔥 TEAM VS SYSTEM
//////////////////////////////////////////////////

function createVS(){

  let box = document.getElementById("vs");

  let options = teams.map(t=>`<option>${t[0]}</option>`).join("");

  box.innerHTML = `
    <select id="team1">${options}</select>
    VS
    <select id="team2">${options}</select>
    <button onclick="loadPlayers()">Load</button>

    <div id="players"></div>

    <canvas id="canvas" width="400" height="200"></canvas>
    <button onclick="downloadImage()">Download JPG</button>
  `;
}

function loadPlayers(){

  let t1 = teams.find(t=>t[0]==document.getElementById("team1").value);
  let t2 = teams.find(t=>t[0]==document.getElementById("team2").value);

  let p1 = getMembers(t1);
  let p2 = getMembers(t2);

  let html = `<div class="players">`;

  html += `<div>${p1.map(p=>`<div><input type="checkbox">${p}</div>`).join("")}</div>`;
  html += `<div>${p2.map(p=>`<div><input type="checkbox">${p}</div>`).join("")}</div>`;

  html += `</div><button onclick="generateImage()">Generate Image</button>`;

  document.getElementById("players").innerHTML = html;
}

function getMembers(team){
  let ids = team[3].split("-");
  return members
    .filter(m=>ids.includes(m[0]))
    .map(m=>m[1] || m[0]);
}

//////////////////////////////////////////////////
// 🔥 IMAGE GENERATOR
//////////////////////////////////////////////////

function generateImage(){
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");

  ctx.fillStyle="black";
  ctx.fillRect(0,0,400,200);

  ctx.fillStyle="lime";
  ctx.font="20px Orbitron";

  let t1 = document.getElementById("team1").value;
  let t2 = document.getElementById("team2").value;

  ctx.fillText(t1,50,100);
  ctx.fillText("VS",180,100);
  ctx.fillText(t2,250,100);
}

function downloadImage(){
  let link = document.createElement("a");
  link.download="match.jpg";
  link.href = document.getElementById("canvas").toDataURL();
  link.click();
}

//////////////////////////////////////////////////
// TAB
//////////////////////////////////////////////////

function showTab(tab){
  document.getElementById("fixture").style.display = tab==="fixture"?"block":"none";
  document.getElementById("vs").style.display = tab==="vs"?"block":"none";
}

load();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Goat FC Leaderboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      text-align: center;
      transition: 0.3s;
    }

    /* 🔴 ESPORTS RED THEME */
    body.light {
      background: linear-gradient(135deg, #1a0000, #3b0000);
      color: #fff;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding-top: 15px;
    }

    .logo {
      width: 60px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 12px #00ffcc);
    }

    h1 {
      margin: 0;
      color: #00ffcc;
    }

    .slogan {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    /* BUTTON */
    .tabs {
      margin: 15px;
    }

    button {
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      background: #1f2937;
      color: white;
      margin: 5px;
      cursor: pointer;
    }

    button.active {
      background: linear-gradient(to right,#00ffcc,#00c3ff);
      color: black;
    }

    body.light button {
      background: #5a0000;
      color: white;
    }

    /* CARD */
    .card {
      width: 95%;
      max-width: 1100px;
      margin: auto;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 10px;
    }

    body.light .card {
      background: rgba(255,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 12px;
      background: rgba(255,255,255,0.08);
      color: #00ffcc;
    }

    body.light th {
      background: rgba(255,0,0,0.2);
      color: #fff;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    tr:hover {
      background: rgba(255,255,255,0.05);
    }

    /* 🥇🥈🥉 TOP 3 ROW ANIMATION */
    .rank1-row {
      background: linear-gradient(90deg, rgba(255,215,0,0.2), transparent);
      animation: glowGold 2s infinite alternate;
    }

    .rank2-row {
      background: linear-gradient(90deg, rgba(192,192,192,0.2), transparent);
      animation: glowSilver 2s infinite alternate;
    }

    .rank3-row {
      background: linear-gradient(90deg, rgba(205,127,50,0.2), transparent);
      animation: glowBronze 2s infinite alternate;
    }

    @keyframes glowGold {
      from { box-shadow: inset 0 0 5px gold; }
      to { box-shadow: inset 0 0 15px gold; }
    }

    @keyframes glowSilver {
      from { box-shadow: inset 0 0 5px silver; }
      to { box-shadow: inset 0 0 15px silver; }
    }

    @keyframes glowBronze {
      from { box-shadow: inset 0 0 5px #cd7f32; }
      to { box-shadow: inset 0 0 15px #cd7f32; }
    }

    /* 🔥 TOP 10 */
    .top10 {
      background: linear-gradient(90deg, rgba(0,255,150,0.15), transparent);
      border-left: 4px solid #00ffcc;
    }

    .toggle {
      margin: 10px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="header">
  <img src="https://i.imgur.com/LY3Bb9m.png" class="logo">
  <h1>GOAT FC LEADERBOARD</h1>
</div>

<div class="slogan">⚡ BE THE GAME CHANGER! ⚡</div>

<div class="toggle" onclick="toggleTheme()">🌗 Dark/Red Mode</div>

<div class="tabs">
  <button onclick="loadData('overall')" class="active" id="overallBtn">🏆 Overall</button>
  <button onclick="loadData('monthly')" id="monthlyBtn">📅 Monthly</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Rank</th>
<th>Club ID</th>
<th>Points</th>
<th>Match</th>
<th>Win %</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>

const SHEET_ID = "1DSPKPaU1ZQYbFM4iYbE1VXgDAXU-FCT7--QhYJsNf1M";
const SHEET_NAME = "Leaderboard Goat FC";

let currentType = "overall";

function toggleTheme(){
document.body.classList.toggle("light");
}

function loadData(type){

currentType = type;

document.getElementById("overallBtn").classList.remove("active");
document.getElementById("monthlyBtn").classList.remove("active");

if(type==="overall"){
document.getElementById("overallBtn").classList.add("active");
}else{
document.getElementById("monthlyBtn").classList.add("active");
}

fetch(`https://opensheet.elk.sh/${SHEET_ID}/${SHEET_NAME}`)
.then(res => res.json())
.then(data => {

let tbody = document.getElementById("table");
tbody.innerHTML = "";

if(type==="overall"){
data.sort((a,b)=> (a["Overall Rank"]||999)-(b["Overall Rank"]||999));
}else{
data.sort((a,b)=> (a["Monthly Rank"]||999)-(b["Monthly Rank"]||999));
}

data.forEach((row,index)=>{

let rowClass="";
let badge="";

if(index==0){rowClass="rank1-row"; badge="🥇";}
else if(index==1){rowClass="rank2-row"; badge="🥈";}
else if(index==2){rowClass="rank3-row"; badge="🥉";}
else if(index<10){rowClass="top10";}

let point = type==="overall" ? row["Overall_Point"] : row["Monthly_Point"];
let match = type==="overall" ? row["Overall_PL"] : row["Monthly_PL"];
let win = type==="overall" ? row["Overall_Win%"] : row["Monthly_Win%"];
let gf = type==="overall" ? row["Total GF"] : row["Montly GF"];
let ga = type==="overall" ? row["Total GA"] : row["Montly GA"];
let gd = type==="overall" ? row["Total GD"] : row["Montly GD"];

win = (parseFloat(win)||0)*100;

let tr = `
<tr class="${rowClass}">
<td>${badge} ${index+1}</td>
<td>${row["Club_ID"]}</td>
<td>${point||0}</td>
<td>${match||0}</td>
<td>${win.toFixed(1)}%</td>
<td>${gf||0}</td>
<td>${ga||0}</td>
<td>${gd||0}</td>
</tr>
`;

tbody.innerHTML += tr;

});

});
}

loadData("overall");

setInterval(()=>{
loadData(currentType);
},30000);

</script>

</body>
</html>

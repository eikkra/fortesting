<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Managers</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
    --bg:#050816;
    --card:#0d1329;
    --card2:#101935;
    --accent:#00f0ff;
    --pink:#ff00c8;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
    --green:#00ff88;
    --text:#fff;
    --muted:#93a6cf;
}

/* BACKGROUND */
body{
    background:
    radial-gradient(circle at top left,#10244f 0%,#050816 45%),
    radial-gradient(circle at bottom right,#2b0034 0%,#050816 55%);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    padding:14px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-bottom:6px;
}

.header img{width:36px;height:36px;}

.header h1{
    font-family:'Orbitron';
    font-size:1.25rem;
    letter-spacing:1px;
    background:linear-gradient(90deg,#00f0ff,#ff00c8,#00ff88);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    text-align:center;
    color:var(--muted);
    font-size:.85rem;
    margin-bottom:18px;
}

/* GRID */
.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

/* CARD WITH RGB GLOW */
.manager-card{
    position:relative;
    background:linear-gradient(145deg,var(--card),var(--card2));
    border-radius:18px;
    padding:14px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

/* RGB glow animation */
.manager-card::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:linear-gradient(90deg,#00f0ff,#ff00c8,#00ff88,#00f0ff);
    z-index:0;
    filter:blur(10px);
    opacity:.25;
    animation:rgb 6s linear infinite;
}

@keyframes rgb{
    0%{transform:rotate(0deg)}
    100%{transform:rotate(360deg)}
}

.manager-card > *{
    position:relative;
    z-index:1;
}

/* TOP RANK BADGES */
.rank-badge{
    position:absolute;
    top:10px;
    right:10px;
    font-family:'Orbitron';
    font-size:.7rem;
    padding:5px 9px;
    border-radius:999px;
    display:flex;
    align-items:center;
    gap:5px;
    background:rgba(255,255,255,.08);
}

.rank-badge span{
    font-size:.9rem;
}

/* COLORS */
.top1{border:1px solid var(--gold);}
.top2{border:1px solid var(--silver);}
.top3{border:1px solid var(--bronze);}

/* DOWNLOAD ICON */
.download-icon{
    position:absolute;
    top:40px;
    right:12px;
    font-size:1rem;
    cursor:pointer;
    padding:4px 6px;
    border-radius:8px;
    background:rgba(0,240,255,.1);
    transition:.2s;
}
.download-icon:hover{
    transform:scale(1.15);
    background:rgba(255,0,200,.15);
}

/* TEAM HEADER */
.team-top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
}

.team-logo{
    width:52px;
    height:52px;
    border-radius:14px;
    border:2px solid var(--accent);
}

.team-info h3{
    font-size:1rem;
    font-family:'Orbitron';
}

.team-info p{
    color:var(--accent);
    font-size:.82rem;
}

.team-strength{
    font-size:.72rem;
    color:#ffcc66;
    margin-top:2px;
}

/* PLAYERS */
.players-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:12px;
}

.player-box{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(0,255,136,.25);
    border-radius:12px;
    padding:8px;
    font-size:.7rem;
}

.player-box.best-player{
    border:1px solid var(--gold);
    box-shadow:0 0 10px rgba(255,215,0,.12);
}

.player-id{
    color:var(--accent);
    font-weight:700;
}

.player-name{
    font-size:.62rem;
    color:#ff88dd;
    margin-bottom:5px;
}

/* STATS */
.stat-row{
    display:flex;
    gap:4px;
    margin-bottom:4px;
}

.stat-pill{
    flex:1;
    text-align:center;
    font-size:.6rem;
    padding:3px;
    border-radius:6px;
    background:rgba(0,240,255,.08);
    border:1px solid rgba(0,240,255,.15);
}

/* LINE */
.line-stat{
    text-align:center;
    font-size:.62rem;
    background:rgba(255,255,255,.03);
    margin-bottom:4px;
    padding:4px;
    border-radius:6px;
}

/* TEAM SUMMARY */
.summary{
    border:1px solid rgba(255,255,255,.1);
    border-radius:12px;
    overflow:hidden;
}

.summary-title{
    text-align:center;
    padding:7px;
    font-size:.8rem;
    font-weight:700;
    color:var(--accent);
    background:rgba(0,240,255,.1);
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

.summary-grid div{
    text-align:center;
    padding:8px 2px;
    font-size:.7rem;
    border-right:1px solid rgba(255,255,255,.08);
}

.summary-grid div:last-child{border-right:none;}

/* NEW COLOR STYLE TEXT INSIDE SUMMARY */
.summary-grid b{
    display:block;
    font-size:.9rem;
    color:#fff;
}

/* MOBILE */
@media(max-width:768px){
    .manager-grid{grid-template-columns:1fr;}
    .players-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <img src="https://i.imgur.com/LY3Bb9m.png" crossorigin="anonymous">
    <h1>GOAT FC MANAGERS</h1>
</div>

<div class="desc">Official Manager Ranking Based On League Performance</div>

<div id="managerGrid" class="manager-grid">Loading...</div>

</div>

<script>
const POINTS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MANAGERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";
const MEMBERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

function parseCSV(t){
return t.trim().split("\n").map(r=>r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v=>v.replace(/^"|"$/g,"")));
}

async function load(){
const [p,m,c]=await Promise.all([fetch(POINTS_URL),fetch(MANAGERS_URL),fetch(MEMBERS_URL)]);

const pm=parseCSV(await p.text()), mm=parseCSV(await m.text()), cm=parseCSV(await c.text());

const ph=pm.shift(), mh=mm.shift(), ch=cm.shift();

const nameMap={};
cm.forEach(r=>{
const o=Object.fromEntries(ch.map((h,i)=>[h,r[i]]));
nameMap[o["Club ID Number"]]=o["Full Name"];
});

const matches=pm.map(r=>Object.fromEntries(ph.map((h,i)=>[h,r[i]])));

const res=[];

for(const r of mm){
const m=Object.fromEntries(mh.map((h,i)=>[h,r[i]]));
const ids=m["Player IDs"].split(",").map(x=>x.trim()).slice(0,6);

const stats={}, start=new Date(m["Start Match Date"]), end=new Date(m["End Match Date"]);

ids.forEach(id=>stats[id]={match:0,pts:0,w:0,d:0,l:0,gf:0,ga:0});

for(const x of matches){
if(x.Approved.toLowerCase()!=="yes") continue;

if(stats[x.P1_ID]){
let s=stats[x.P1_ID];
s.match++;s.pts+=+x.P1_Point;s.gf+=+x.P1_Goal;s.ga+=+x.P2_Goal;
if(+x.P1_Point===3)s.w++;else if(+x.P1_Point===1)s.d++;else s.l++;
}

if(stats[x.P2_ID]){
let s=stats[x.P2_ID];
s.match++;s.pts+=+x.P2_Point;s.gf+=+x.P2_Goal;s.ga+=+x.P1_Goal;
if(+x.P2_Point===3)s.w++;else if(+x.P2_Point===1)s.d++;else s.l++;
}
}

let total={match:0,pts:0,w:0,gd:0};

const players=ids.map(id=>{
const s=stats[id];
s.gd=s.gf-s.ga;
s.winPct=s.match?Math.round((s.w/s.match)*100):0;

total.match+=s.match;
total.pts+=s.pts;
total.w+=s.w;
total.gd+=s.gd;

return {id,name:nameMap[id]||"Unknown",...s};
});

total.winPct=total.match?Math.round((total.w/total.match)*100):0;

res.push({...m,players,total});
}

res.sort((a,b)=>b.total.pts-a.total.pts || b.total.gd-a.total.gd);

render(res);
}

function render(d){
document.getElementById("managerGrid").innerHTML=d.map((m,i)=>{

const best=m.players.reduce((b,p,i,a)=>p.pts>a[b].pts?i:b,0);

return `
<div class="manager-card ${i===0?'top1':i===1?'top2':i===2?'top3':''}" id="c${i}">

<div class="rank-badge">${i+1===1?'🥇':i+1===2?'🥈':i+1===3?'🥉':'#'+(i+1)}</div>
<div class="download-icon" onclick="downloadCard('c${i}','${m["Team Name"]}')">⬇️</div>

<div class="team-top">
<img class="team-logo" src="${m["Team Logo"]}" crossorigin="anonymous">
<div class="team-info">
<h3>${m["Team Name"]}</h3>
<p>${m["Manager Name"]}</p>
<div class="team-strength">Strength: ${m.total.pts+m.total.gd}</div>
</div>
</div>

<div class="players-grid">
${m.players.map((p,idx)=>`
<div class="player-box ${idx===best?'best-player':''}">
<div class="player-id">${p.id}</div>
<div class="player-name">${p.name}</div>
<div class="stat-row">
<div class="stat-pill">M ${p.match}</div>
<div class="stat-pill">PTS ${p.pts}</div>
<div class="stat-pill">W% ${p.winPct}</div>
</div>
<div class="line-stat">W-D-L ${p.w}-${p.d}-${p.l}</div>
<div class="line-stat">GF-GA-GD ${p.gf}-${p.ga}-${p.gd}</div>
</div>
`).join("")}
</div>

<div class="summary">
<div class="summary-title">Team Summary</div>
<div class="summary-grid">
<div><b>${m.total.match}</b>Match</div>
<div><b>${m.total.pts}</b>PTS</div>
<div><b>${m.total.gd}</b>GD</div>
<div><b>${m.total.winPct}%</b>Win%</div>
</div>
</div>

</div>`;
}).join("");
}

function downloadCard(id,name){
html2canvas(document.getElementById(id),{
useCORS:true,
backgroundColor:null,
scale:2
}).then(c=>{
let a=document.createElement("a");
a.download=name+".jpg";
a.href=c.toDataURL("image/jpeg",1);
a.click();
});
}

load();
</script>

</body>
</html>

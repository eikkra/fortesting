<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Player Database</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  background: radial-gradient(circle at top, #0f2027, #000);
  color: #fff;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  padding: 20px;
  flex-wrap: wrap;
}

.logo {
  width: 50px;
  filter: drop-shadow(0 0 10px #00f7ff) drop-shadow(0 0 20px #00f7ff);
  animation: glow 2s infinite alternate;
}

.title {
  font-size: 26px;
  color: #00f7ff;
  text-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 5px #00f7ff); }
  to { filter: drop-shadow(0 0 20px #00f7ff); }
}

/* DESCRIPTION */
.desc {
  text-align: center;
  margin-bottom: 20px;
  color: #aaa;
  font-size: 14px;
}

/* SEARCH */
.search-box {
  text-align: center;
  margin-bottom: 20px;
}

.search-box input {
  padding: 12px;
  width: 300px;
  max-width: 90%;
  border-radius: 12px;
  border: none;
  background: #111;
  color: #00f7ff;
  box-shadow: 0 0 10px #00f7ff;
}

/* TABLE */
.container {
  padding: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #111;
  color: #00f7ff;
  padding: 12px;
}

td {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #222;
}

tr {
  transition: 0.3s;
}

tr:hover {
  background: rgba(0,247,255,0.08);
  box-shadow: 0 0 10px #00f7ff44;
}

/* FACEBOOK BUTTON */
.fb-btn {
  padding: 6px 12px;
  border-radius: 20px;
  background: linear-gradient(45deg, #1877f2, #00f7ff);
  color: #fff;
  text-decoration: none;
  font-size: 12px;
  box-shadow: 0 0 10px #00f7ff;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.fb-btn:hover {
  transform: scale(1.05);
}

/* MOBILE VIEW */
@media(max-width: 768px) {
  table, thead, tbody, th, td, tr {
    display: block;
  }

  tr {
    margin-bottom: 15px;
    background: #111;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 0 10px #00f7ff33;
  }

  td {
    text-align: left;
    padding: 6px;
  }

  td::before {
    content: attr(data-label);
    color: #00f7ff;
    font-weight: bold;
    display: block;
  }

  th { display: none; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://i.imgur.com/LY3Bb9m.png" class="logo">
  <div class="title">GOAT FC PLAYER DATABASE</div>
</div>

<!-- DESCRIPTION -->
<div class="desc">
  Explore registered players, check club IDs, and connect with competitors before the tournament begins ⚡
</div>

<!-- SEARCH -->
<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search by Club ID...">
</div>

<!-- TABLE -->
<div class="container">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Club ID</th>
        <th>KONAMI ID</th>
        <th>Device</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRxNxMgcwsp3k8B9jqnfObnnRfhSX3vUcEOuaPTsyEMaEVOZKE9OIcLiMQRJHHkAQiJWn-msKE6Cs80/pub?output=csv";

let players = [];

function loadData() {
  Papa.parse(csvURL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      players = results.data;
      render(players);
    }
  });
}

function render(data) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.forEach(p => {
    const row = `
      <tr>
        <td data-label="Name">${p["Player Name"] || ""}</td>
        <td data-label="Club ID">${p["Your Club ID"] || ""}</td>
        <td data-label="KONAMI ID">${p["KONAMI ID"] || ""}</td>
        <td data-label="Device">${p["DEVICE NAME"] || ""}</td>
        <td data-label="Action">
          <a class="fb-btn" href="${p["Facebook URL"]}" target="_blank">🔗 Profile</a>
        </td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("keyup", function() {
  const val = this.value.toLowerCase();

  const filtered = players.filter(p =>
    (p["Your Club ID"] || "").toLowerCase().includes(val)
  );

  render(filtered);
});

/* AUTO REFRESH EVERY 30 SEC */
setInterval(loadData, 30000);

/* INITIAL LOAD */
loadData();
</script>

</body>
</html>

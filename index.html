<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC STATISTICS</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#020617;
    color:white;
}

/* HEADER */
.header{text-align:center;padding:10px;}
.logo{
    width:60px;
    filter:drop-shadow(0 0 10px #00f5ff);
}
.title{
    color:#00f5ff;
    font-size:18px;
    text-shadow:0 0 10px #00f5ff;
}

.desc{
    text-align:center;
    font-size:11px;
    color:#94a3b8;
}

/* SEARCH */
.search{text-align:center;margin:10px;}
.search input{
    padding:8px;
    width:85%;
    max-width:300px;
    border:1px solid #00f5ff;
    background:black;
    color:#00f5ff;
}

/* CARD */
.card{
    margin:10px;
    padding:12px;
    border:1px solid #00f5ff;
    border-radius:10px;
    background:#001f2f;
    box-shadow:0 0 10px #00f5ff;
    text-align:center;
}

.club{
    color:#00f5ff;
    font-weight:bold;
    margin-bottom:10px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:5px;
}
.box{
    background:#020617;
    border:1px solid #00f5ff;
    padding:5px;
    font-size:11px;
}

/* MOBILE */
@media(max-width:768px){
    .grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/LY3Bb9m.png" class="logo">
<div class="title">GOAT FC STATISTICS</div>
</div>

<div class="desc">Live approved stats • Auto updated</div>

<div class="search">
<input type="text" id="search" placeholder="Search Club ID" oninput="render()">
</div>

<div id="data">Loading...</div>

<script>

const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";

let data=[];

// FIXED CSV PARSER (MAIN FIX)
function parseCSV(text){
    const rows = text.trim().split("\n");
    const result=[];

    for(let i=1;i<rows.length;i++){
        let cols = rows[i].split(",");

        // skip invalid rows
        if(cols.length < 12) continue;

        if((cols[9]||"").toLowerCase().trim() !== "yes") continue;

        result.push({
            p1: cols[0].trim(),
            p2: cols[1].trim(),
            type: cols[2].trim(),
            s1: Number(cols[3])||0,
            s2: Number(cols[4])||0
        });
    }

    return result;
}

// LOAD (ULTRA SAFE)
async function load(){
    try{
        let res = await fetch(URL + "&t=" + Date.now());
        let text = await res.text();

        let rows = parseCSV(text);

        if(rows.length === 0){
            document.getElementById("data").innerHTML="No approved data found";
            return;
        }

        let map={};

        rows.forEach(r=>{
            [[r.p1,r.s1,r.s2],[r.p2,r.s2,r.s1]].forEach(([id,me,op])=>{

                if(!id) return;

                if(!map[id]) map[id]={w:0,l:0,d:0,m:0,gs:0,gc:0,s7:0,f:0,o:0};

                map[id].m++;
                map[id].gs+=me;
                map[id].gc+=op;

                if(me>=7) map[id].s7++;

                if(r.type==="Friendly") map[id].f++;
                else map[id].o++;

                if(me>op) map[id].w++;
                else if(me<op) map[id].l++;
                else map[id].d++;
            });
        });

        data = Object.keys(map).map(id=>{
            let v=map[id];
            return{
                id,
                ...v,
                winp: v.m? (v.w/v.m*100):0,
                rate: v.m? (v.gs/v.m):0,
                diff: v.gs-v.gc
            }
        });

        render();

    }catch(e){
        document.getElementById("data").innerHTML="Error loading data";
        console.error(e);
    }
}

// SEARCH NORMALIZE
function normalize(s){
    return s.toLowerCase().replace(/[^a-z0-9]/g,"");
}

// RENDER
function render(){
    let q = normalize(document.getElementById("search").value);

    let sorted = [...data].sort((a,b)=>b.w-a.w);

    let html="";

    sorted.forEach(p=>{
        if(q && !normalize(p.id).includes(q)) return;

        html+=`
        <div class="card">
        <div class="club">Player ID: ${p.id}</div>

        <div class="grid">
            <div class="box">Win<br>${p.w}</div>
            <div class="box">Loss<br>${p.l}</div>
            <div class="box">Draw<br>${p.d}</div>

            <div class="box">Match<br>${p.m}</div>
            <div class="box">Win%<br>${p.winp.toFixed(1)}</div>
            <div class="box">Rate<br>${p.rate.toFixed(2)}</div>

            <div class="box">Scored<br>${p.gs}</div>
            <div class="box">Conceded<br>${p.gc}</div>
            <div class="box">Difference<br>${p.diff}</div>

            <div class="box">7+ Goals<br>${p.s7}</div>
            <div class="box">Friendly<br>${p.f}</div>
            <div class="box">Tournaments<br>${p.o}</div>
        </div>
        </div>`;
    });

    document.getElementById("data").innerHTML = html || "No result found";
}

// START
load();

</script>

</body>
</html>

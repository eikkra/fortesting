<!DOCTYPE html>
<html>
<head>
<title>Goat FC Leaderboard</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/LY3Bb9m.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Oswald',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
text-align:center;
}

.wrapper{
max-width:900px;
margin:auto;
}

.header{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
padding:12px;
}

.logo{
width:44px;
filter:drop-shadow(0 0 10px #00ffcc);
}

h1{
margin:0;
font-size:20px;
color:#00ffcc;
animation:glowTitle 2s infinite alternate;
}

@keyframes glowTitle{
from{text-shadow:0 0 5px #00ffcc;}
to{text-shadow:0 0 18px #00ffff;}
}

.desc{
font-size:12px;
opacity:.7;
margin-bottom:10px;
}

.tabs{margin:8px;}

button{
padding:6px 14px;
border:none;
border-radius:20px;
background:#1f2937;
color:white;
font-size:12px;
cursor:pointer;
}

button.active{
background:linear-gradient(90deg,#00ffcc,#00c3ff);
color:black;
}

.stats{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
margin-bottom:12px;
}

.stat{
padding:6px 12px;
border-radius:12px;
background:rgba(0,255,200,0.08);
font-size:12px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 6px #00ffcc;}
to{box-shadow:0 0 14px #00ffcc;}
}

.card{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.08);
border-radius:12px;
padding:10px;
margin-top:10px;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
color:#00ffcc;
font-size:13px;
padding:8px 6px;
}

td{
padding:8px 6px;
font-size:13px;
}

th:nth-child(1){width:5%;}
th:nth-child(2){width:30%;}
th:nth-child(3){width:8%;}

.player{
text-align:left;
}

.id{
font-size:10px;
opacity:.6;
}

tbody tr{
border-bottom:1px solid rgba(255,255,255,0.08);
}

.rank1{
background:linear-gradient(90deg,rgba(255,215,0,0.25),transparent);
animation:goldGlow 2s infinite alternate;
}
@keyframes goldGlow{
from{box-shadow:inset 0 0 6px gold;}
to{box-shadow:inset 0 0 18px gold;}
}

.rank2{
background:linear-gradient(90deg,rgba(192,192,192,0.25),transparent);
animation:silverGlow 2s infinite alternate;
}
@keyframes silverGlow{
from{box-shadow:inset 0 0 6px silver;}
to{box-shadow:inset 0 0 18px silver;}
}

.rank3{
background:linear-gradient(90deg,rgba(205,127,50,0.25),transparent);
animation:bronzeGlow 2s infinite alternate;
}
@keyframes bronzeGlow{
from{box-shadow:inset 0 0 6px #cd7f32;}
to{box-shadow:inset 0 0 18px #cd7f32;}
}

.top10{
background:linear-gradient(90deg,rgba(0,255,150,0.12),transparent);
border-left:3px solid #00ffcc;
}

/* 📱 MOBILE FIX ONLY */
@media(max-width:600px){

.wrapper{
max-width:100%;
padding:0 6px;
}

.player{
font-size:11px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

td{
font-size:11px;
padding:6px 4px;
}

/* 🔥 ONLY CHANGE */
tbody tr{
border-bottom:none;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">
<img src="https://i.imgur.com/LY3Bb9m.png" class="logo">
<h1>GOAT FC LEADERBOARD</h1>
</div>

<div class="desc">
Live competitive ranking based on performance, goals & consistency.
</div>

<div class="tabs">
<button onclick="loadData('overall')" id="overallBtn" class="active">Overall</button>
<button onclick="loadData('monthly')" id="monthlyBtn">Monthly</button>
</div>

<div class="stats">
<div class="stat">Match: <span id="m">0</span></div>
<div class="stat">Goal: <span id="g">0</span></div>
<div class="stat">Points: <span id="p">0</span></div>
<div class="stat">Per Match: <span id="pm">0</span></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>#</th>
<th style="text-align:left">Player</th>
<th>Pts</th>
<th>M</th>
<th>Win%</th>
<th>GF</th>
<th>GA</th>
<th>GD</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

const L="https://opensheet.elk.sh/1DSPKPaU1ZQYbFM4iYbE1VXgDAXU-FCT7--QhYJsNf1M/Leaderboard%20Goat%20FC";
const M="https://opensheet.elk.sh/1DSPKPaU1ZQYbFM4iYbE1VXgDAXU-FCT7--QhYJsNf1M/CLUB%20MEMBERS";

let type="overall";

async function loadData(t){

type=t;

document.getElementById("overallBtn").classList.remove("active");
document.getElementById("monthlyBtn").classList.remove("active");
document.getElementById(t+"Btn").classList.add("active");

let [ld,md]=await Promise.all([
fetch(L).then(r=>r.json()),
fetch(M).then(r=>r.json())
]);

let map={};
md.forEach(x=>{
if(x["Club ID Number"])
map[x["Club ID Number"].trim()]=x["Full Name"];
});

ld=ld.filter(r=>map[r["Club_ID"]?.trim()]);

ld.sort((a,b)=>{

let A_m=+(t==="overall"?a["Overall_PL"]:a["Monthly_PL"])||0;
let B_m=+(t==="overall"?b["Overall_PL"]:b["Monthly_PL"])||0;

if(A_m===0 && B_m>0) return 1;
if(B_m===0 && A_m>0) return -1;

let A_pt=+(t==="overall"?a["Overall_Point"]:a["Monthly_Point"])||0;
let B_pt=+(t==="overall"?b["Overall_Point"]:b["Monthly_Point"])||0;
if(B_pt!==A_pt) return B_pt-A_pt;

let A_gd=+(t==="overall"?a["Total GD"]:a["Montly GD"])||0;
let B_gd=+(t==="overall"?b["Total GD"]:b["Montly GD"])||0;
if(B_gd!==A_gd) return B_gd-A_gd;

let A_gf=+(t==="overall"?a["Total GF"]:a["Montly GF"])||0;
let B_gf=+(t==="overall"?b["Total GF"]:b["Montly GF"])||0;
if(B_gf!==A_gf) return B_gf-A_gf;

let A_ga=+(t==="overall"?a["Total GA"]:a["Montly GA"])||0;
let B_ga=+(t==="overall"?b["Total GA"]:b["Montly GA"])||0;

return A_ga-B_ga;

});

let tbody=document.getElementById("table");
tbody.innerHTML="";

let totalM=0,totalG=0,totalP=0;

ld.forEach((r,i)=>{

let cls=i==0?"rank1":i==1?"rank2":i==2?"rank3":i<10?"top10":"";

let m=+(t==="overall"?r["Overall_PL"]:r["Monthly_PL"])||0;
let gf=+(t==="overall"?r["Total GF"]:r["Montly GF"])||0;
let pt=+(t==="overall"?r["Overall_Point"]:r["Monthly_Point"])||0;

totalM+=m;
totalG+=gf;
totalP+=pt;

let win=(+((t==="overall"?r["Overall_Win%"]:r["Monthly_Win%"]))||0)*100;

let ga=t==="overall"?r["Total GA"]:r["Montly GA"];
let gd=t==="overall"?r["Total GD"]:r["Montly GD"];

tbody.innerHTML+=`
<tr class="${cls}">
<td>${i+1}</td>
<td class="player">
${map[r["Club_ID"]]}
<div class="id">${r["Club_ID"]}</div>
</td>
<td>${pt}</td>
<td>${m}</td>
<td>${win.toFixed(1)}%</td>
<td>${gf}</td>
<td>${ga}</td>
<td>${gd}</td>
</tr>`;
});

let match=Math.round(totalM/2);
let per=match?(totalG/match).toFixed(2):0;

document.getElementById("m").innerText=match;
document.getElementById("g").innerText=totalG;
document.getElementById("p").innerText=totalP;
document.getElementById("pm").innerText=per;

}

loadData("overall");
setInterval(()=>loadData(type),30000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC STATISTICS</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/LY3Bb9m.png">


<!-- 🔥 CLEAN MODERN FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#020617;
    color:white;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:12px;
    flex-wrap:wrap;
}
.header img{
    width:42px;
    filter: drop-shadow(0 0 6px #00f5ff);
}
.header h1{
    font-size:20px;
    margin:0;
    color:#00f5ff;
}
.desc{
    width:100%;
    text-align:center;
    font-size:12px;
    color:#94a3b8;
}

/* SEARCH */
.search{
    text-align:center;
    margin:10px;
}
.search input{
    padding:10px;
    width:90%;
    max-width:380px;
    border-radius:10px;
    border:1px solid #00f5ff;
    background:black;
    color:#00f5ff;
    outline:none;
}

/* GRID */
#data{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:10px;
    padding:10px;
}

/* CARD */
.card{
    padding:14px;
    border-radius:16px;
    background:linear-gradient(145deg,#020617,#001f2f);
    border:1px solid rgba(0,245,255,0.25);
    box-shadow:0 0 8px rgba(0,245,255,0.12);
    text-align:center;
}

/* RANK COLORS */
.rank1{border:1px solid gold;box-shadow:0 0 12px gold;}
.rank2{border:1px solid silver;box-shadow:0 0 12px silver;}
.rank3{border:1px solid #cd7f32;box-shadow:0 0 12px #cd7f32;}
.top10{border:1px solid #a855f7;box-shadow:0 0 10px #a855f7;}

/* PLAYER TEXT */
.club{
    font-size:15px;
    font-weight:600;
    margin-bottom:12px;
}

/* NAME + ID COLOR */
.name{
    color:#22c55e;
    text-shadow:0 0 6px #22c55e;
}
.id{
    color:#00f5ff;
    text-shadow:0 0 6px #00f5ff;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}

/* BOX */
.box{
    padding:8px;
    border-radius:10px;
    font-size:12px;
    background:rgba(0,245,255,0.05);
    border:1px solid rgba(0,245,255,0.25);
    box-shadow:0 0 4px rgba(0,245,255,0.3);
    white-space:nowrap;
}

/* DOWNLOAD */
.download{
    margin-top:10px;
}
.download button{
    padding:6px 12px;
    border:none;
    border-radius:8px;
    background:#00f5ff;
    color:black;
    font-size:12px;
    cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
    #data{display:block;padding:6px;}
    .grid{grid-template-columns:repeat(2,1fr);}
    .card{margin-bottom:12px;}
}
</style>
</head>

<body>

<div class="header">
<img src="https://i.imgur.com/LY3Bb9m.png">
<h1>GOAT FC STATISTICS</h1>
<div class="desc">
Official performance dashboard (Approved matches only)
</div>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search Name or Club ID..." oninput="render()">
</div>

<div id="data"></div>

<script>

const MATCH_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MEMBER_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

let players={}, members={};

// 🔒 SAFE CSV PARSER
function parseCSV(text){
    const rows=[];
    let current=[], value="", insideQuotes=false;

    for(let i=0;i<text.length;i++){
        let char=text[i];

        if(char === '"'){
            if(insideQuotes && text[i+1] === '"'){
                value += '"'; i++;
            } else insideQuotes=!insideQuotes;
        }
        else if(char === ',' && !insideQuotes){
            current.push(value); value="";
        }
        else if((char === '\n' || char === '\r') && !insideQuotes){
            if(value || current.length){
                current.push(value);
                rows.push(current);
                current=[]; value="";
            }
        }
        else value+=char;
    }
    return rows;
}

function normalize(id){
    return (id||"").toLowerCase().replace(/[^a-z0-9]/g,'');
}

// ⚡ FAST LOAD (parallel)
async function init(){

    let [memberText, matchText] = await Promise.all([
        fetch(MEMBER_URL).then(r=>r.text()),
        fetch(MATCH_URL + "&t=" + Date.now()).then(r=>r.text())
    ]);

    // MEMBERS
    parseCSV(memberText).slice(1).forEach(c=>{
        if(c[1]) members[normalize(c[1])] = c[0];
    });

    // MATCHES
    parseCSV(matchText).slice(1).forEach(c=>{
        let approved=(c[9]||"").toLowerCase();
        if(approved!=="yes") return;

        update(c[0],+c[3],+c[4],c[2]);
        update(c[1],+c[4],+c[3],c[2]);
    });

    render();
}

function update(id,scored,conceded,type){
    if(!players[id]){
        players[id]={match:0,win:0,loss:0,draw:0,gs:0,gc:0,diff:0,rate:0,seven:0,friendly:0,other:0};
    }
    let p=players[id];

    p.match++; p.gs+=scored; p.gc+=conceded; p.diff=p.gs-p.gc;
    if(type==="Friendly") p.friendly++; else p.other++;

    if(scored>conceded) p.win++;
    else if(scored<conceded) p.loss++;
    else p.draw++;

    if(scored>=7) p.seven++;

    p.winp=(p.win/p.match)*100;
    p.rate=(p.gs/p.match);
}

function render(){

    let q=normalize(document.getElementById("search").value);
    let sorted=Object.entries(players).sort((a,b)=>b[1].win-a[1].win);

    let html="";

    sorted.forEach(([id,p],i)=>{

        let name=members[normalize(id)]||"Unknown";

        if(q && !(normalize(id).includes(q)||normalize(name).includes(q))) return;

        let cls="card";
        if(i===0) cls+=" rank1";
        else if(i===1) cls+=" rank2";
        else if(i===2) cls+=" rank3";
        else if(i<10) cls+=" top10";

        html+=`
        <div class="${cls}">
            <div class="club">
                Player: <span class="name">${name}</span> 
                (<span class="id">${id}</span>)
            </div>

            <div class="grid">
                <div class="box">🟢 Win | ${p.win}</div>
                <div class="box">🔴 Loss | ${p.loss}</div>
                <div class="box">🟡 Draw | ${p.draw}</div>

                <div class="box">🎮 Match | ${p.match}</div>
                <div class="box">📊 Win% | ${p.winp.toFixed(1)}</div>
                <div class="box">⚽ Rate | ${p.rate.toFixed(2)}</div>

                <div class="box">⚽ Scored | ${p.gs}</div>
                <div class="box">🥅 Conceded | ${p.gc}</div>
                <div class="box">📈 Diff | ${p.diff}</div>

                <div class="box">👑 7+ Goals | ${p.seven}</div>
                <div class="box">🤝 Friendly | ${p.friendly}</div>
                <div class="box">🏆 Tournament | ${p.other}</div>
            </div>

            <div class="download">
                <button onclick="downloadCard(this)">Download</button>
            </div>
        </div>`;
    });

    document.getElementById("data").innerHTML=html;
}

function downloadCard(btn){
    let card=btn.closest(".card");
    html2canvas(card).then(canvas=>{
        let link=document.createElement("a");
        link.download="GOAT_FC_STATS.jpg";
        link.href=canvas.toDataURL("image/jpeg");
        link.click();
    });
}

init();

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</body>
</html>

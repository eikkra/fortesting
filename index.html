<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC MATCH LOG</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#020617;
    color:#e2e8f0;
}

/* HEADER */
.header{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    padding:10px;
}
.header img{width:35px;}
.header h1{
    font-size:16px;
    color:#00f5ff;
    text-shadow:0 0 10px #00f5ff;
}

/* TABS */
.tabs{
    display:flex;
    justify-content:center;
    gap:6px;
}
.tab{
    padding:5px 10px;
    font-size:12px;
    border:1px solid #00f5ff;
    border-radius:5px;
    color:#00f5ff;
    cursor:pointer;
}
.active{background:#00f5ff;color:black;}

/* FILTER */
.filter-box{
    display:flex;
    gap:5px;
    padding:8px;
    justify-content:center;
    overflow-x:auto;
}
select,input,button{
    padding:5px;
    font-size:11px;
    border-radius:5px;
    border:1px solid #00f5ff;
    background:black;
    color:#00f5ff;
}
button{background:#00f5ff;color:black;}

/* TABLE */
.container{max-height:65vh;overflow:auto;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead{position:sticky;top:0;background:#020617;}
th,td{
    padding:6px;
    text-align:center;
    white-space:nowrap;
    font-size:11px;
}
th{color:#00f5ff;border-bottom:2px solid #00f5ff;}
tr{border-bottom:1px solid #0f172a;}

/* RESULT COLORS */
.win{color:#22c55e;}
.loss{color:#ef4444;}
.draw{color:#facc15;}
.gold{color:gold;text-shadow:0 0 8px gold;}

/* STATS */
.stats{
    display:none;
    padding:10px;
}
.search-box{
    display:flex;
    justify-content:center;
    margin-bottom:10px;
}
.search-box input{
    width:80%;
    max-width:300px;
}

/* CARD */
.card{
    border:1px solid #00f5ff;
    border-radius:10px;
    padding:10px;
    margin-bottom:10px;
    text-align:center;
    box-shadow:0 0 10px #00f5ff;
}

/* MOBILE FIX */
@media(max-width:768px){
    .header h1{font-size:14px;}
}
</style>
</head>

<body>

<div class="header">
    <img src="https://i.imgur.com/LY3Bb9m.png">
    <h1>GOAT FC MATCH LOG</h1>
</div>

<div class="tabs">
    <div class="tab active" onclick="showTab('log',this)">Log</div>
    <div class="tab" onclick="showTab('stats',this)">Stats</div>
</div>

<!-- FILTER -->
<div class="filter-box" id="filterBox">
<select id="type">
<option value="">All</option>
<option value="Friendly">Friendly</option>
<option value="Solo Tournament">Solo</option>
<option value="Bid Tournament">Bid</option>
<option value="League">League</option>
<option value="Co-op">Co-op</option>
</select>
<input type="date" id="start">
<input type="date" id="end">
<button onclick="applyFilter()">Filter</button>
</div>

<!-- LOG -->
<div class="container" id="log">
<table>
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>P1</th>
<th>P2</th>
<th>Score</th>
<th>Points</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>

<!-- STATS -->
<div class="stats" id="stats">
<div class="search-box">
<input type="text" id="search" placeholder="Search Club ID (e.g. GFC-009)" oninput="generateStats()">
</div>
<div id="statsData"></div>
</div>

<script>

const URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";

let data=[];

// SAFE DATE
function parseDate(s){
    try{
        let p=s.split(" ")[0].split("/");
        return new Date(p[2],p[0]-1,p[1]);
    }catch{return null;}
}

// LOAD
async function load(){
    try{
        let t=await fetch(URL).then(r=>r.text());
        let lines=t.split("\n");

        data=lines.slice(1).map(l=>{
            let r=l.split(",");
            if(r.length<12) return null;

            let d=parseDate(r[11]);
            if(!d) return null;

            return {
                date:d,type:r[2],
                p1:r[0],p2:r[1],
                s1:+r[3],s2:+r[4],
                pt1:+r[5],pt2:+r[6],
                ok:(r[9]||"").toLowerCase()
            };
        }).filter(x=>x && x.ok==="yes");

        render(data);
    }catch(e){
        console.log("Load error");
    }
}

// RENDER LOG
function render(arr){
    let h="";
    arr.slice(0,500).forEach(r=>{
        let c1="draw",c2="draw";
        if(r.s1>r.s2){c1="win";c2="loss";}
        else if(r.s1<r.s2){c1="loss";c2="win";}
        let g=(r.s1>=7||r.s2>=7)?"gold":"";

        h+=`<tr>
        <td>${r.date.toISOString().slice(0,10)}</td>
        <td>${r.type.replace(" Tournament","")}</td>
        <td class="${c1}">${r.p1}</td>
        <td class="${c2}">${r.p2}</td>
        <td class="${g}">${r.s1}-${r.s2}</td>
        <td>${r.pt1}-${r.pt2}</td>
        </tr>`;
    });
    document.getElementById("body").innerHTML=h;
}

// FILTER
function applyFilter(){
    let t=document.getElementById("type").value;
    let s=document.getElementById("start").value;
    let e=document.getElementById("end").value;

    let res=data.filter(r=>
        (!t||r.type===t) &&
        (!s||r.date>=new Date(s)) &&
        (!e||r.date<=new Date(e))
    );

    render(res);
}

// TAB
function showTab(tab,el){
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    el.classList.add("active");

    document.getElementById("log").style.display=tab==="log"?"block":"none";
    document.getElementById("filterBox").style.display=tab==="log"?"flex":"none";
    document.getElementById("stats").style.display=tab==="stats"?"block":"none";

    if(tab==="stats") generateStats();
}

// STATS
function generateStats(){
    let q=document.getElementById("search").value.toLowerCase();
    let map={};

    data.forEach(r=>{
        [r.p1,r.p2].forEach((p,i)=>{
            if(!map[p]) map[p]={w:0,l:0,d:0,gs:0,gc:0};

            let me=i===0? r.s1:r.s2;
            let op=i===0? r.s2:r.s1;

            map[p].gs+=me;
            map[p].gc+=op;

            if(me>op) map[p].w++;
            else if(me<op) map[p].l++;
            else map[p].d++;
        });
    });

    let h="";
    Object.keys(map).forEach(p=>{
        if(q && !p.toLowerCase().includes(q)) return;
        let s=map[p];

        h+=`<div class="card">
        <b>Club ID: ${p}</b><br><br>
        🟢 Win: ${s.w} | 🔴 Loss: ${s.l} | 🟡 Draw: ${s.d}<br>
        ⚽ Scored: ${s.gs} | 🥅 Conceded: ${s.gc}
        </div>`;
    });

    document.getElementById("statsData").innerHTML=h;
}

load();

</script>

</body>
</html>

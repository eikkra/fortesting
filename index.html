<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GOAT FC MANAGERS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050816;
    --card:#0d1329;
    --card2:#101935;
    --accent:#00f0ff;
    --accent2:#ff00c8;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
    --text:#ffffff;
    --muted:#9db0d6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top left,#0d1f45 0%,#050816 40%),
    radial-gradient(circle at bottom right,#24002b 0%,#050816 50%);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    padding:20px;
    min-height:100vh;
}

.container{
    max-width:1600px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header img{
    width:85px;
    margin-bottom:10px;
    animation:float 3s ease-in-out infinite;
}

.header h1{
    font-family:'Orbitron',sans-serif;
    font-size:2.3rem;
    background:linear-gradient(90deg,#00f0ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.header p{
    color:var(--muted);
    margin-top:8px;
    font-size:1rem;
}

.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
    gap:24px;
}

.manager-card{
    background:linear-gradient(145deg,var(--card),var(--card2));
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:22px;
    position:relative;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    transition:.35s;
}

.manager-card:hover{
    transform:translateY(-6px);
    box-shadow:0 15px 35px rgba(0,240,255,0.15);
}

.rank-badge{
    position:absolute;
    top:16px;
    right:16px;
    padding:7px 14px;
    border-radius:999px;
    font-weight:700;
    font-size:.9rem;
    font-family:'Orbitron';
}

.rank-1{background:var(--gold);color:#000;}
.rank-2{background:var(--silver);color:#000;}
.rank-3{background:var(--bronze);color:#000;}

.team-header{
    text-align:center;
    margin-bottom:18px;
}

.team-logo{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:20px;
    border:2px solid var(--accent);
    box-shadow:0 0 20px rgba(0,240,255,.35);
}

.team-name{
    font-size:1.45rem;
    font-weight:700;
    margin-top:12px;
}

.manager-name{
    color:var(--accent);
    font-size:1rem;
}

.players{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:20px;
}

.player{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,.05);
    padding:12px 14px;
    border-radius:14px;
}

.player-top{
    display:flex;
    justify-content:space-between;
    font-weight:700;
    margin-bottom:6px;
}

.player-stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    font-size:.88rem;
    color:var(--muted);
}

.summary{
    margin-top:18px;
    padding:16px;
    border-radius:18px;
    background:linear-gradient(90deg,#00f0ff15,#ff00c815);
    border:1px solid rgba(255,255,255,0.08);
}

.summary h4{
    margin-bottom:10px;
    color:var(--accent);
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    text-align:center;
    font-size:.9rem;
}

.loading{
    text-align:center;
    padding:80px;
    font-size:1.2rem;
    color:var(--muted);
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
}

@media(max-width:768px){
    .manager-grid{
        grid-template-columns:1fr;
    }

    .player-stats{
        grid-template-columns:1fr;
    }

    .summary-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .header h1{
        font-size:1.7rem;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <img src="https://i.imgur.com/LY3Bb9m.png" alt="GOAT FC">
        <h1>GOAT FC MANAGERS</h1>
        <p>Official Club Manager Ranking Based on League Performance of Registered Squad Members</p>
    </div>

    <div id="managerGrid" class="manager-grid">
        <div class="loading">Loading Manager Profiles...</div>
    </div>

</div>

<script>
const POINTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";

const MANAGERS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";

function parseCSV(text){
    const rows = text.trim().split('\n');
    return rows.map(row =>
        row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
           .map(v => v.replace(/^"|"$/g,'').trim())
    );
}

function toDate(d){
    return new Date(d);
}

function calculatePlayerStats(playerId,matches,start,end){
    const stats={
        match:0,pts:0,w:0,d:0,l:0,gf:0,ga:0,gd:0
    };

    matches.forEach(m=>{
        if(m.Approved.toLowerCase()!=="yes") return;
        if(m.Match_Type.toLowerCase()!=="league") return;

        const md=toDate(m.Match_Date);
        if(md<start || md>end) return;

        if(m.P1_ID===playerId){
            stats.match++;
            stats.pts+=+m.P1_Point;
            stats.gf+=+m.P1_Goal;
            stats.ga+=+m.P2_Goal;

            if(+m.P1_Point===3) stats.w++;
            else if(+m.P1_Point===1) stats.d++;
            else stats.l++;
        }

        if(m.P2_ID===playerId){
            stats.match++;
            stats.pts+=+m.P2_Point;
            stats.gf+=+m.P2_Goal;
            stats.ga+=+m.P1_Goal;

            if(+m.P2_Point===3) stats.w++;
            else if(+m.P2_Point===1) stats.d++;
            else stats.l++;
        }
    });

    stats.gd=stats.gf-stats.ga;
    stats.winPct=stats.match?((stats.w/stats.match)*100).toFixed(1):0;

    return stats;
}

async function loadManagers(){

    const [pointsRes,managerRes]=await Promise.all([
        fetch(POINTS_URL),
        fetch(MANAGERS_URL)
    ]);

    const pointsCSV=parseCSV(await pointsRes.text());
    const managersCSV=parseCSV(await managerRes.text());

    const pointHeaders=pointsCSV.shift();
    const managerHeaders=managersCSV.shift();

    const matches=pointsCSV.map(r=>Object.fromEntries(pointHeaders.map((h,i)=>[h,r[i]])));
    const managers=managersCSV.map(r=>Object.fromEntries(managerHeaders.map((h,i)=>[h,r[i]])));

    const processed=[];

    managers.forEach(manager=>{

        const playerIds=manager["Player IDs"].split(',').map(v=>v.trim());

        const start=toDate(manager["Start Match Date"]);
        const end=toDate(manager["End Match Date"]);

        let total={
            match:0,pts:0,w:0,d:0,l:0,gf:0,ga:0,gd:0
        };

        const players=playerIds.slice(0,6).map(id=>{
            const s=calculatePlayerStats(id,matches,start,end);

            total.match+=s.match;
            total.pts+=s.pts;
            total.w+=s.w;
            total.d+=s.d;
            total.l+=s.l;
            total.gf+=s.gf;
            total.ga+=s.ga;
            total.gd+=s.gd;

            return {id,...s};
        });

        total.winPct=total.match?((total.w/total.match)*100).toFixed(1):0;

        processed.push({
            ...manager,
            players,
            total
        });
    });

    processed.sort((a,b)=>
        b.total.pts-a.total.pts ||
        b.total.gd-a.total.gd ||
        b.total.winPct-a.total.winPct
    );

    renderManagers(processed);
}

function renderManagers(managers){

    const grid=document.getElementById('managerGrid');

    grid.innerHTML=managers.map((m,i)=>`
        <div class="manager-card">
            ${i<3?`<div class="rank-badge rank-${i+1}">${i+1}${['st','nd','rd'][i]}</div>`:''}

            <div class="team-header">
                <img class="team-logo" src="${m["Team Logo"]}" alt="">
                <div class="team-name">${m["Team Name"]}</div>
                <div class="manager-name">${m["Manager Name"]}</div>
            </div>

            <div class="players">
                ${m.players.map(p=>`
                    <div class="player">
                        <div class="player-top">
                            <span>${p.id}</span>
                            <span>${p.pts} PTS</span>
                        </div>
                        <div class="player-stats">
                            <span>Match: ${p.match}</span>
                            <span>W-D-L: ${p.w}-${p.d}-${p.l}</span>
                            <span>GF-GA-GD: ${p.gf}-${p.ga}-${p.gd}</span>
                        </div>
                    </div>
                `).join('')}
            </div>

            <div class="summary">
                <h4>Manager Summary</h4>
                <div class="summary-grid">
                    <div><b>${m.total.match}</b><br>Match</div>
                    <div><b>${m.total.pts}</b><br>PTS</div>
                    <div><b>${m.total.gd}</b><br>GD</div>
                    <div><b>${m.total.winPct}%</b><br>Win%</div>
                </div>
            </div>
        </div>
    `).join('');
}

loadManagers();
</script>

</body>
</html>

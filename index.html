<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Managers</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
    --bg:#050816;
    --card:#0d1329;
    --card2:#101935;
    --accent:#00f0ff;
    --pink:#ff00c8;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
    --green:#00ff88;
    --text:#fff;
}

/* BASE */
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:
    radial-gradient(circle at top left,#0f2a5f 0%,#050816 45%),
    radial-gradient(circle at bottom right,#2b0034 0%,#050816 60%);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    padding:14px;
}

/* HEADER */
.container{max-width:1600px;margin:auto}

.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.header img{width:36px;height:36px}

.header h1{
    font-family:'Orbitron';
    font-size:1.25rem;
    letter-spacing:1px;
    background:linear-gradient(90deg,#00f0ff,#ff00c8,#00ff88);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.desc{
    text-align:center;
    color:#94a7d0;
    font-size:.85rem;
    margin-bottom:18px;
}

/* GRID */
.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

/* CARD RGB BORDER ANIMATION */
.manager-card{
    position:relative;
    padding:14px;
    border-radius:18px;
    background:linear-gradient(145deg,#0d1329,#101935);
    box-shadow:0 8px 22px rgba(0,0,0,.4);
    overflow:hidden;
}

.manager-card::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:linear-gradient(90deg,#00f0ff,#ff00c8,#00ff88,#00f0ff);
    background-size:300% 300%;
    animation:rgbMove 6s linear infinite;
    z-index:0;
    opacity:.35;
}

.manager-card::after{
    content:"";
    position:absolute;
    inset:2px;
    background:linear-gradient(145deg,#0d1329,#101935);
    border-radius:16px;
    z-index:0;
}

@keyframes rgbMove{
    0%{background-position:0% 50%}
    100%{background-position:100% 50%}
}

.manager-card > *{position:relative;z-index:1}

/* TOP RANK BADGE */
.rank-badge{
    position:absolute;
    top:10px;
    right:10px;
    padding:4px 10px;
    border-radius:999px;
    font-family:'Orbitron';
    font-size:.7rem;
    display:flex;
    align-items:center;
    gap:4px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(5px);
}

/* SPECIAL RANK COLORS */
.top1{box-shadow:0 0 20px rgba(255,215,0,.25);}
.top2{box-shadow:0 0 20px rgba(192,192,192,.18);}
.top3{box-shadow:0 0 20px rgba(205,127,50,.18);}

/* DOWNLOAD ICON */
.download-icon{
    position:absolute;
    top:42px;
    right:12px;
    cursor:pointer;
    opacity:.8;
    transition:.2s;
    filter:drop-shadow(0 0 5px #00f0ff);
}
.download-icon:hover{
    opacity:1;
    transform:scale(1.15);
}

/* TEAM HEADER */
.team-top{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:10px;
}

.team-logo{
    width:54px;
    height:54px;
    border-radius:14px;
    border:2px solid var(--accent);
}

.team-info h3{
    font-size:1rem;
    font-weight:700;
}

.team-info p{
    color:var(--accent);
    font-size:.82rem;
}

.team-strength{
    font-size:.72rem;
    color:#ffd36a;
    margin-top:2px;
}

/* PLAYERS */
.players-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    margin-bottom:12px;
}

.player-box{
    padding:8px;
    border-radius:12px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(0,255,136,.25);
    font-size:.7rem;
}

.player-box.best-player{
    border:1px solid var(--gold);
    box-shadow:0 0 10px rgba(255,215,0,.12);
}

.player-id{color:var(--accent);font-weight:700;font-size:.75rem}
.player-name{color:#ff8ae2;font-size:.62rem;margin-bottom:5px}

/* SUMMARY */
.summary{
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    overflow:hidden;
}

.summary-title{
    text-align:center;
    background:rgba(0,240,255,.12);
    padding:6px;
    font-size:.8rem;
    font-weight:700;
    color:var(--accent);
}

/* FINAL FIXED SUMMARY ROW STYLE */
.summary-grid{
    display:flex;
    justify-content:space-between;
    padding:8px;
    gap:6px;
    flex-wrap:nowrap;
}

.summary-item{
    flex:1;
    text-align:center;
    padding:6px;
    border-radius:10px;
    font-size:.68rem;
    font-weight:600;
    backdrop-filter:blur(5px);
}

.s1{background:rgba(0,240,255,.12);color:#00f0ff}
.s2{background:rgba(255,0,200,.12);color:#ff00c8}
.s3{background:rgba(0,255,136,.12);color:#00ff88}
.s4{background:rgba(255,215,0,.12);color:#ffd700}

/* MOBILE */
@media(max-width:768px){
    .players-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>

<body>
<div class="container">

<div class="header">
    <img src="https://i.imgur.com/LY3Bb9m.png">
    <h1>GOAT FC MANAGERS</h1>
</div>

<div class="desc">Official Manager Ranking System</div>

<div id="managerGrid" class="manager-grid">Loading...</div>

</div>

<script>
/* ALL LOGIC SAME AS BEFORE (UNCHANGED CORE) */

const POINTS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MANAGERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";
const MEMBERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

function parseCSV(t){
return t.trim().split("\n").map(r=>r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v=>v.replace(/^"|"$/g,"").trim()));
}

async function load(){
const [p,m,c]=await Promise.all([
fetch(POINTS_URL).then(r=>r.text()),
fetch(MANAGERS_URL).then(r=>r.text()),
fetch(MEMBERS_URL).then(r=>r.text())
]);

const mp=parseCSV(p), mm=parseCSV(m), mc=parseCSV(c);
const ph=mp.shift(), mh=mm.shift(), ch=mc.shift();

const nameMap={};
mc.forEach(r=>{
const o=Object.fromEntries(ch.map((h,i)=>[h,r[i]]));
nameMap[o["Club ID Number"]]=o["Full Name"];
});

const matches=mp.map(r=>Object.fromEntries(ph.map((h,i)=>[h,r[i]])));
const out=[];

for(const row of mm){
const m=Object.fromEntries(mh.map((h,i)=>[h,row[i]]));
const ids=m["Player IDs"].split(",").map(x=>x.trim()).slice(0,6);

const stats={};
ids.forEach(i=>stats[i]={match:0,pts:0,w:0,d:0,l:0,gf:0,ga:0});

for(const x of matches){
if(x.Approved.toLowerCase()!=="yes") continue;

if(stats[x.P1_ID]){
let s=stats[x.P1_ID];
s.match++;s.pts+=+x.P1_Point;s.gf+=+x.P1_Goal;s.ga+=+x.P2_Goal;
if(+x.P1_Point===3)s.w++;else if(+x.P1_Point===1)s.d++;else s.l++;
}
if(stats[x.P2_ID]){
let s=stats[x.P2_ID];
s.match++;s.pts+=+x.P2_Point;s.gf+=+x.P2_Goal;s.ga+=+x.P1_Goal;
if(+x.P2_Point===3)s.w++;else if(+x.P2_Point===1)s.d++;else s.l++;
}
}
let total={match:0,pts:0,w:0,gd:0};

const players=ids.map(i=>{
let s=stats[i];
s.gd=s.gf-s.ga;
s.winPct=s.match?Math.round((s.w/s.match)*100):0;

total.match+=s.match;
total.pts+=s.pts;
total.w+=s.w;
total.gd+=s.gd;

return{id:i,name:nameMap[i]||"Unknown",...s};
});

total.winPct=total.match?Math.round((total.w/total.match)*100):0;

out.push({...m,players,total});
}

out.sort((a,b)=>b.total.pts-a.total.pts||b.total.gd-a.total.gd);

render(out);
}

function render(data){
document.getElementById("managerGrid").innerHTML=data.map((m,i)=>{

const best=m.players.reduce((b,p,i,a)=>p.pts>a[b].pts?i:b,0);

return`
<div class="manager-card ${i<3?'top'+(i+1):''}" id="card-${i}">

<div class="rank-badge">
${i===0?'🏆':i===1?'🥈':i===2?'🥉':'#'}${i+1}
</div>

<div class="download-icon" onclick="downloadCard('card-${i}','${m["Team Name"]}')">
<svg width="18" height="18" fill="#00f0ff" viewBox="0 0 24 24">
<path d="M12 16l4-5h-3V4h-2v7H8z"/><path d="M5 20h14v-2H5z"/>
</svg>
</div>

<div class="team-top">
<img class="team-logo" src="${m["Team Logo"]}">
<div class="team-info">
<h3>${m["Team Name"]}</h3>
<p>${m["Manager Name"]}</p>
<div class="team-strength">Team Strength: ${m.teamStrength||0}</div>
</div>
</div>

<div class="players-grid">
${m.players.map((p,idx)=>`
<div class="player-box ${idx===best?'best-player':''}">
<div class="player-id">${p.id}</div>
<div class="player-name">${p.name}</div>
</div>
`).join("")}
</div>

<div class="summary">
<div class="summary-title">Team Summary</div>
<div class="summary-grid">
<div class="summary-item s1">${m.total.match}<br>Match</div>
<div class="summary-item s2">${m.total.pts}<br>PTS</div>
<div class="summary-item s3">${m.total.gd}<br>GD</div>
<div class="summary-item s4">${m.total.winPct}%<br>Win%</div>
</div>
</div>

</div>
`;
}).join("");
}

function downloadCard(id,name){
html2canvas(document.getElementById(id),{
useCORS:true,
scale:2
}).then(c=>{
let a=document.createElement("a");
a.download=name+".jpg";
a.href=c.toDataURL("image/jpeg",1);
a.click();
});
}

load();
</script>

</body>
</html>

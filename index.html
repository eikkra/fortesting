<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT FC Managers</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* ===== SAME DESIGN (UNCHANGED) ===== */
:root{
    --accent:#00f0ff;
    --gold:#FFD700;
    --silver:#C0C0C0;
    --bronze:#CD7F32;
    --green:#00ff88;
    --text:#fff;
    --muted:#94a7d0;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    background:radial-gradient(circle,#10244f,#050816);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    padding:14px;
}

.container{max-width:1600px;margin:auto;}

.header{
    display:flex;justify-content:center;align-items:center;gap:10px;
}

.header img{width:36px;height:36px;}

.header h1{
    font-family:'Orbitron';
    font-size:1.25rem;
    background:linear-gradient(90deg,#00f0ff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.manager-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:16px;
}

.manager-card{
    background:#0d1329;
    border:1px solid rgba(0,240,255,.25);
    border-radius:18px;
    padding:14px;
    position:relative;
}

.rank-badge{
    position:absolute;
    top:10px;
    right:10px;
    font-size:.7rem;
    background:rgba(255,255,255,.08);
    padding:4px 10px;
    border-radius:999px;
}

.download-icon{
    position:absolute;
    top:40px;
    right:12px;
    cursor:pointer;
}

/* ===== PLAYERS ===== */
.players-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}

.player-box{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(0,255,136,.35);
    border-radius:12px;
    padding:8px;
}

.player-box.best-player{
    border:1px solid var(--gold);
}

/* ===== SUMMARY ===== */
.summary{
    margin-top:10px;
    border:1px solid rgba(255,255,255,.08);
    border-radius:12px;
    overflow:hidden;
}

.summary-title{
    background:rgba(0,240,255,.12);
    padding:7px;
    text-align:center;
    color:var(--accent);
}

.summary-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}

.summary-grid div{
    text-align:center;
    padding:8px;
    border-right:1px solid rgba(255,255,255,.08);
    font-size:.7rem;
}

.summary-grid div:last-child{border-right:none;}

@media(max-width:768px){
    .players-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div class="container">
<div class="header">
<img src="https://i.imgur.com/LY3Bb9m.png">
<h1>GOAT FC MANAGERS</h1>
</div>

<div id="managerGrid" class="manager-grid">Loading...</div>
</div>

<script>
const POINTS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=1588171329&single=true&output=csv";
const MANAGERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=467352529&single=true&output=csv";
const MEMBERS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRqRJZskk_f4F0Xgx7eLadfVhLmjipE8bpbU9oFV5BYumJc1MKuU1LA4WjEKouVq67wEQ3-lo7VbkQ6/pub?gid=133947099&single=true&output=csv";

function parseCSV(t){
return t.trim().split("\n").map(r=>r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v=>v.replace(/"/g,"")));
}

function matchAllowed(managerTypes,matchType){
    if(!managerTypes) return false;
    const allowed=managerTypes.toLowerCase().split(",").map(x=>x.trim());
    return allowed.includes(matchType.toLowerCase());
}

async function load(){
const [p,m,c]=await Promise.all([
fetch(POINTS_URL).then(r=>r.text()),
fetch(MANAGERS_URL).then(r=>r.text()),
fetch(MEMBERS_URL).then(r=>r.text())
]);

const matches=parseCSV(p), managers=parseCSV(m), members=parseCSV(c);

const pH=matches.shift(), mH=managers.shift(), cH=members.shift();

const nameMap={};
members.forEach(r=>{
const o=Object.fromEntries(cH.map((h,i)=>[h,r[i]]));
nameMap[o["Club ID Number"]]=o["Full Name"];
});

const mObjs=matches.map(r=>Object.fromEntries(pH.map((h,i)=>[h,r[i]])));

const out=[];

for(const row of managers){
const m=Object.fromEntries(mH.map((h,i)=>[h,row[i]]));

const ids=m["Player IDs"].split(",").map(x=>x.trim()).slice(0,6);
const start=new Date(m["Start Match Date"]);
const end=new Date(m["End Match Date"]);
const allowedTypes=m["Match Type"] || "league";

const stats={}, players=[];

ids.forEach(id=>stats[id]={match:0,pts:0,w:0,d:0,l:0,gf:0,ga:0});

for(const x of mObjs){

if(x.Approved.toLowerCase()!=="yes") continue;
if(!matchAllowed(allowedTypes,x.Match_Type)) continue;

const d=new Date(x.Match_Date);
if(d<start||d>end) continue;

if(stats[x.P1_ID]){
let s=stats[x.P1_ID];
s.match++;s.pts+=+x.P1_Point;s.gf+=+x.P1_Goal;s.ga+=+x.P2_Goal;
if(+x.P1_Point===3)s.w++;else if(+x.P1_Point===1)s.d++;else s.l++;
}

if(stats[x.P2_ID]){
let s=stats[x.P2_ID];
s.match++;s.pts+=+x.P2_Point;s.gf+=+x.P2_Goal;s.ga+=+x.P1_Goal;
if(+x.P2_Point===3)s.w++;else if(+x.P2_Point===1)s.d++;else s.l++;
}
}

let total={match:0,pts:0,w:0,gd:0};

ids.forEach(id=>{
let s=stats[id];
s.gd=s.gf-s.ga;
s.winPct=s.match?Math.round((s.w/s.match)*100):0;

total.match+=s.match;
total.pts+=s.pts;
total.w+=s.w;
total.gd+=s.gd;

players.push({id,name:nameMap[id]||"Unknown",...s});
});

total.winPct=total.match?Math.round((total.w/total.match)*100):0;

out.push({...m,players,total});
}

render(out);
}

function render(data){
document.getElementById("managerGrid").innerHTML=data.map((m,i)=>`
<div class="manager-card">
<div class="rank-badge">#${i+1}</div>

<div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;">
<img src="${m["Team Logo"]}" style="width:50px;height:50px;border-radius:12px;">
<div>
<b>${m["Team Name"]}</b><br>
<small>${m["Manager Name"]}</small>
</div>
</div>

<div class="players-grid">
${m.players.map(p=>`
<div class="player-box ${p.pts===Math.max(...m.players.map(x=>x.pts))?'best-player':''}">
<div>${p.id}</div>
<div>${p.name}</div>
M:${p.match} P:${p.pts} W%:${p.winPct}
</div>
`).join("")}
</div>

<div class="summary">
<div class="summary-title">Team Summary</div>
<div class="summary-grid">
<div>${m.total.match}<br>Match</div>
<div>${m.total.pts}<br>PTS</div>
<div>${m.total.gd}<br>GD</div>
<div>${m.total.winPct}%<br>Win%</div>
</div>
</div>

</div>
`).join("");
}

load();
</script>

</body>
</html>
